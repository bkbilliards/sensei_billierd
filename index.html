<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI — Калькулятор игры Колхоз</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#071b13,#0d2e1f);
color:white;
margin:0;
text-align:center;
}

.header{
width:100%;
}

.header img{
width:100%;
display:block;
}

.card{
background:#123524;
max-width:900px;
margin:25px auto;
padding:25px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.name{flex:2}
.score{flex:1}

input,select{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
background:#0f261c;
color:white;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.calc{background:#d4af37;color:black}
.copy{background:#4d6781;color:white}
.reset{background:#7a1f1f;color:white}

.result{
background:#08140d;
padding:18px;
border-radius:10px;
margin-top:20px;
text-align:left;
}

.section{margin-top:15px}

.green{color:#4cff7c}
.red{color:#ff6b6b}

footer{
margin:30px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="header">
<img src="header.png">
</div>

<div class="card">

<div class="row">
<div style="flex:2">Режим игры</div>
<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="team">2 × 2</option>
</select>
</div>

<div class="row">
<div style="flex:2">Ставка за шар</div>
<input id="stake" type="number" value="300">
</div>

<div class="row">
<div class="name">Игрок</div>
<div class="score">П1</div>
<div class="score">П2</div>
</div>

<div id="players"></div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="results"></div>

</div>

<footer>SENSEI BILLIARD CLUB ©</footer>

<script>

/* создаем строки игроков */

let container=document.getElementById("players")

for(let i=0;i<4;i++){

container.innerHTML+=`

<div class="row">
<input class="name" id="name${i}" placeholder="Игрок">
<input class="score" id="p1_${i}" type="number">
<input class="score" id="p2_${i}" type="number">
</div>

`

}

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

/* расчет цепочки */

function chainCalc(players){

let payments=[]

for(let i=0;i<players.length;i++){

let next=(i+1)%players.length

let diff=players[i].score-players[next].score

if(diff<0){

payments.push({
from:players[i].name,
to:players[next].name,
points:Math.abs(diff)
})

}

if(diff>0){

payments.push({
from:players[next].name,
to:players[i].name,
points:Math.abs(diff)
})

}

}

return payments

}

function calc(){

let mode=document.getElementById("mode").value
let stake=parseInt(document.getElementById("stake").value)||0

let players=[]

for(let i=0;i<4;i++){

let name=document.getElementById("name"+i).value

if(name!=""){

let p1=parseInt(document.getElementById("p1_"+i).value)||0
let p2=parseInt(document.getElementById("p2_"+i).value)||0

players.push({
name:name,
p1:p1,
p2:p2,
score:p1+p2
})

}

}

let html="<div class='result'>"

/* показываем очки */

html+="<div class='section'><b>ШАРЫ</b><br>"

players.forEach(p=>{
html+=p.name+" — "+p.score+"<br>"
})

html+="</div>"

/* партия 1 */

let p1Players=players.map(p=>({name:p.name,score:p.p1}))
let payments1=chainCalc(p1Players)

/* обратка */

let reverse=[...players].reverse()
let p2Players=reverse.map(p=>({name:p.name,score:p.p2}))
let payments2=chainCalc(p2Players)

/* итог */

let finalPayments=[...payments1,...payments2]

html+="<div class='section'><b>КТО КОМУ ПЛАТИТ</b><br>"

finalPayments.forEach(p=>{

let money=p.points*stake

html+=`${p.from} → ${p.to} = ${p.points} очков (${formatMoney(money)} тенге)<br>`

})

html+="</div>"

html+="</div>"

document.getElementById("results").innerHTML=html

}

function copyResult(){

let text=document.getElementById("results").innerText

navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

</script>

</body>
</html>
