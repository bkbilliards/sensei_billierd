<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02140e,#0a3a27);
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
color:#d4af37;
}

.clubPanel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
max-width:900px;
margin:20px auto;
padding:0 15px;
}

.panelBtn{
background:#0b2419;
border-radius:14px;
padding:18px;
text-align:center;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.panelBtn:hover{
transform:scale(1.05);
background:#123524;
}

.icon{
font-size:28px;
margin-bottom:6px;
}

.container{
max-width:900px;
margin:auto;
background:#123524;
padding:25px;
border-radius:18px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0b2419;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#5c6f8c;color:white;}
.reset{background:#8c2b2b;color:white;}

.result{
background:#05160f;
padding:20px;
border-radius:14px;
margin-top:20px;
line-height:1.6;
}

.green{color:#4cff9a;}
.red{color:#ff6b6b;}

</style>

</head>

<body>

<div class="header">
КАЛЬКУЛЯТОР ИГРЫ «КОЛХОЗ»
</div>

<!-- Панель клуба -->

<div class="clubPanel">

<div class="panelBtn" onclick="openHistory()">
<div class="icon">📜</div>
<div>История</div>
</div>

<div class="panelBtn" onclick="openRating()">
<div class="icon">🏆</div>
<div>Рейтинг</div>
</div>

<div class="panelBtn" onclick="openPlayerDay()">
<div class="icon">⭐</div>
<div>Игрок дня</div>
</div>

<div class="panelBtn" onclick="openStats()">
<div class="icon">📊</div>
<div>Статистика</div>
</div>

<div class="panelBtn" onclick="window.open('https://2gis.kz/almaty/geo/70000001101734090')">
<div class="icon">🗺</div>
<div>Карта</div>
</div>

<div class="panelBtn" onclick="scrollToCalculator()">
<div class="icon">🎱</div>
<div>Калькулятор</div>
</div>

</div>

<!-- Калькулятор -->

<div class="container" id="calculator">

<div class="grid">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="grid">
<input id="n1" placeholder="Игрок">
<input id="p1_1" type="number">
<input id="p2_1" type="number">
</div>

<div class="grid">
<input id="n2" placeholder="Игрок">
<input id="p1_2" type="number">
<input id="p2_2" type="number">
</div>

<div class="grid">
<input id="n3" placeholder="Игрок">
<input id="p1_3" type="number">
<input id="p2_3" type="number">
</div>

<div class="grid">
<input id="n4" placeholder="Игрок">
<input id="p1_4" type="number">
<input id="p2_4" type="number">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

<button onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

let balance={}

function calc(){

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value||0),
Number(p1_2.value||0),
Number(p1_3.value||0),
Number(p1_4.value||0)
]

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

balance={}
names.forEach(n=>balance[n]=0)

let html="<div class='result'>"

html+="<b>Разница очков</b><br>"
html+=`${names[0]} - ${names[1]} = ${d1}<br>`
html+=`${names[1]} - ${names[2]} = ${d2}<br>`
html+=`${names[2]} - ${names[3]} = ${d3}<br>`
html+=`${names[3]} - ${names[0]} = ${d4}<br><br>`

function pay(a,b,val){

let sum=val*400

html+=`${a} → ${b} = ${val} (${money(sum)} тг)<br>`

balance[a]-=sum
balance[b]+=sum

}

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let p=Math.min(d1,debt)
pay(names[1],names[0],p)
debt-=p

}

if(debt>0){
pay(names[1],names[2],debt)
}

}

if(d4<0){
pay(names[3],names[2],Math.abs(d4))
}

html+="<br><b>Итог</b><br>"

for(let p in balance){

let val=balance[p]

if(val>0){
html+=`<div class="green">${p} +${money(val)}</div>`
}else{
html+=`<div class="red">${p} ${money(val)}</div>`
}

}

html+="</div>"

result.innerHTML=html

}

function saveGame(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let date=new Date().toLocaleDateString()

history.unshift({
date:date,
players:balance
})

localStorage.setItem("sensei_history",JSON.stringify(history))

alert("Игра сохранена")

}

function openHistory(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let html="<h2>История игр</h2>"

history.forEach(g=>{

html+=`<b>${g.date}</b><br>`

for(let p in g.players){

let val=g.players[p]
let sign=val>0?"+":""

html+=`${p} ${sign}${money(val)}<br>`

}

html+="<hr>"

})

result.innerHTML=html

}

function openRating(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let rating={}

history.forEach(g=>{
for(let p in g.players){
rating[p]=(rating[p]||0)+g.players[p]
}
})

let arr=[]

for(let p in rating){
arr.push({name:p,val:rating[p]})
}

arr.sort((a,b)=>b.val-a.val)

let html="<h2>Рейтинг игроков</h2>"

arr.forEach((p,i)=>{
let sign=p.val>0?"+":""
html+=`${i+1}. ${p.name} ${sign}${money(p.val)}<br>`
})

result.innerHTML=html

}

function openPlayerDay(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

if(history.length==0)return

let last=history[0]

let best=""
let val=-999999

for(let p in last.players){
if(last.players[p]>val){
val=last.players[p]
best=p
}
}

result.innerHTML=`<h2>Игрок дня</h2>
🏆 ${best} +${money(val)}
`

}

function openStats(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let games=history.length
let total=0

history.forEach(g=>{
for(let p in g.players){
total+=Math.abs(g.players[p])
}
})

result.innerHTML=`<h2>Статистика клуба</h2>
Всего игр: ${games}<br>
Оборот денег: ${money(total)}
`

}

function scrollToCalculator(){

document.getElementById("calculator")
.scrollIntoView({behavior:"smooth"})

}

function clearHistory(){

let pass=prompt("Пароль владельца")

if(pass!=="sensei2026"){
alert("Неверный пароль")
return
}

localStorage.removeItem("sensei_history")

alert("История очищена")

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

let month=localStorage.getItem("sensei_month")
let now=new Date().getMonth()

if(month==null){
localStorage.setItem("sensei_month",now)
}
else if(Number(month)!==now){
localStorage.removeItem("sensei_history")
localStorage.setItem("sensei_month",now)
}

</script>

</body>
</html>
