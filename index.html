<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI Kolhoz Calculator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#071b13,#0d2e1f);
color:white;
margin:0;
padding:0;
text-align:center;
}

.card{
background:#123524;
padding:25px;
border-radius:14px;
max-width:750px;
margin:30px auto;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.name{flex:2}
.score{flex:1}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
background:#0f261c;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.calc{background:#d4af37;color:black}
.copy{background:#35607c;color:white}
.reset{background:#7a1f1f;color:white}

.result{
background:#08140d;
padding:15px;
border-radius:8px;
margin-top:15px;
text-align:left;
}

.green{color:#4cff7c}
.red{color:#ff6b6b}

.section{
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>SENSEI KOLHOZ CALCULATOR</h2>

<div class="row">
<div style="flex:2">Ставка за шар</div>
<input id="stake" type="number" value="300">
</div>

<div class="row">
<div class="name">Игрок</div>
<div class="score">Очки</div>
</div>

<div id="players"></div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ В WHATSAPP</button>
<button class="reset" onclick="resetAll()">СБРОС</button>

<div id="results"></div>

</div>

<script>

let container=document.getElementById("players")

for(let i=0;i<4;i++){

container.innerHTML+=`

<div class="row">
<input class="name" id="name${i}" placeholder="Игрок">
<input class="score" id="score${i}" type="number">
</div>

`

}

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=parseInt(document.getElementById("stake").value)||0

let players=[]

for(let i=0;i<4;i++){

players.push({
name:document.getElementById("name"+i).value,
score:parseInt(document.getElementById("score"+i).value)||0,
balance:0
})

}

/* РАЗНИЦА ПО КРУГУ */

players[0].balance = players[0].score - players[1].score
players[1].balance = players[1].score - players[2].score
players[2].balance = players[2].score - players[3].score
players[3].balance = players[3].score - players[0].score

let html="<div class='result'>"

html+="<div class='section'><b>ШАРЫ</b><br>"

players.forEach(p=>{
html+=p.name+" — "+p.score+"<br>"
})

html+="</div>"

/* РАЗНИЦА */

html+="<div class='section'><b>РАЗНИЦА</b><br>"

players.forEach(p=>{

if(p.balance>0)
html+=`<div class="green">${p.name} +${p.balance} очков</div>`

if(p.balance<0)
html+=`<div class="red">${p.name} ${p.balance} очков</div>`

})

html+="</div>"

/* ЧИСТЫЙ РАСЧЕТ */

let positives=[]
let negatives=[]

players.forEach(p=>{

if(p.balance>0) positives.push({...p})
if(p.balance<0) negatives.push({...p})

})

let payments=[]

positives.forEach(pos=>{

negatives.forEach(neg=>{

if(pos.balance>0 && neg.balance<0){

let pay=Math.min(pos.balance, Math.abs(neg.balance))

pos.balance-=pay
neg.balance+=pay

payments.push({
from:neg.name,
to:pos.name,
points:pay
})

}

})

})

html+="<div class='section'><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(p=>{

html+=p.from+" → "+p.to+" = "+p.points+" очков ("+formatMoney(p.points*stake)+" тенге)<br>"

})

html+="</div>"

html+="</div>"

document.getElementById("results").innerHTML=html

}

function copyResult(){

let text=document.getElementById("results").innerText
navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

function resetAll(){
location.reload()
}

</script>

</body>
</html>
