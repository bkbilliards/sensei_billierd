<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз PRO</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(180deg,#041c13,#0a3524);
color:white;
text-align:center;
}

.header{
background:#05160f;
padding:20px;
font-size:22px;
font-weight:bold;
color:#d4af37;
}

.card{
background:#123524;
max-width:800px;
margin:30px auto;
padding:25px;
border-radius:16px;
}

.row{
display:flex;
gap:10px;
margin-bottom:12px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#0e241a;
color:white;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#506a85;color:white;}
.reset{background:#8b2a2a;color:white;}

.result{
background:#05160f;
padding:18px;
border-radius:12px;
margin-top:20px;
text-align:left;
}

.section{
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор Колхоз PRO
</div>

<div class="card">

<div class="row">
<input id="stake" type="number" value="400" placeholder="Ставка за очко">
</div>

<h3>1 партия</h3>

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="p1_1" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="p1_2" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="p1_3" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="p1_4" type="number" placeholder="Очки">
</div>

<h3>2 партия (обратка)</h3>

<div class="row">
<input type="number" id="p2_4" placeholder="Игрок4">
</div>

<div class="row">
<input type="number" id="p2_3" placeholder="Игрок3">
</div>

<div class="row">
<input type="number" id="p2_2" placeholder="Игрок2">
</div>

<div class="row">
<input type="number" id="p2_1" placeholder="Игрок1">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

</div>

<script>

function format(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function kolhoz(scores,names){

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)

payments.push({
from:names[1],
to:names[0],
value:pay
})

debt-=pay

}

if(debt>0){

payments.push({
from:names[1],
to:names[2],
value:debt
})

}

}

if(d4<0){

payments.push({
from:names[3],
to:names[2],
value:Math.abs(d4)
})

}

return {
diffs:[d1,d2,d3,d4],
payments:payments
}

}

function calc(){

let stake=Number(stake.value)

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let p1=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let p2=[
Number(p2_1.value),
Number(p2_2.value),
Number(p2_3.value),
Number(p2_4.value)
]

let res1=kolhoz(p1,names)

let reverseNames=[names[3],names[2],names[1],names[0]]
let reverseScores=[p2[3],p2[2],p2[1],p2[0]]

let res2=kolhoz(reverseScores,reverseNames)

let payments=[...res1.payments,...res2.payments]

let html="<div class='result'>"

html+="<b>1 партия</b><br>"

res1.payments.forEach(p=>{
html+=`${p.from} → ${p.to} = ${p.value} очков (${format(p.value*stake)} тнг)<br>`
})

html+="<div class='section'><b>2 партия (обратка)</b><br>"

res2.payments.forEach(p=>{
html+=`${p.from} → ${p.to} = ${p.value} очков (${format(p.value*stake)} тнг)<br>`
})

html+="</div>"

html+="<div class='section'><b>ИТОГ</b><br>"

payments.forEach(p=>{
html+=`${p.from} → ${p.to} = ${p.value} очков (${format(p.value*stake)} тнг)<br>`
})

html+="</div>"

html+="<div class='section'><b>Почему такой результат</b><br>"

html+="Очки считаются по кругу игроков.<br>"
html+="Игрок сравнивается только со следующим игроком.<br>"
html+="Минусовые результаты распределяются между игроками с плюсом.<br>"
html+="Во второй партии порядок меняется (обратка).<br>"
html+="После этого суммируются обе партии.</div>"

html+="</div>"

result.innerHTML=html

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

alert("Результат скопирован")

}

</script>

</body>
</html>
