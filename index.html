<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD CLUB</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #062d1f;
            --deep-green: #041a11;
            --card-bg: #0a3622;
            --input-bg: #03140d;
            --text: #e0e0e0;
            --accent: #155236;
            --red: #ff5c5c;
            --green: #4ade80;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 10px;
            background: radial-gradient(circle at top, var(--dark-green), var(--deep-green));
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* Шапка с логотипом */
        .header { text-align: center; margin-bottom: 20px; }
        .logo-box { margin-bottom: 10px; }
        .logo-text { 
            color: var(--gold); font-size: 24px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 3px; margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .sub-text { color: var(--gold); font-size: 10px; opacity: 0.8; letter-spacing: 2px; }

        /* Навигация */
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .nav-btn { 
            background: var(--card-bg); border: 1px solid var(--accent); color: white; 
            padding: 12px 5px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold;
        }

        /* Карточка калькулятора */
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.1); 
        }

        .player-row { display: grid; grid-template-columns: 1fr 90px; gap: 10px; margin-bottom: 10px; }
        
        input, select {
            background: var(--input-bg); border: 1px solid var(--accent); color: white;
            padding: 14px; border-radius: 12px; font-size: 16px; width: 100%;
        }
        input:focus { border-color: var(--gold); outline: none; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }

        .btn-calc { 
            width: 100%; background: linear-gradient(135deg, var(--gold), #b8962e); color: black; 
            font-weight: bold; padding: 18px; border-radius: 15px; border: none; font-size: 16px; 
            margin-bottom: 15px; text-transform: uppercase;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { 
            background: var(--accent); color: white; border: none; padding: 12px; 
            border-radius: 10px; font-weight: bold; font-size: 13px;
        }
        .btn-reset { background: #632626; }

        /* Результаты */
        .result-box { 
            margin-top: 20px; background: var(--input-bg); padding: 15px; border-radius: 15px; 
            display: none; border-left: 4px solid var(--gold); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-section { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .res-title { color: var(--gold); font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .money-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .val-plus { color: var(--green); }
        .val-minus { color: var(--red); }

        /* Модалки */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px;
        }
        .modal-content { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--gold); max-width: 450px; margin: 0 auto;
            max-height: 80vh; overflow-y: auto;
        }
        .table { width: 100%; border-collapse: collapse; }
        .table td, .table th { padding: 10px; border-bottom: 1px solid var(--accent); text-align: left; }
        
        .history-item { 
            background: var(--input-bg); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 13px;
            position: relative;
        }
        .del-btn { background: var(--red); color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <p class="logo-text">SENSEI</p>
            <p class="sub-text">BILLIARD CLUB</p>
        </div>
        <div style="font-size: 12px; color: var(--gold); opacity: 0.6;">КАЛЬКУЛЯТОР КОЛХОЗ</div>
    </div>

    <div class="nav-grid">
        <button class="nav-btn" onclick="showModal('history')">ИСТОРИЯ</button>
        <button class="nav-btn" onclick="showModal('rating')">РЕЙТИНГ</button>
        <button class="nav-btn" onclick="showModal('stats')">СТАТИСТИКА</button>
    </div>

    <div class="card">
        <div id="players">
            <div class="player-row"><input type="text" id="n1" value="Дако"><input type="number" id="p1" placeholder="Очки"></div>
            <div class="player-row"><input type="text" id="n2" value="Даурен"><input type="number" id="p2" placeholder="Очки"></div>
            <div class="player-row"><input type="text" id="n3" value="Сека"><input type="number" id="p3" placeholder="Очки"></div>
            <div class="player-row"><input type="text" id="n4" value="Джони"><input type="number" id="p4" placeholder="Очки"></div>
        </div>

        <div class="settings-grid">
            <select id="mode">
                <option value="kolhoz">Колхоз (Круг)</option>
                <option value="2x2">Команда 2х2</option>
            </select>
            <input type="number" id="stake" value="400">
        </div>

        <button class="btn-calc" onclick="calculate()">ПОДСЧИТАТЬ</button>
        
        <div class="btn-row">
            <button class="btn-action" onclick="copyResult()">📋 КОПИРОВАТЬ</button>
            <button class="btn-action btn-reset" onclick="resetForm()">🔄 СБРОС</button>
        </div>
        <button id="saveBtn" class="btn-action" style="width:100%; margin-top:10px; background:var(--gold); color:black; display:none;" onclick="saveGame()">💾 СОХРАНИТЬ В ИСТОРИЮ</button>

        <div id="result" class="result-box"></div>
    </div>
</div>

<div id="modal" class="overlay" onclick="if(event.target==this) closeModal()">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--gold); margin-top:0;"></h3>
        <div id="modalBody"></div>
        <button class="btn-action" style="width:100%; margin-top:20px;" onclick="closeModal()">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    let lastCalc = null;

    function calculate() {
        const stake = parseInt(document.getElementById('stake').value);
        const mode = document.getElementById('mode').value;
        const p = [
            { n: document.getElementById('n1').value, s: parseInt(document.getElementById('p1').value) || 0 },
            { n: document.getElementById('n2').value, s: parseInt(document.getElementById('p2').value) || 0 },
            { n: document.getElementById('n3').value, s: parseInt(document.getElementById('p3').value) || 0 },
            { n: document.getElementById('n4').value, s: parseInt(document.getElementById('p4').value) || 0 }
        ];

        let resHtml = "";
        let balances = [0, 0, 0, 0];

        if (mode === 'kolhoz') {
            resHtml += `<div class="res-section"><div class="res-title">Расчет по кругу</div>`;
            for (let i = 0; i < 4; i++) {
                let next = (i + 1) % 4;
                let diff = p[i].s - p[next].s;
                let cash = Math.abs(diff) * stake;
                
                if (diff > 0) { // Игрок i выиграл у соседа
                    resHtml += `<div class="money-item"><span>${p[next].n} → ${p[i].n}</span><b>${cash} тг</b></div>`;
                    balances[i] += cash; balances[next] -= cash;
                } else if (diff < 0) { // Игрок i проиграл соседу
                    resHtml += `<div class="money-item"><span>${p[i].n} → ${p[next].n}</span><b>${cash} тг</b></div>`;
                    balances[i] -= cash; balances[next] += cash;
                }
            }
            resHtml += `</div>`;
        } else {
            let t1 = p[0].s + p[2].s;
            let t2 = p[1].s + p[3].s;
            let diff = t1 - t2;
            let cash = Math.abs(diff) * stake;
            resHtml += `<div class="res-section"><div class="res-title">Командный итог</div>`;
            if(diff > 0) {
                resHtml += `<div class="money-item"><span>${p[1].n}+${p[3].n} → ${p[0].n}+${p[2].n}</span><b>${cash} тг</b></div>`;
                balances[0]=balances[2]=cash/2; balances[1]=balances[3]= -cash/2;
            } else {
                resHtml += `<div class="money-item"><span>${p[0].n}+${p[2].n} → ${p[1].n}+${p[3].n}</span><b>${cash} тг</b></div>`;
                balances[1]=balances[3]=cash/2; balances[0]=balances[2]= -cash/2;
            }
            resHtml += `</div>`;
        }

        resHtml += `<div class="res-section"><div class="res-title">Общий баланс</div>`;
        p.forEach((player, i) => {
            let b = balances[i];
            resHtml += `<div class="money-item"><span>${player.n}</span><b class="${b>=0?'val-plus':'val-minus'}">${b>0?'+':''}${b} тг</b></div>`;
        });
        resHtml += `</div>`;

        const out = document.getElementById('result');
        out.innerHTML = resHtml;
        out.style.display = 'block';
        document.getElementById('saveBtn').style.display = 'block';
        lastCalc = { date: new Date().toLocaleString(), players: p.map(x=>x.n), bals: balances };
    }

    function saveGame() {
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        history.unshift(lastCalc);
        localStorage.setItem('sensei_history', JSON.stringify(history));
        alert("Сохранено!");
    }

    function showModal(type) {
        const modal = document.getElementById('modal');
        const body = document.getElementById('modalBody');
        const title = document.getElementById('modalTitle');
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        
        modal.style.display = 'block';
        if(type === 'history') {
            title.innerText = "История игр";
            body.innerHTML = history.map((h, i) => `
                <div class="history-item">
                    <button class="del-btn" onclick="deleteGame(${i})">Удалить</button>
                    <div style="color:var(--gold)">${h.date}</div>
                    ${h.players.map((p,pi) => `<div>${p}: ${h.bals[pi]} тг</div>`).join('')}
                </div>
            `).join('') || "Нет записей";
        } else if(type === 'rating') {
            title.innerText = "Рейтинг клуба";
            let rates = {};
            history.forEach(h => h.players.forEach((p,i) => rates[p] = (rates[p]||0) + h.bals[i]));
            let sorted = Object.entries(rates).sort((a,b) => b[1] - a[1]);
            body.innerHTML = `<table class="table">` + sorted.map(s => `<tr><td>${s[0]}</td><td class="${s[1]>=0?'val-plus':'val-minus'}">${s[1]} тг</td></tr>`).join('') + `</table>`;
        } else {
            title.innerText = "Статистика";
            body.innerHTML = `<div style="text-align:center">Всего игр: <h1>${history.length}</h1></div>`;
        }
    }

    function deleteGame(i) {
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        history.splice(i, 1);
        localStorage.setItem('sensei_history', JSON.stringify(history));
        showModal('history');
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function resetForm() { 
        ['p1','p2','p3','p4'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('result').style.display = 'none';
        document.getElementById('saveBtn').style.display = 'none';
    }
    function copyResult() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText("🎱 SENSEI CLUB\n" + text);
        alert("Скопировано!");
    }
</script>

</body>
</html>
