<!DOCTYPE html> 
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI Kolhoz Calculator</title>

<style>

body{
font-family:Arial;
background:linear-gradient(180deg,#071b13,#0d2e1f);
color:white;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#08140d;
padding:10px;
display:flex;
justify-content:center;
}

.logo{
width:100%;
max-width:520px;
height:auto;
}

.card{
background:#123524;
padding:25px;
border-radius:14px;
max-width:750px;
margin:30px auto;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.name{flex:2}
.score{flex:1}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
background:#0f261c;
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.calc{background:#d4af37;color:black}
.copy{background:#35607c;color:white}
.reset{background:#7a1f1f;color:white}

.result{
background:#08140d;
padding:15px;
border-radius:8px;
margin-top:15px;
text-align:left;
}

.green{color:#4cff7c}
.red{color:#ff6b6b}

.section{
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>SENSEI KOLHOZ CALCULATOR</h2>

<div class="row">
<div style="flex:2">Ставка за шар</div>
<input id="stake" type="number" value="300">
</div>

<div class="row">
<div class="name">Игрок</div>
<div class="score">Очки</div>
</div>

<div id="players"></div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ В WHATSAPP</button>
<button class="reset" onclick="resetAll()">СБРОС</button>

<div id="results"></div>

</div>

<script>

let container=document.getElementById("players")

for(let i=0;i<4;i++){

container.innerHTML+=`

<div class="row">
<input class="name" id="name${i}" placeholder="Игрок">
<input class="score" id="score${i}" type="number">
</div>

`

}

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=parseInt(document.getElementById("stake").value)||0

let players=[]

for(let i=0;i<4;i++){

players.push({
name:document.getElementById("name"+i).value,
score:parseInt(document.getElementById("score"+i).value)||0,
money:0
})

}

let payments=[]

function duel(a,b){

let diff=players[a].score-players[b].score

if(diff>0){

let money=diff*stake

players[a].money+=money
players[b].money-=money

payments.push(players[b].name+" → "+players[a].name+" = "+formatMoney(money)+" тенге")

}

if(diff<0){

let money=Math.abs(diff)*stake

players[a].money-=money
players[b].money+=money

payments.push(players[a].name+" → "+players[b].name+" = "+formatMoney(money)+" тенге")

}

}

/* КОЛХОЗ ПО КРУГУ */

duel(1,0)
duel(2,1)
duel(3,2)
duel(0,3)

let html="<div class='result'>"

html+="<div class='section'><b>ШАРЫ</b><br>"

players.forEach(p=>{
html+=p.name+" — "+p.score+"<br>"
})

html+="</div>"

html+="<div class='section'><b>ИТОГ</b><br>"

players.sort((a,b)=>b.money-a.money)

players.forEach(p=>{

if(p.money>0){
html+=`<div class="green">${p.name} +${formatMoney(p.money)} тенге</div>`
}else if(p.money<0){
html+=`<div class="red">${p.name} ${formatMoney(p.money)} тенге</div>`
}else{
html+=p.name+" 0"
}

})

html+="</div>"

html+="<div class='section'><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(p=>{
html+=p+"<br>"
})

html+="</div>"

html+="</div>"

document.getElementById("results").innerHTML=html

}

function copyResult(){

let text=document.getElementById("results").innerText
navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

function resetAll(){
location.reload()
}

</script>

</body>
</html>
