<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI CLUB — Калькулятор Колхоз</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #062d1f;
            --deep-green: #041a11;
            --card-bg: #0a3622;
            --input-bg: #03140d;
            --text: #e0e0e0;
            --green: #4ade80;
            --red: #ff5c5c;
        }

        body {
            margin: 0; padding: 10px;
            background: radial-gradient(circle at top, var(--dark-green), var(--deep-green));
            color: var(--text);
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
        }

        .container { max-width: 480px; margin: 0 auto; padding-bottom: 20px;}

        .header-banner {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: block;
        }

        .card { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(212,175,55,0.1); 
        }

        .grid-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 11px;
            color: var(--gold);
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .player-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        input { 
            background: var(--input-bg); border: 1px solid #155236; color: white; 
            padding: 12px 5px; border-radius: 8px; font-size: 16px; text-align: center;
            width: 100%; box-sizing: border-box;
        }
        input[type="text"] { text-align: left; padding-left: 10px; font-weight: bold;}

        .stake-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .btn-calc { 
            width: 100%; background: linear-gradient(135deg, var(--gold), #b8962e); 
            color: black; font-weight: bold; padding: 16px; border-radius: 12px; border: none; 
            font-size: 16px; margin-bottom: 12px; text-transform: uppercase; cursor: pointer;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sub { background: #4a6fa5; color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #8a3434; color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        .result-box { 
            margin-top: 20px; background: var(--input-bg); padding: 15px; border-radius: 10px; 
            display: none; line-height: 1.6; border: 1px solid var(--gold);
        }

        .res-section { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .res-title { color: var(--gold); font-weight: bold; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }
        .money-line { display: block; margin-bottom: 4px; font-size: 15px; }
        .plus { color: var(--green); }
        .minus { color: var(--red); }
    </style>
</head>
<body>

<div class="container">
    <img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg" class="header-banner" alt="SENSEI CLUB">

    <div class="card">
        <div class="grid-header">
            <div>ИГРОК</div>
            <div>ПАРТИЯ 1</div>
            <div>ПАРТИЯ 2</div>
        </div>

        <div id="players-list">
            <div class="player-row">
                <input type="text" id="n1" value="Джони">
                <input type="number" id="p1_1" placeholder="0">
                <input type="number" id="p1_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n2" value="Сека">
                <input type="number" id="p2_1" placeholder="0">
                <input type="number" id="p2_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n3" value="Даурен">
                <input type="number" id="p3_1" placeholder="0">
                <input type="number" id="p3_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n4" value="Дако">
                <input type="number" id="p4_1" placeholder="0">
                <input type="number" id="p4_2" placeholder="0">
            </div>
        </div>

        <div class="stake-box">
            <span style="font-weight: bold; color:var(--gold);">СТАВКА ЗА ШАР:</span>
            <input type="number" id="stake" value="400" style="width: 80px;">
        </div>

        <button class="btn-calc" onclick="calculate()">ПОДСЧИТАТЬ ПО ЦЕПОЧКЕ</button>
        
        <div class="btn-group">
            <button class="btn-sub" onclick="copyResult()">📋 Копировать</button>
            <button class="btn-reset" onclick="window.location.reload()">🔄 Сбросить</button>
        </div>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    function calculate() {
        const stake = Number(document.getElementById('stake').value) || 400;
        const p = [];
        for (let i = 1; i <= 4; i++) {
            p.push({
                name: document.getElementById('n' + i).value,
                score: (Number(document.getElementById('p' + i + '_1').value) || 0) + 
                       (Number(document.getElementById('p' + i + '_2').value) || 0)
            });
        }

        let resHtml = '<div class="res-section"><div class="res-title">ЦЕПОЧКА РАЗНИЦЫ:</div>';
        let payHtml = '<div class="res-section"><div class="res-title">КТО КОМУ ПЛАТИТ:</div>';
        let finalHtml = '<div class="res-section" style="border:none;"><div class="res-title">ОБЩИЙ ИТОГ:</div>';

        let balances = [0, 0, 0, 0];

        for (let i = 0; i < 4; i++) {
            let next = (i + 1) % 4;
            let diff = p[i].score - p[next].score;
            
            // Отображение разницы
            resHtml += `<div class="money-line">${p[i].name} ${p[i].score} - ${p[next].name} ${p[next].score} = <b>${p[i].name} ${diff > 0 ? '+' : ''}${diff}</b></div>`;

            // Логика разплат
            if (diff !== 0) {
                let absoluteDiff = Math.abs(diff);
                let money = absoluteDiff * stake;
                let winner = diff > 0 ? p[i].name : p[next].name;
                let loser = diff > 0 ? p[next].name : p[i].name;

                payHtml += `<div class="money-line">${loser} платит ${winner}: <b>${money} тнг</b> (${absoluteDiff} ш.)</div>`;
                
                if (diff > 0) {
                    balances[i] += money;
                    balances[next] -= money;
                } else {
                    balances[i] -= money;
                    balances[next] += money;
                }
            }
        }

        p.forEach((player, i) => {
            let val = balances[i];
            finalHtml += `<div class="money-line">${player.name}: <b class="${val >= 0 ? 'plus' : 'minus'}">${val >= 0 ? '+' : ''}${val} тнг</b></div>`;
        });

        const r = document.getElementById('result');
        r.innerHTML = resHtml + '</div>' + payHtml + '</div>' + finalHtml + '</div>';
        r.style.display = 'block';
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText("SENSEI CLUB\n" + text);
        alert("Результат скопирован!");
    }
</script>

</body>
</html>
