<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02140e,#0a3a27);
color:white;
}

.banner{
width:100%;
display:block;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
color:#d4af37;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
background:#123524;
padding:25px;
border-radius:18px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0b2419;
color:white;
font-size:16px;
}

.top{
display:grid;
grid-template-columns:1fr 2fr;
gap:10px;
margin-bottom:20px;
align-items:center;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#5c6f8c;color:white;}
.reset{background:#8c2b2b;color:white;}
.map{background:#1f7a5c;color:white;}
.club{background:#2d5cff;color:white;}

.result{
background:#05160f;
padding:20px;
border-radius:14px;
margin-top:20px;
line-height:1.6;
}

.green{color:#4cff9a;}
.red{color:#ff6b6b;}

.details{
display:none;
margin-top:20px;
background:#071d14;
padding:20px;
border-radius:14px;
}

</style>

</head>

<body>

<img class="banner" src="banner.jpg">

<div class="header">
КАЛЬКУЛЯТОР ИГРЫ «КОЛХОЗ»
</div>

<div class="container">

<div class="top">
<div>Ставка за шар</div>
<input id="stake" value="400" type="number">
</div>

<div class="grid">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="grid">
<input id="n1" placeholder="Игрок">
<input id="p1_1" type="number">
<input id="p2_1" type="number">
</div>

<div class="grid">
<input id="n2" placeholder="Игрок">
<input id="p1_2" type="number">
<input id="p2_2" type="number">
</div>

<div class="grid">
<input id="n3" placeholder="Игрок">
<input id="p1_3" type="number">
<input id="p2_3" type="number">
</div>

<div class="grid">
<input id="n4" placeholder="Игрок">
<input id="p1_4" type="number">
<input id="p2_4" type="number">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

<button id="detailsBtn" style="display:none" onclick="toggleDetails()">
ПОДРОБНЫЙ РАСЧЁТ
</button>

<div id="details" class="details"></div>

<button id="saveBtn" style="display:none" onclick="saveGame()" class="club">
ОТПРАВИТЬ В ИСТОРИЮ КЛУБА
</button>

<button class="map" onclick="window.open('https://2gis.kz/almaty/geo/70000001101734090')">
ОТКРЫТЬ КАРТУ SENSEI
</button>

<button class="club" onclick="openHistory()">История игр клуба</button>
<button class="club" onclick="openRating()">Рейтинг игроков</button>
<button class="club" onclick="openPlayerDay()">Игрок дня</button>
<button class="club" onclick="openStats()">Статистика клуба</button>
<button class="reset" onclick="clearHistory()">Очистить историю</button>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

let balance={}

function kolhoz(names,scores){

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)
payments.push([names[1],names[0],pay])
debt-=pay

}

if(debt>0){
payments.push([names[1],names[2],debt])
}

}

if(d4<0){
payments.push([names[3],names[2],Math.abs(d4)])
}

return {d1,d2,d3,d4,payments}

}

function calc(){

let stake=Number(stake.value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value||0),
Number(p1_2.value||0),
Number(p1_3.value||0),
Number(p1_4.value||0)
]

let res=kolhoz(names,scores)

balance={}
names.forEach(n=>balance[n]=0)

let html="<div class='result'>"

html+="<b>РАЗНИЦА ОЧКОВ</b><br>"
html+=`${names[0]} - ${names[1]} = ${res.d1}<br>`
html+=`${names[1]} - ${names[2]} = ${res.d2}<br>`
html+=`${names[2]} - ${names[3]} = ${res.d3}<br>`
html+=`${names[3]} - ${names[0]} = ${res.d4}<br><br>`

html+="<b>КТО КОМУ ПЛАТИТ</b><br>"

res.payments.forEach(p=>{

let sum=p[2]*stake

html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(sum)} тг)<br>`

balance[p[0]]-=sum
balance[p[1]]+=sum

})

html+="<br><b>🏆 ИТОГ</b><br>"

for(let name in balance){

let val=balance[name]

if(val>0){
html+=`<div class="green">${name} +${money(val)} тг</div>`
}else{
html+=`<div class="red">${name} ${money(val)} тг</div>`
}

}

html+="</div>"

result.innerHTML=html

detailsBtn.style.display="block"
saveBtn.style.display="block"

createDetails(names,res,scores,stake)

}

function createDetails(names,res,scores,stake){

let html="<b>Очки игроков</b><br>"

names.forEach((n,i)=>html+=`${n} — ${scores[i]}<br>`)

html+="<br><b>Как считается колхоз</b><br>"
html+="1 игрок сравнивается со 2<br>"
html+="2 со 3<br>"
html+="3 с 4<br>"
html+="4 с 1<br>"

details.innerHTML=html

}

function toggleDetails(){

details.style.display =
details.style.display==="block"?"none":"block"

}

function saveGame(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let date=new Date().toLocaleDateString()

history.unshift({
date:date,
players:balance
})

localStorage.setItem("sensei_history",JSON.stringify(history))

alert("Игра сохранена")

}

function openHistory(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let html="<h2>История игр</h2>"

history.forEach(g=>{

html+=`<b>${g.date}</b><br>`

for(let p in g.players){

let val=g.players[p]
let sign=val>0?"+":""

html+=`${p} ${sign}${money(val)}<br>`

}

html+="<hr>"

})

result.innerHTML=html

}

function openRating(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let rating={}

history.forEach(g=>{
for(let p in g.players){
rating[p]=(rating[p]||0)+g.players[p]
}
})

let arr=[]

for(let p in rating){
arr.push({name:p,val:rating[p]})
}

arr.sort((a,b)=>b.val-a.val)

let html="<h2>Рейтинг игроков</h2>"

arr.forEach((p,i)=>{
let sign=p.val>0?"+":""
html+=`${i+1}. ${p.name} ${sign}${money(p.val)}<br>`
})

result.innerHTML=html

}

function openPlayerDay(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

if(history.length==0)return

let last=history[0]

let bestName=""
let bestVal=-999999

for(let p in last.players){
if(last.players[p]>bestVal){
bestVal=last.players[p]
bestName=p
}
}

result.innerHTML=`<h2>Игрок дня</h2>
🏆 ${bestName} +${money(bestVal)}
`

}

function openStats(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let games=history.length
let total=0

history.forEach(g=>{
for(let p in g.players){
total+=Math.abs(g.players[p])
}
})

result.innerHTML=`<h2>Статистика клуба</h2>
Всего игр: ${games}<br>
Оборот денег: ${money(total)}
`

}

function clearHistory(){

let pass=prompt("Пароль владельца")

if(pass!=="sensei2026"){
alert("Неверный пароль")
return
}

localStorage.removeItem("sensei_history")

alert("История очищена")

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Результат скопирован")
}

let month=localStorage.getItem("sensei_month")
let now=new Date().getMonth()

if(month==null){
localStorage.setItem("sensei_month",now)
}
else if(Number(month)!==now){
localStorage.removeItem("sensei_history")
localStorage.setItem("sensei_month",now)
}

</script>

</body>
</html>
