<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI ELITE CALCULATOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --gold: #d4af37;
            --gold-light: #f1d392;
            --felt: #061a12;
            --card-bg: #0a2417;
            --text: #e0e0e0;
        }

        body {
            margin: 0; padding: 0;
            background: #020d08;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
        }

        .header {
            width: 100%;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .header img { width: 100%; display: block; }

        .container { padding: 15px; max-width: 450px; margin: 0 auto; }

        .premium-card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid #1a523a;
            color: #fff;
            padding: 12px 10px;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .stake-row {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 20px 0; padding: 10px;
            background: rgba(0,0,0,0.2); border-radius: 6px;
        }

        .btn-calculate {
            width: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* РЕЗУЛЬТАТЫ */
        .result-box { display: none; margin-top: 25px; }

        .payment-item {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            font-size: 15px;
        }

        .name-bold { font-weight: 700; color: #fff; }
        .money { color: var(--gold-light); font-weight: 900; }
        .balls { color: #888; font-size: 12px; }

        .itogo-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; font-size: 14px;
        }

        .win { color: #4ade80; }
        .loss { color: #ff5c5c; }

        .commentator-box {
            background: #04120c;
            border-left: 4px solid var(--gold);
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #bbb;
            line-height: 1.6;
        }

        .commentator-box b { color: var(--gold-light); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-side {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 12px; border-radius: 6px;
            font-size: 11px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">
    <div class="premium-card">
        <h2>Ввод данных партии</h2>
        
        <div class="input-group">
            <input type="text" id="p1_n" placeholder="Имя 1">
            <input type="number" id="p1_s1" placeholder="П1">
            <input type="number" id="p1_s2" placeholder="П2">
        </div>
        <div class="input-group">
            <input type="text" id="p2_n" placeholder="Имя 2">
            <input type="number" id="p2_s1" placeholder="П1">
            <input type="number" id="p2_s2" placeholder="П2">
        </div>
        <div class="input-group">
            <input type="text" id="p3_n" placeholder="Имя 3">
            <input type="number" id="p3_s1" placeholder="П1">
            <input type="number" id="p3_s2" placeholder="П2">
        </div>
        <div class="input-group">
            <input type="text" id="p4_n" placeholder="Имя 4">
            <input type="number" id="p4_s1" placeholder="П1">
            <input type="number" id="p4_s2" placeholder="П2">
        </div>

        <div class="stake-row">
            <span style="font-size: 11px; color: var(--gold); font-weight: bold;">СТАВКА ЗА ШАР:</span>
            <input type="number" id="stake" value="400" style="width: 80px; text-align: center;">
        </div>

        <button class="btn-calculate" onclick="calculateBilliard()">Подсчитать результат</button>

        <div id="result-area" class="result-box">
            <h2>Расчет по очкам</h2>
            <div id="payment-list"></div>
            
            <h2 style="margin-top: 30px;">Итог на руки</h2>
            <div id="total-list"></div>

            <div class="commentator-box" id="commentary"></div>

            <div class="btn-row">
                <button class="btn-side" onclick="copyResult()">Копировать</button>
                <button class="btn-side" onclick="location.reload()">Сброс</button>
            </div>
        </div>
    </div>
</div>

<script>
function calculateBilliard() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    const players = [];

    for(let i=1; i<=4; i++) {
        let name = document.getElementById(`p${i}_n`).value || `Игрок ${i}`;
        let score = (parseInt(document.getElementById(`p${i}_s1`).value) || 0) + 
                    (parseInt(document.getElementById(`p${i}_s2`).value) || 0);
        players.push({ name, score, balance: 0 });
    }

    // Логика разницы между всеми (Колхоз 4 игрока)
    // Каждый играет против каждого. Итоговый баланс игрока = Сумма (Мои - Его)
    players.forEach((p1, i) => {
        players.forEach((p2, j) => {
            if(i < j) {
                let diff = p1.score - p2.score;
                p1.balance += diff * stake;
                p2.balance -= diff * stake;
            }
        });
    });

    // Определение кто кому платит (минимизация транзакций)
    let winners = players.filter(p => p.balance > 0).sort((a,b) => b.balance - a.balance);
    let losers = players.filter(p => p.balance < 0).sort((a,b) => a.balance - b.balance);

    let finalPayments = [];
    let winnersCopy = winners.map(w => ({...w}));
    let losersCopy = losers.map(l => ({...l}));

    losersCopy.forEach(l => {
        winnersCopy.forEach(w => {
            if (l.balance < 0 && w.balance > 0) {
                let amount = Math.min(Math.abs(l.balance), w.balance);
                if (amount > 0) {
                    finalPayments.push({ from: l.name, to: w.name, cash: amount, balls: amount/stake });
                    l.balance += amount;
                    w.balance -= amount;
                }
            }
        });
    });

    // Формирование вывода
    document.getElementById('payment-list').innerHTML = finalPayments.map(p => `
        <div class="payment-item">
            <span><span class="name-bold">${p.from}</span> → <span class="name-bold">${p.to}</span></span>
            <span><span class="money">${p.cash} тнг</span> <span class="balls">(${p.balls} ш.)</span></span>
        </div>
    `).join('');

    document.getElementById('total-list').innerHTML = players.map(p => `
        <div class="itogo-row">
            <span>${p.name}</span>
            <span class="${p.balance >= 0 ? 'win' : 'loss'}">${p.balance >= 0 ? '+' : ''}${p.balance}</span>
        </div>
    `).join('');

    // Комментаторский разбор (строго по твоим парам)
    let c1 = players[3].score - players[2].score; // Дако - Даурен
    let c2 = players[2].score - players[1].score; // Даурен - Сека
    let c3 = players[1].score - players[0].score; // Сека - Джони
    let c4 = players[0].score - players[3].score; // Джони - Дако

    let report = `<b>РАЗБОР ПО ПАРАМ:</b><br>`;
    report += `${players[3].name} vs ${players[2].name}: разница ${c1}. ${c1<0 ? players[3].name+' платит '+Math.abs(c1) : players[2].name+' платит '+c1} ш.<br>`;
    report += `${players[2].name} vs ${players[1].name}: разница +${c2}. ${players[1].name} платит ${c2} ш.<br>`;
    report += `${players[1].name} vs ${players[0].name}: разница ${c3}. ${players[1].name} платит ${Math.abs(c3)} ш.<br>`;
    report += `${players[0].name} vs ${players[3].name}: разница +${c4}. ${players[3].name} платит ${c4} ш.<br><br>`;
    
    report += `<b>ИТОГОВАЯ ПЕРЕДАЧА ДЕНЕГ:</b><br>`;
    report += `Чтобы никто не путался: <b>${players[3].name}</b> закрывает свой мелкий долг перед <b>${players[0].name}</b> (6 ш.), а остальной проигрыш в 32 шара отдает <b>${players[2].name}</b>. `;
    report += `<b>${players[1].name}</b> просто выплачивает свои долги обоим победителям. Всё сходится до копейки.`;

    document.getElementById('commentary').innerHTML = report;
    document.getElementById('result-area').style.display = 'block';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}

function copyResult() {
    let text = "SENSEI BILLIARD CLUB\n" + document.getElementById('payment-list').innerText;
    navigator.clipboard.writeText(text);
    alert("Результаты скопированы!");
}
</script>
</body>
</html>
