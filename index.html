<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI CLUB — Калькулятор 2-х партий</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #062d1f;
            --deep-green: #041a11;
            --card-bg: #0a3622;
            --input-bg: #03140d;
            --text: #e0e0e0;
            --green: #4ade80;
            --red: #ff5c5c;
        }

        body {
            margin: 0; padding: 10px;
            background: var(--deep-green);
            color: var(--text);
            font-family: -apple-system, sans-serif;
        }

        .container { max-width: 480px; margin: 0 auto; }

        .header { text-align: center; margin: 15px 0; }
        .header h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 20px; }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid rgba(212,175,55,0.2); }

        /* Сетка заголовков */
        .grid-header {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 0.8fr;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 12px;
            color: var(--gold);
            text-align: center;
            font-weight: bold;
        }

        .player-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 0.8fr;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        input { 
            background: var(--input-bg); border: 1px solid #155236; color: white; 
            padding: 10px 5px; border-radius: 8px; font-size: 15px; text-align: center;
            width: 100%; box-sizing: border-box;
        }
        input[type="text"] { text-align: left; padding-left: 10px; }
        input:focus { border-color: var(--gold); outline: none; }

        .sum-cell {
            background: rgba(255,255,255,0.05);
            padding: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            color: var(--gold);
            text-align: center;
            font-size: 16px;
        }

        .stake-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .btn-calc { 
            width: 100%; background: var(--gold); color: black; font-weight: bold; 
            padding: 16px; border-radius: 12px; border: none; font-size: 16px; 
            margin-bottom: 10px; text-transform: uppercase; cursor: pointer;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sub { background: #4a6fa5; color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;}
        .btn-reset { background: #8a3434; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer;}

        .result-box { 
            margin-top: 20px; background: var(--input-bg); padding: 15px; border-radius: 10px; 
            display: none; line-height: 1.6; border: 1px solid var(--gold);
        }
        .res-section { margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .res-title { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; }
        .plus { color: var(--green); font-weight: bold; }
        .minus { color: var(--red); font-weight: bold; }
        .info { color: #88a394; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SENSEI BILLIARD CLUB</h1>
        <div style="font-size: 12px; color: var(--gold)">КАЛЬКУЛЯТОР: ТУДА + ОБРАТКА</div>
    </div>

    <div class="card">
        <div class="grid-header">
            <div>ИГРОК</div>
            <div>ПАРТИЯ 1</div>
            <div>ПАРТИЯ 2</div>
            <div>ИТОГ</div>
        </div>

        <div id="players-input">
            <div class="player-row">
                <input type="text" id="n1" value="Дако">
                <input type="number" id="p1_1" placeholder="0" oninput="updateSums()">
                <input type="number" id="p1_2" placeholder="0" oninput="updateSums()">
                <div class="sum-cell" id="sum1">0</div>
            </div>
            <div class="player-row">
                <input type="text" id="n2" value="Даурен">
                <input type="number" id="p2_1" placeholder="0" oninput="updateSums()">
                <input type="number" id="p2_2" placeholder="0" oninput="updateSums()">
                <div class="sum-cell" id="sum2">0</div>
            </div>
            <div class="player-row">
                <input type="text" id="n3" value="Сека">
                <input type="number" id="p3_1" placeholder="0" oninput="updateSums()">
                <input type="number" id="p3_2" placeholder="0" oninput="updateSums()">
                <div class="sum-cell" id="sum3">0</div>
            </div>
            <div class="player-row">
                <input type="text" id="n4" value="Джони">
                <input type="number" id="p4_1" placeholder="0" oninput="updateSums()">
                <input type="number" id="p4_2" placeholder="0" oninput="updateSums()">
                <div class="sum-cell" id="sum4">0</div>
            </div>
        </div>

        <div class="stake-box">
            <span style="font-weight: bold; font-size: 14px;">СТАВКА ЗА ШАР:</span>
            <input type="number" id="stake" value="400" style="width: 80px; padding: 5px;">
        </div>

        <button class="btn-calc" onclick="calculate()">Подсчитать результат</button>
        
        <div class="btn-group">
            <button class="btn-sub" onclick="copyResult()">📋 Копировать</button>
            <button class="btn-reset" onclick="window.location.reload()">🔄 Сброс</button>
        </div>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    function updateSums() {
        for (let i = 1; i <= 4; i++) {
            let p1 = Number(document.getElementById(`p${i}_1`).value) || 0;
            let p2 = Number(document.getElementById(`p${i}_2`).value) || 0;
            document.getElementById(`sum${i}`).innerText = p1 + p2;
        }
    }

    function calculate() {
        const stake = Number(document.getElementById('stake').value) || 400;
        const names = [
            document.getElementById('n1').value || "Игрок 1",
            document.getElementById('n2').value || "Игрок 2",
            document.getElementById('n3').value || "Игрок 3",
            document.getElementById('n4').value || "Игрок 4"
        ];
        
        // Берем СУММУ двух партий
        const totalScores = [
            Number(document.getElementById('sum1').innerText),
            Number(document.getElementById('sum2').innerText),
            Number(document.getElementById('sum3').innerText),
            Number(document.getElementById('sum4').innerText)
        ];

        let diffHtml = `<div class="res-section"><div class="res-title">Разница по сумме игр:</div>`;
        let payHtml = `<div class="res-section"><div class="res-title">Кто кому платит:</div>`;
        let finalHtml = `<div class="res-section"><div class="res-title">Итог по деньгам:</div>`;

        let totalCash = [0, 0, 0, 0];

        // Расчет по кругу на основе СУММАРНЫХ очков
        for (let i = 0; i < 4; i++) {
            let next = (i + 1) % 4;
            let d = totalScores[i] - totalScores[next];
            
            let sign = d > 0 ? "+" : "";
            diffHtml += `<div class="info">${names[i]} (${totalScores[i]}) - ${names[next]} (${totalScores[next]}) = <b>${sign}${d}</b></div>`;

            // Выплаты
            if (d < 0) {
                let points = Math.abs(d);
                let money = points * stake;
                payHtml += `<div><b>${names[i]}</b> → ${names[next]} = ${points} (<span class="minus">${money} тг</span>)</div>`;
                totalCash[i] -= money;
                totalCash[next] += money;
            } else if (d > 0) {
                let points = d;
                let money = points * stake;
                payHtml += `<div><b>${names[next]}</b> → ${names[i]} = ${points} (<span class="minus">${money} тг</span>)</div>`;
                totalCash[next] -= money;
                totalCash[i] += money;
            }
        }

        // Финальный баланс
        for (let i = 0; i < 4; i++) {
            let cls = totalCash[i] >= 0 ? "plus" : "minus";
            let sign = totalCash[i] > 0 ? "+" : "";
            finalHtml += `<div>${names[i]}: <span class="${cls}">${sign}${totalCash[i]} тг</span></div>`;
        }

        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        resDiv.innerHTML = diffHtml + "</div>" + payHtml + "</div>" + finalHtml + "</div>";
        
        // Прокрутка вниз к результату
        resDiv.scrollIntoView({ behavior: 'smooth' });
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        if(!text) return alert("Сначала подсчитайте результат!");
        navigator.clipboard.writeText("🎱 SENSEI CLUB\n" + text);
        alert("Результат скопирован для WhatsApp!");
    }
</script>

</body>
</html>
