<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD CALCULATOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        :root { --gold: #c5a059; --bg: #020d08; --card: #0a2417; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Montserrat', sans-serif; }
        .header img { width: 100%; display: block; border-bottom: 2px solid var(--gold); }
        .container { padding: 15px; max-width: 480px; margin: 0 auto; }
        .main-card { background: var(--card); border: 1px solid rgba(197,160,89,0.2); border-radius: 12px; padding: 15px; }
        .player-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input { background: rgba(0,0,0,0.3); border: 1px solid #1a523a; color: #fff; padding: 10px; border-radius: 6px; text-align: center; width: 100%; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--gold); color: #000; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .res-box { margin-top: 20px; border-top: 1px solid rgba(197,160,89,0.3); padding-top: 15px; }
        .pay-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 5px; border-left: 3px solid var(--gold); font-size: 14px; }
        .chain-log { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.6; }
        .chain-log b { color: var(--gold); }
    </style>
</head>
<body>
    <div class="header"><img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg"></div>
    <div class="container">
        <div class="main-card">
            <div id="inputs"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0;">
                <span style="font-size:12px; font-weight:800; color:var(--gold)">СТАВКА:</span>
                <input type="number" id="stake" value="400" style="width:80px">
            </div>
            <button class="btn" onclick="calculate()">Подсчитать результат</button>
            <div id="results" class="res-box" style="display:none">
                <div id="pay-list"></div>
                <div class="chain-log" id="log"></div>
            </div>
        </div>
    </div>

<script>
function init() {
    const names = ['Джони', 'Сека', 'Даурен', 'Дако'];
    document.getElementById('inputs').innerHTML = names.map((n, i) => `
        <div class="player-row">
            <input type="text" id="n${i}" value="${n}">
            <input type="number" id="s${i}_1" placeholder="П1">
            <input type="number" id="s${i}_2" placeholder="П2">
        </div>`).join('');
}

function calculate() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    const p = [];
    for(let i=0; i<4; i++) {
        p.push({
            name: document.getElementById(`n${i}`).value,
            score: (parseInt(document.getElementById(`s${i}_1`).value) || 0) + (parseInt(document.getElementById(`s${i}_2`).value) || 0),
            balance: 0
        });
    }

    // Логика цепочки по кругу: (0-1), (1-2), (2-3), (3-0)
    let logHtml = "<b>ЦЕПОЧКА РАЗНИЦЫ:</b><br>";
    let diffs = [];
    for(let i=0; i<4; i++) {
        let next = (i + 1) % 4;
        let d = p[i].score - p[next].score;
        p[i].balance += d;
        p[next].balance -= d;
        diffs.push(d);
        logHtml += `${p[i].name} (${p[i].score}) - ${p[next].name} (${p[next].score}) = ${d > 0 ? '+'+d : d}<br>`;
    }

    // Расчет выплат
    let winners = p.filter(x => x.balance > 0).map(x => ({...x}));
    let losers = p.filter(x => x.balance < 0).map(x => ({...x, balance: Math.abs(x.balance)}));
    
    let pays = [];
    // Сначала закрываем долги по кругу, чтобы соответствовать логике примера
    losers.forEach(l => {
        winners.forEach(w => {
            if (l.balance > 0 && w.balance > 0) {
                let amount = Math.min(l.balance, w.balance);
                pays.push(`${l.name} платит ${w.name}: <b>${amount * stake} тнг</b> (${amount} ш.)`);
                l.balance -= amount;
                w.balance -= amount;
            }
        });
    });

    document.getElementById('pay-list').innerHTML = pays.map(x => `<div class="pay-item">${x}</div>`).join('');
    document.getElementById('log').innerHTML = logHtml;
    document.getElementById('results').style.display = 'block';
}
init();
</script>
</body>
</html>
