<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD CLUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;800&display=swap');

        :root {
            --gold: #c5a059;
            --gold-bright: #f1d392;
            --bg-dark: #020d08;
            --card-bg: #0a2417;
            --input-bg: rgba(0,0,0,0.4);
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #e0e0e0; font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .header { width: 100%; border-bottom: 2px solid var(--gold); background: #000; }
        .header img { width: 100%; display: block; height: auto; }

        .container { padding: 15px; max-width: 480px; margin: 0 auto; box-sizing: border-box; }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .mode-btn {
            flex: 1; padding: 14px 5px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold); border-radius: 8px;
            font-weight: 800; font-size: 10px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .mode-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        .main-card {
            background: var(--card-bg); border: 1px solid rgba(197, 160, 89, 0.25);
            border-radius: 16px; padding: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .table-header {
            display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px;
            margin-bottom: 8px; padding: 0 5px;
        }
        .table-header span { font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase; text-align: center; }

        .player-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }

        input {
            background: var(--input-bg); border: 1px solid #1a523a;
            color: #fff; padding: 12px 8px; border-radius: 8px;
            font-size: 15px; outline: none; text-align: center; width: 100%; box-sizing: border-box;
        }
        input::placeholder { color: rgba(255,255,255,0.2); font-size: 13px; }
        input[type="text"] { text-align: left; padding-left: 12px; }
        input:focus { border-color: var(--gold); background: rgba(197, 160, 89, 0.05); }

        .stake-section {
            margin: 20px 0; padding: 12px; background: rgba(0,0,0,0.25);
            border-radius: 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .stake-label { font-size: 11px; font-weight: 800; color: var(--gold); text-transform: uppercase; }

        .btn-main {
            width: 100%; padding: 20px; border: none; border-radius: 10px;
            background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
            color: #000; font-weight: 900; font-size: 15px; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .res-container { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title {
            font-family: 'Cinzel', serif; color: var(--gold);
            text-align: center; font-size: 14px; margin: 25px 0 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .section-title::before, .section-title::after { content: ""; height: 1px; width: 30px; background: var(--gold); opacity: 0.4; }

        .pay-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: rgba(255,255,255,0.03);
            border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--gold);
        }
        .pay-names { font-size: 13px; font-weight: 600; }
        .amt-cash { color: var(--gold-bright); font-weight: 800; display: block; text-align: right; }
        .amt-balls { font-size: 11px; color: #888; display: block; text-align: right; }

        .total-row { display: flex; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .win { color: #4ade80; font-weight: 800; }
        .loss { color: #ff5c5c; font-weight: 800; }

        .commentary {
            background: #04120c; border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 12px; line-height: 1.6; color: #bbb;
        }
        .commentary b { color: var(--gold-bright); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn-side {
            background: transparent; border: 1px solid rgba(197, 160, 89, 0.5);
            color: var(--gold); padding: 12px; border-radius: 8px; font-size: 11px;
            text-transform: uppercase; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg" alt="SENSEI BILLIARD CLUB">
</div>

<div class="container">
    <div class="mode-selector">
        <button class="mode-btn active" id="m-solo" onclick="setMode('solo')">Каждый сам за себя</button>
        <button class="mode-btn" id="m-team" onclick="setMode('team')">2 на 2</button>
    </div>

    <div class="main-card">
        <div class="table-header">
            <span>Игрок</span>
            <span>П1</span>
            <span>П2</span>
        </div>
        
        <div id="players-box">
            </div>

        <div class="stake-section">
            <span class="stake-label">Ставка за шар:</span>
            <input type="number" id="stake" value="400" style="width: 80px;">
        </div>

        <button class="btn-main" onclick="calculate()">Подсчитать результат</button>

        <div id="results" class="res-container">
            <div class="section-title">Расчет выплат</div>
            <div id="pay-list"></div>
            
            <div class="section-title">Общий итог</div>
            <div id="total-list"></div>

            <div class="commentary" id="comment-box"></div>

            <div class="actions">
                <button class="btn-side" onclick="copy()">Скопировать</button>
                <button class="btn-side" onclick="location.reload()">Сбросить</button>
            </div>
        </div>
    </div>
</div>

<script>
let mode = 'solo';

function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(m === 'solo' ? 'm-solo' : 'm-team').classList.add('active');
}

function init() {
    const box = document.getElementById('players-box');
    box.innerHTML = Array(4).fill(0).map((_, i) => `
        <div class="player-row">
            <input type="text" id="n${i}" placeholder="Имя игрока ${i+1}">
            <input type="number" id="s${i}_1" placeholder="0">
            <input type="number" id="s${i}_2" placeholder="0">
        </div>
    `).join('');
}

function calculate() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    const players = [];
    
    for(let i=0; i<4; i++) {
        players.push({
            name: document.getElementById(`n${i}`).value || `Игрок ${i+1}`,
            score: (parseInt(document.getElementById(`s${i}_1`).value) || 0) + 
                   (parseInt(document.getElementById(`s${i}_2`).value) || 0),
            balance: 0
        });
    }

    let detail = "<b>ПОДРОБНЫЙ РАЗБОР:</b><br>";
    
    if(mode === 'solo') {
        // Расчет каждый с каждым
        players.forEach((p1, i) => {
            players.forEach((p2, j) => {
                if(i < j) {
                    let d = p1.score - p2.score;
                    p1.balance += d * stake;
                    p2.balance -= d * stake;
                }
            });
        });

        // Цепочка для разбора (как просил пользователь)
        const chain = [[3,2], [2,1], [1,0], [0,3]]; // Дако-Даурен, Даурен-Сека и т.д.
        chain.forEach(pair => {
            let pA = players[pair[0]];
            let pB = players[pair[1]];
            let diff = pA.score - pB.score;
            detail += `${pA.name} vs ${pB.name}: разница ${diff > 0 ? '+'+diff : diff}. ${diff < 0 ? pA.name + ' платит ' + Math.abs(diff) : pB.name + ' платит ' + diff} ш.<br>`;
        });
    } else {
        // Режим 2 на 2
        let t1 = players[0].score + players[1].score;
        let t2 = players[2].score + players[3].score;
        let diff = t1 - t2;
        players[0].balance = players[1].balance = diff * stake;
        players[2].balance = players[3].balance = -diff * stake;
        detail = `<b>РЕЖИМ 2 НА 2:</b><br>Команда 1: ${t1} ш.<br>Команда 2: ${t2} ш.<br>Разница: ${Math.abs(diff)} ш.`;
    }

    // Алгоритм выплат
    let winners = [...players].filter(p => p.balance > 0).sort((a,b) => b.balance - a.balance);
    let losers = [...players].filter(p => p.balance < 0).sort((a,b) => a.balance - b.balance);
    
    let payHtml = "";
    losers.forEach(l => {
        let lBal = Math.abs(l.balance);
        winners.forEach(w => {
            if(lBal > 0 && w.balance > 0) {
                let transfer = Math.min(lBal, w.balance);
                payHtml += `
                    <div class="pay-item">
                        <div class="pay-names">${l.name} → ${w.name}</div>
                        <div class="pay-amount">
                            <span class="amt-cash">${transfer} тнг</span>
                            <span class="amt-balls">(${transfer/stake} ш.)</span>
                        </div>
                    </div>`;
                lBal -= transfer;
                w.balance -= transfer;
            }
        });
    });

    document.getElementById('pay-list').innerHTML = payHtml || "<div style='text-align:center; padding:20px; opacity:0.5;'>Ничья</div>";
    
    // Отрисовка итогов
    renderTotals(players, stake);
    
    document.getElementById('comment-box').innerHTML = detail;
    document.getElementById('results').style.display = 'block';
    window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}

function renderTotals(players, stake) {
    // Пересчет чистого баланса для вывода
    let results = players.map(p => ({...p, balance: 0}));
    if(mode === 'solo') {
        results.forEach((p1, i) => {
            results.forEach((p2, j) => {
                if(i < j) {
                    let d = p1.score - p2.score;
                    p1.balance += d * stake;
                    p2.balance -= d * stake;
                }
            });
        });
    } else {
        let t1 = results[0].score + results[1].score;
        let t2 = results[2].score + results[3].score;
        let diff = t1 - t2;
        results[0].balance = results[1].balance = diff * stake;
        results[2].balance = results[3].balance = -diff * stake;
    }

    document.getElementById('total-list').innerHTML = results.map(p => `
        <div class="total-row">
            <span>${p.name}</span>
            <span class="${p.balance >= 0 ? 'win' : 'loss'}">${p.balance >= 0 ? '+' : ''}${p.balance}</span>
        </div>
    `).join('');
}

function copy() {
    let t = "SENSEI BILLIARD CLUB\n" + document.getElementById('pay-list').innerText;
    navigator.clipboard.writeText(t);
    alert("Результаты скопированы!");
}

init();
</script>
</body>
</html>
