<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSEI BILLIARD CLUB | Калькулятор</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #062d1f;
            --deep-green: #0c3c2b;
            --input-bg: #041c14;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, var(--deep-green), #020f0a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(20, 60, 44, 0.6);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--gold);
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .card {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 100px;
            gap: 10px;
        }

        input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #1f4f3a;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .stake-box {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 10px;
        }

        label {
            color: var(--gold);
            font-weight: bold;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            cursor: pointer;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.3s;
        }

        button:active { transform: scale(0.98); }

        .calc { background: var(--gold); color: #000; }
        .copy { background: #4a6fa5; color: white; }
        .reset { background: #8a3434; color: white; }

        .result {
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--gold);
            line-height: 1.6;
            font-family: 'Courier New', Courier, monospace;
            display: none;
        }

        .footer-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .footer-menu button {
            padding: 10px;
            font-size: 12px;
            background: #1f4f3a;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SENSEI CLUB</h1>
        <p>Калькулятор игры «Колхоз»</p>
    </div>

    <div class="card">
        <div class="row">
            <input id="n1" placeholder="Имя 1" value="Джони">
            <input id="p1" type="number" placeholder="Очки">
        </div>
        <div class="row">
            <input id="n2" placeholder="Имя 2" value="Сека">
            <input id="p2" type="number" placeholder="Очки">
        </div>
        <div class="row">
            <input id="n3" placeholder="Имя 3" value="Даурен">
            <input id="p3" type="number" placeholder="Очки">
        </div>
        <div class="row">
            <input id="n4" placeholder="Имя 4" value="Дако">
            <input id="p4" type="number" placeholder="Очки">
        </div>

        <div class="stake-box">
            <label>СТАВКА (тнг):</label>
            <input id="stake" type="number" value="400" style="width: 80px; padding: 8px;">
        </div>

        <div class="btn-group">
            <button class="calc" onclick="calculate()">ПОДСЧИТАТЬ ИТОГИ</button>
            <button class="copy" onclick="copyResult()">КОПИРОВАТЬ</button>
            <button class="reset" onclick="resetForm()">СБРОС</button>
        </div>

        <div id="result" class="result"></div>
    </div>
</div>

<script>
function calculate() {
    const stake = Number(document.getElementById('stake').value);
    const players = [
        { name: document.getElementById('n1').value || "Игрок 1", score: Number(document.getElementById('p1').value) },
        { name: document.getElementById('n2').value || "Игрок 2", score: Number(document.getElementById('p2').value) },
        { name: document.getElementById('n3').value || "Игрок 3", score: Number(document.getElementById('p3').value) },
        { name: document.getElementById('n4').value || "Игрок 4", score: Number(document.getElementById('p4').value) }
    ];

    // 1. Считаем разницу между соседями
    let diffs = [];
    for (let i = 0; i < 4; i++) {
        let current = players[i];
        let next = players[(i + 1) % 4];
        let d = current.score - next.score;
        diffs.push({ fromIdx: i, toIdx: (i + 1) % 4, diff: d });
    }

    // 2. Считаем баланс каждого (сколько очков должен или сколько должны ему)
    let balance = [0, 0, 0, 0];
    let logs = [];
    
    diffs.forEach(item => {
        let p1 = players[item.fromIdx].name;
        let p2 = players[item.toIdx].name;
        let sign = item.diff > 0 ? "+" : "";
        logs.push(`${p1} ${item.score} - ${p2} ${players[item.toIdx].score} = ${sign}${item.diff}`);
        
        balance[item.fromIdx] += item.diff;
        balance[item.toIdx] -= item.diff;
    });

    // 3. Формируем список выплат
    let results = [];
    let winners = []; // Те, кому должны (+)
    let losers = [];  // Те, кто должен (-)

    for (let i = 0; i < 4; i++) {
        if (balance[i] > 0) winners.push({ idx: i, pts: balance[i] });
        if (balance[i] < 0) losers.push({ idx: i, pts: Math.abs(balance[i]) });
    }

    // Алгоритм распределения: проигрывавшие закрывают долги перед выигравшими
    losers.forEach(l => {
        winners.forEach(w => {
            if (l.pts > 0 && w.pts > 0) {
                let pay = Math.min(l.pts, w.pts);
                if (pay > 0) {
                    results.push(`${players[l.idx].name} платит ${players[w.idx].name}: ${pay} * ${stake} = **${pay * stake} тнг**`);
                    l.pts -= pay;
                    w.pts -= pay;
                }
            }
        });
    });

    // Вывод
    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `
        <strong>РАСЧЕТ РАЗНИЦЫ:</strong><br>
        ${logs.join('<br>')}<br><br>
        <strong>ИТОГИ ВЫПЛАТ:</strong><br>
        ${results.join('<br>')}
    `;
}

function copyResult() {
    const text = document.getElementById('result').innerText;
    if(!text) return;
    navigator.clipboard.writeText(text);
    alert('Результат скопирован!');
}

function resetForm() {
    document.querySelectorAll('input[type="number"]').forEach(i => i.id !== 'stake' ? i.value = '' : null);
    document.getElementById('result').style.display = 'none';
}
</script>

</body>
</html>
