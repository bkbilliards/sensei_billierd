<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(180deg,#041c13,#0a3524);
color:white;
text-align:center;
}

/* ШАПКА */

.header{
background:#05160f;
padding:20px;
font-size:22px;
font-weight:bold;
color:#d4af37;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

/* КАРТОЧКА */

.card{
background:#123524;
max-width:700px;
margin:30px auto;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* СТРОКИ */

.row{
display:flex;
gap:10px;
margin-bottom:12px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#0e241a;
color:white;
}

/* КНОПКИ */

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

.calc{
background:#d4af37;
color:black;
}

.copy{
background:#506a85;
color:white;
}

.reset{
background:#8b2a2a;
color:white;
}

/* РЕЗУЛЬТАТ */

.result{
background:#05160f;
padding:18px;
border-radius:12px;
margin-top:20px;
text-align:left;
}

.green{
color:#48ff89;
}

.red{
color:#ff6b6b;
}

.footer{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор игры Колхоз
</div>

<div class="card">

<div class="row">
<input id="stake" type="number" value="400" placeholder="Ставка за очко">
</div>

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="s1" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="s2" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="s3" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="s4" type="number" placeholder="Очки">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

<div class="footer">
SENSEI BILLIARD CLUB
</div>

</div>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake = Number(document.getElementById("stake").value)

let players=[
{name:n1.value,score:Number(s1.value)},
{name:n2.value,score:Number(s2.value)},
{name:n3.value,score:Number(s3.value)},
{name:n4.value,score:Number(s4.value)}
]

players = players.filter(p=>p.name!="")

let balance={}
players.forEach(p=>balance[p.name]=0)

let diffs=[]

for(let i=0;i<players.length;i++){

let current=players[i]
let next=players[(i+1)%players.length]

let diff=current.score-next.score

diffs.push(`${current.name} ${current.score} - ${next.name} ${next.score} = ${diff}`)

balance[current.name]+=diff
balance[next.name]-=diff

}

let positive=[]
let negative=[]

for(let name in balance){

if(balance[name]>0){
positive.push({name:name,value:balance[name]})
}

if(balance[name]<0){
negative.push({name:name,value:Math.abs(balance[name])})
}

}

let payments=[]

for(let n of negative){

for(let p of positive){

if(n.value==0) break

let pay=Math.min(n.value,p.value)

payments.push(`${n.name} → ${p.name} = ${pay} очков (${formatMoney(pay*stake)} тнг)`)

n.value-=pay
p.value-=pay

}

}

let html="<div class='result'>"

html+="<b>РАЗНИЦА</b><br>"

diffs.forEach(d=>html+=d+"<br>")

html+="<br><b>БАЛАНС</b><br>"

for(let name in balance){

let val=balance[name]

if(val>0){
html+=`<div class="green">${name} +${val}</div>`
}
else if(val<0){
html+=`<div class="red">${name} ${val}</div>`
}
else{
html+=`${name} 0<br>`
}

}

html+="<br><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(p=>html+=p+"<br>")

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){

let text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

</script>

</body>
</html>
