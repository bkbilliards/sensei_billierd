<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02140e,#0a3a27);
color:white;
}

/* ШАПКА */

.header{
background:#031b13;
padding:20px;
text-align:center;
border-bottom:2px solid #0f3a28;
}

.headerTitle{
font-size:26px;
color:#d4af37;
font-weight:bold;
letter-spacing:1px;
}

.headerSub{
font-size:13px;
opacity:0.7;
margin-top:4px;
}

/* ПАНЕЛЬ */

.clubPanel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
max-width:900px;
margin:20px auto;
padding:0 15px;
}

.panelBtn{
background:#0b2419;
border-radius:14px;
padding:18px;
text-align:center;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.panelBtn:hover{
transform:scale(1.05);
background:#123524;
}

.icon{
font-size:28px;
margin-bottom:6px;
}

/* КАЛЬКУЛЯТОР */

.container{
max-width:900px;
margin:auto;
background:#123524;
padding:25px;
border-radius:18px;
}

/* ТАБЛИЦА */

.gridHeader{
display:grid;
grid-template-columns:1.4fr 1fr 1fr;
gap:10px;
margin-bottom:8px;
opacity:0.8;
}

.gridHeader div{
text-align:center;
}

.gridHeader div:first-child{
text-align:left;
}

.grid{
display:grid;
grid-template-columns:1.4fr 1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.grid input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0b2419;
color:white;
font-size:16px;
box-sizing:border-box;
}

/* КНОПКИ */

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#5c6f8c;color:white;}
.reset{background:#8c2b2b;color:white;}
.save{background:#e4e4e4;color:#2d5cff;}

/* РЕЗУЛЬТАТ */

.result{
background:#05160f;
padding:20px;
border-radius:14px;
margin-top:20px;
line-height:1.6;
}

.green{color:#4cff9a;}
.red{color:#ff6b6b;}

</style>

</head>

<body>

<!-- ШАПКА -->

<div class="header">

<div class="headerTitle">
SENSEI BILLIARD CLUB
</div>

<div class="headerSub">
Калькулятор игры «Колхоз»
</div>

</div>

<!-- ПАНЕЛЬ -->

<div class="clubPanel">

<div class="panelBtn" onclick="openHistory()">
<div class="icon">📜</div>
<div>История</div>
</div>

<div class="panelBtn" onclick="openRating()">
<div class="icon">🏆</div>
<div>Рейтинг</div>
</div>

<div class="panelBtn" onclick="openPlayerDay()">
<div class="icon">⭐</div>
<div>Игрок дня</div>
</div>

<div class="panelBtn" onclick="openStats()">
<div class="icon">📊</div>
<div>Статистика</div>
</div>

<div class="panelBtn" onclick="window.open('https://2gis.kz/almaty/geo/70000001101734090')">
<div class="icon">🗺</div>
<div>Карта</div>
</div>

<div class="panelBtn" onclick="scrollToCalculator()">
<div class="icon">🎱</div>
<div>Калькулятор</div>
</div>

</div>

<!-- КАЛЬКУЛЯТОР -->

<div class="container" id="calculator">

<div class="gridHeader">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="grid">
<input id="n1" placeholder="Игрок 1">
<input id="p1_1" type="number" placeholder="Очки">
<input id="p2_1" type="number" placeholder="Очки">
</div>

<div class="grid">
<input id="n2" placeholder="Игрок 2">
<input id="p1_2" type="number" placeholder="Очки">
<input id="p2_2" type="number" placeholder="Очки">
</div>

<div class="grid">
<input id="n3" placeholder="Игрок 3">
<input id="p1_3" type="number" placeholder="Очки">
<input id="p2_3" type="number" placeholder="Очки">
</div>

<div class="grid">
<input id="n4" placeholder="Игрок 4">
<input id="p1_4" type="number" placeholder="Очки">
<input id="p2_4" type="number" placeholder="Очки">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>

<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>

<button class="reset" onclick="location.reload()">СБРОС</button>

<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

let balance={}

function calc(){

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value||0),
Number(p1_2.value||0),
Number(p1_3.value||0),
Number(p1_4.value||0)
]

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

balance={}
names.forEach(n=>balance[n]=0)

let html="<div class='result'>"

function pay(a,b,val){

let sum=val*400

html+=`${a} → ${b} = ${val} (${money(sum)} тг)<br>`

balance[a]-=sum
balance[b]+=sum

}

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){
let p=Math.min(d1,debt)
pay(names[1],names[0],p)
debt-=p
}

if(debt>0){
pay(names[1],names[2],debt)
}

}

if(d4<0){
pay(names[3],names[2],Math.abs(d4))
}

html+="<br><b>Итог</b><br>"

for(let p in balance){

let val=balance[p]

if(val>0){
html+=`<div class="green">${p} +${money(val)}</div>`
}else{
html+=`<div class="red">${p} ${money(val)}</div>`
}

}

html+="</div>"

result.innerHTML=html

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function saveGame(){

let history = JSON.parse(localStorage.getItem("sensei_history")||"[]")

let date=new Date().toLocaleDateString()

history.unshift({
date:date,
players:balance
})

localStorage.setItem("sensei_history",JSON.stringify(history))

alert("Игра сохранена")

}

function scrollToCalculator(){

document.getElementById("calculator")
.scrollIntoView({behavior:"smooth"})

}

</script>

</body>
</html>
