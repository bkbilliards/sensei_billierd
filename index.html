<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD CALCULATOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;700&display=swap');

        :root {
            --cloth-green: #0a2e1f;
            --dark-wood: #05160f;
            --gold: #c5a059;
            --gold-light: #e3c184;
            --text: #e0e0e0;
            --win: #4ade80;
            --loss: #ff5c5c;
            --panel: #0d3d2a;
        }

        body {
            margin: 0; padding: 0; background: var(--dark-wood); color: var(--text);
            font-family: 'Roboto', sans-serif; line-height: 1.6;
        }

        /* ШАПКА */
        .header-img {
            width: 100%; height: auto; display: block;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .container { padding: 15px; max-width: 480px; margin: 0 auto; }

        /* КАРТОЧКИ */
        .card {
            background: var(--panel);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 16px;
            margin: 0 0 15px 0;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 8px;
            text-align: center;
        }

        /* ПОЛЯ ВВОДА */
        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-row label {
            grid-column: span 3;
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: -5px;
            font-weight: bold;
        }

        input {
            background: #04120c;
            border: 1px solid #1a523a;
            color: #fff;
            padding: 12px 8px;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--gold); }

        .stake-box {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin: 20px 0; background: rgba(0,0,0,0.2);
            padding: 10px; border-radius: 4px;
        }

        /* КНОПКИ */
        .btn-main {
            width: 100%;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 100%);
            color: #1a1a1a;
            border: none;
            padding: 18px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            flex: 1;
        }

        /* РЕЗУЛЬТАТЫ */
        .res-row {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 15px;
        }

        .win-text { color: var(--win); font-weight: bold; }
        .loss-text { color: var(--loss); font-weight: bold; }

        .explanation {
            background: #05160f;
            border-left: 3px solid var(--gold);
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            color: #bbb;
            display: none;
        }

        .explanation b { color: var(--gold-light); }

        .footer-nav {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg" class="header-img">

<div class="container">
    
    <div class="card">
        <h2>Ввод данных</h2>
        
        <div class="input-row">
            <input type="text" id="p1_n" value="Джони">
            <input type="number" id="p1_s1" placeholder="П1">
            <input type="number" id="p1_s2" placeholder="П2">
        </div>

        <div class="input-row">
            <input type="text" id="p2_n" value="Сека">
            <input type="number" id="p2_s1" placeholder="П1">
            <input type="number" id="p2_s2" placeholder="П2">
        </div>

        <div class="input-row">
            <input type="text" id="p3_n" value="Даурен">
            <input type="number" id="p3_s1" placeholder="П1">
            <input type="number" id="p3_s2" placeholder="П2">
        </div>

        <div class="input-row">
            <input type="text" id="p4_n" value="Дако">
            <input type="number" id="p4_s1" placeholder="П1">
            <input type="number" id="p4_s2" placeholder="П2">
        </div>

        <div class="stake-box">
            <span style="font-size: 12px; color: var(--gold);">СТАВКА ЗА ШАР:</span>
            <input type="number" id="stake" value="400" style="width: 80px; text-align: center;">
        </div>

        <button class="btn-main" onclick="calculate()">Подсчитать результат</button>
        
        <div id="result-area" style="display:none;">
            <h2>Итоги игры</h2>
            <div id="payment-list"></div>
            
            <div style="margin-top: 20px;">
                <button class="btn-secondary" style="width: 100%;" onclick="toggleDetails()">Разбор расчёта (внятно)</button>
                <div id="details-box" class="explanation"></div>
            </div>

            <div class="footer-nav" style="margin-top: 15px;">
                <button class="btn-secondary" onclick="copyResult()">Копировать</button>
                <button class="btn-secondary" onclick="location.reload()">Сброс</button>
                <button class="btn-secondary" onclick="alert('Сохранено в историю')">В историю</button>
            </div>
        </div>
    </div>
</div>

<script>
function calculate() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    const players = [];

    for(let i=1; i<=4; i++) {
        const name = document.getElementById(`p${i}_n`).value;
        const s1 = parseInt(document.getElementById(`p${i}_s1`).value) || 0;
        const s2 = parseInt(document.getElementById(`p${i}_s2`).value) || 0;
        players.push({ name, score: s1 + s2, balance: 0 });
    }

    // 1. Расчет разницы по кругу
    let diffs = [];
    for(let i=0; i<4; i++) {
        let next = (i + 1) % 4;
        diffs.push({
            fromIdx: i,
            toIdx: next,
            val: players[i].score - players[next].score // Плюс значит i выиграл у next
        });
    }

    let payments = [];
    let logs = [];
    let carryOver = 0;

    // 2. Логика выплаты
    for(let i=0; i<4; i++) {
        let d = diffs[i];
        let currentNeed = d.val - carryOver;
        let pCurrent = players[d.fromIdx];
        let pNext = players[d.toIdx];

        if (currentNeed > 0) {
            // Следующий платит текущему
            let money = currentNeed * stake;
            payments.push({ from: pNext.name, to: pCurrent.name, money, balls: currentNeed });
            logs.push(`<b>${pNext.name}</b> платит <b>${pCurrent.name}</b>: ${money} тнг (${currentNeed} ш.).`);
            players[d.fromIdx].balance += money;
            players[d.toIdx].balance -= money;
        } else if (currentNeed < 0) {
            // Текущий платит следующему
            let money = Math.abs(currentNeed) * stake;
            payments.push({ from: pCurrent.name, to: pNext.name, money, balls: Math.abs(currentNeed) });
            logs.push(`<b>${pCurrent.name}</b> платит <b>${pNext.name}</b>: ${money} тнг (${Math.abs(currentNeed)} ш.).`);
            players[d.fromIdx].balance -= money;
            players[d.toIdx].balance += money;
        }
        carryOver = -currentNeed;
    }

    // Вывод
    let html = "";
    payments.forEach(p => {
        html += `<div class="res-row"><span>${p.from} → ${p.to}</span> <span class="win-text">${p.money} тнг</span></div>`;
    });
    
    html += `<div style="margin-top:15px; border-top: 1px solid var(--gold); padding-top:10px;"><b>ЧИСТЫЙ ИТОГ:</b></div>`;
    players.forEach(p => {
        const cl = p.balance >= 0 ? 'win-text' : 'loss-text';
        html += `<div class="res-row"><span>${p.name}</span> <span class="${cl}">${p.balance >= 0 ? '+' : ''}${p.balance}</span></div>`;
    });

    document.getElementById('payment-list').innerHTML = html;
    document.getElementById('details-box').innerHTML = logs.join('<br><br>');
    document.getElementById('result-area').style.display = 'block';
}

function toggleDetails() {
    const box = document.getElementById('details-box');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

function copyResult() {
    let text = "SENSEI BILLIARD CLUB\nРезультаты:\n";
    text += document.getElementById('payment-list').innerText;
    navigator.clipboard.writeText(text);
    alert("Результаты скопированы!");
}
</script>
</body>
</html>
