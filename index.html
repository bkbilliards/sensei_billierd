<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(180deg,#041c13,#0a3524);
color:white;
text-align:center;
}

.header{
background:#05160f;
padding:20px;
font-size:22px;
font-weight:bold;
color:#d4af37;
}

.card{
background:#123524;
max-width:700px;
margin:30px auto;
padding:25px;
border-radius:16px;
}

.row{
display:flex;
gap:10px;
margin-bottom:12px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#0e241a;
color:white;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#506a85;color:white;}
.reset{background:#8b2a2a;color:white;}

.result{
background:#05160f;
padding:18px;
border-radius:12px;
margin-top:20px;
text-align:left;
}

</style>
</head>

<body>

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор игры Колхоз
</div>

<div class="card">

<div class="row">
<input id="stake" type="number" value="400">
</div>

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="s1" type="number">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="s2" type="number">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="s3" type="number">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="s4" type="number">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

</div>

<script>

function format(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake = Number(document.getElementById("stake").value)

let p=[
{name:n1.value,score:Number(s1.value)},
{name:n2.value,score:Number(s2.value)},
{name:n3.value,score:Number(s3.value)},
{name:n4.value,score:Number(s4.value)}
]

p=p.filter(x=>x.name!="")

let d1=p[0].score-p[1].score
let d2=p[1].score-p[2].score
let d3=p[2].score-p[3].score
let d4=p[3].score-p[0].score

let diffs=[d1,d2,d3,d4]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)

payments.push(`${p[1].name} → ${p[0].name} = ${pay} очков (${format(pay*stake)} тнг)`)

debt-=pay

}

if(debt>0){

payments.push(`${p[1].name} → ${p[2].name} = ${debt} очков (${format(debt*stake)} тнг)`)

}

}

if(d4<0){

let pay=Math.abs(d4)

payments.push(`${p[3].name} → ${p[2].name} = ${pay} очков (${format(pay*stake)} тнг)`)

}

let html="<div class='result'>"

html+="<b>РАЗНИЦА</b><br>"

html+=`${p[0].name} - ${p[1].name} = ${d1}<br>`
html+=`${p[1].name} - ${p[2].name} = ${d2}<br>`
html+=`${p[2].name} - ${p[3].name} = ${d3}<br>`
html+=`${p[3].name} - ${p[0].name} = ${d4}<br>`

html+="<br><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(x=>html+=x+"<br>")

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){

let text=document.getElementById("result").innerText
navigator.clipboard.writeText(text)
alert("Результат скопирован")

}

</script>

</body>
</html>
