<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI – Калькулятор Колхоз</title>

<style>

body{
font-family:Arial;
background:#0b1f17;
color:white;
margin:0;
padding:0;
text-align:center;
}

.header{
background:#08140d;
padding:12px;
font-size:22px;
color:#d4af37;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#123524;
padding:20px;
border-radius:12px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.calc{background:#d4af37;color:black}
.reset{background:#7a1f1f;color:white}

.result{
margin-top:20px;
background:#08140d;
padding:15px;
border-radius:10px;
text-align:left;
}

.green{color:#4cff7c}
.red{color:#ff6b6b}

</style>
</head>

<body>

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор игры Колхоз
</div>

<div class="container">

<div class="card">

<div class="row">
<input id="stake" type="number" value="400" placeholder="Ставка за очко">
</div>

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="s1" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="s2" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="s3" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="s4" type="number" placeholder="Очки">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

</div>
</div>

<script>

function moneyFormat(n){
return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake = Number(document.getElementById("stake").value)

let players=[
{name:document.getElementById("n1").value,score:Number(s1.value)},
{name:document.getElementById("n2").value,score:Number(s2.value)},
{name:document.getElementById("n3").value,score:Number(s3.value)},
{name:document.getElementById("n4").value,score:Number(s4.value)}
]

players=players.filter(p=>p.name!="")

let diff=[]
let balance={}

players.forEach(p=>balance[p.name]=0)

for(let i=0;i<players.length;i++){

let a=players[i]
let b=players[(i+1)%players.length]

let d=a.score-b.score

diff.push(`${a.name} ${a.score} - ${b.name} ${b.score} = ${d}`)

balance[a.name]+=d
balance[b.name]-=d

}

let pos=[]
let neg=[]

for(let p in balance){

if(balance[p]>0)pos.push({name:p,val:balance[p]})
if(balance[p]<0)neg.push({name:p,val:-balance[p]})

}

let payments=[]

for(let n of neg){

for(let p of pos){

if(n.val==0)break

let pay=Math.min(n.val,p.val)

if(pay>0){

payments.push(`${n.name} → ${p.name} = ${pay} очков (${moneyFormat(pay*stake)} тнг)`)

n.val-=pay
p.val-=pay

}

}

}

let html="<div class='result'>"

html+="<b>РАЗНИЦА</b><br>"

diff.forEach(d=>html+=d+"<br>")

html+="<br><b>ИТОГ</b><br>"

for(let p in balance){

let v=balance[p]

if(v>0) html+=`<div class='green'>${p} +${v}</div>`
else if(v<0) html+=`<div class='red'>${p} ${v}</div>`
else html+=`${p} 0<br>`

}

html+="<br><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(p=>html+=p+"<br>")

html+="</div>"

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
