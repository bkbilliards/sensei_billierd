<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD CLUB | Калькулятор</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#062d1f">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #fbe692;
            --dark-green: #041a11;
            --deep-green: #0a3622;
            --light-green: #155236;
            --input-bg: #03140d;
            --text: #e0e0e0;
            --red: #ff5c5c;
            --green: #4ade80;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            margin: 0; padding: 10px;
            background: radial-gradient(circle at top, var(--deep-green), var(--dark-green));
            color: var(--text);
            min-height: 100vh;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

        /* Шапка */
        .header { text-align: center; margin: 20px 0 25px; }
        .logo-icon { font-size: 40px; line-height: 1; margin-bottom: 5px; }
        .header h1 {
            color: var(--gold);
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .header p { color: var(--gold-light); font-size: 12px; margin: 5px 0 0; opacity: 0.8; letter-spacing: 4px;}

        /* Меню */
        .menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .menu button {
            background: var(--light-green); color: white; border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 5px; border-radius: 10px; font-size: 13px; font-weight: bold;
        }

        /* Карточка */
        .card { background: rgba(10, 54, 34, 0.8); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }

        .player-row { display: grid; grid-template-columns: 1fr 100px; gap: 10px; margin-bottom: 10px; transition: 0.3s; }
        .team-1 input { border-left: 3px solid #3498db !important; }
        .team-2 input { border-left: 3px solid #e74c3c !important; }

        input, select {
            width: 100%; padding: 14px 12px; border-radius: 10px;
            border: 1px solid var(--light-green); background: var(--input-bg);
            color: white; font-size: 16px; transition: 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--gold); }
        input[type="number"] { font-family: monospace; font-size: 18px; text-align: center; }
        input::placeholder { color: #557a66; font-size: 14px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        
        .players-count-ctrl { display: flex; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .players-count-ctrl button { flex: 1; background: var(--input-bg); color: var(--gold); border: 1px solid var(--light-green); padding: 8px; border-radius: 8px; }

        /* Кнопки действий */
        button { cursor: pointer; border: none; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        button:active { transform: scale(0.97); }
        .btn-main { width: 100%; background: linear-gradient(135deg, var(--gold), #b8962e); color: #000; font-weight: bold; font-size: 16px; padding: 16px; border-radius: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;}
        .btn-secondary { background: #4a6fa5; color: white; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px;}
        .btn-danger { background: #8a3434; color: white; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px;}
        .btn-whatsapp { width: 100%; background: #25D366; color: white; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; display: none; margin-top: 10px;}

        /* Результат */
        .result-box {
            margin-top: 20px; background: var(--input-bg); padding: 15px; border-radius: 12px;
            border: 1px solid var(--light-green); display: none; font-size: 14px; line-height: 1.5;
        }
        .result-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid var(--light-green); padding-bottom: 5px;}
        .money-plus { color: var(--green); }
        .money-minus { color: var(--red); }
        .text-muted { color: #88a394; }

        /* Модальные окна */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: flex-start; z-index: 1000; overflow-y: auto; padding: 20px;
        }
        .modal {
            background: var(--deep-green); width: 100%; max-width: 400px;
            border-radius: 16px; border: 1px solid var(--gold); padding: 20px;
            margin-top: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--light-green); padding-bottom: 10px;}
        .modal-header h2 { margin: 0; color: var(--gold); font-size: 18px; }
        .close-btn { background: none; border: none; color: white; font-size: 24px; padding: 0; margin: 0; }
        
        .history-item { background: var(--input-bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; border-left: 3px solid var(--gold);}
        .rating-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--light-green); font-size: 15px;}
        .rating-item:first-child { background: rgba(212, 175, 55, 0.1); border-radius: 8px; border: none; font-weight: bold; color: var(--gold);}
        
        pre { white-space: pre-wrap; font-family: inherit; margin: 0; }
    </style>
</head>
<body>

<datalist id="playerNames"></datalist>

<div class="container">
    <div class="header">
        <div class="logo-icon">🎱</div>
        <h1>SENSEI CLUB</h1>
        <p>КАЛЬКУЛЯТОР КОЛХОЗ</p>
    </div>

    <div class="menu">
        <button onclick="openModal('historyModal')">📜 История</button>
        <button onclick="openModal('ratingModal')">🏆 Рейтинг</button>
        <button onclick="openModal('statsModal')">📊 Статистика</button>
    </div>

    <div class="card">
        <div class="players-count-ctrl" id="countControls">
            <button onclick="changePlayerCount(-1)">➖ Игрок</button>
            <button onclick="changePlayerCount(1)">➕ Игрок</button>
        </div>

        <div id="playersList">
            </div>

        <div class="controls">
            <select id="mode" onchange="toggleMode()">
                <option value="kolhoz">Колхоз</option>
                <option value="teams">2 на 2 (1+3 vs 2+4)</option>
            </select>
            <input id="stake" type="number" value="400" placeholder="Ставка">
        </div>

        <button class="btn-main" onclick="calculate()">🎱 ПОДСЧИТАТЬ И СОХРАНИТЬ</button>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="clearScores()">🔄 Нов. партия (очистить очки)</button>
            <button class="btn-danger" onclick="resetAll()">СБРОСИТЬ ВСЕ</button>
        </div>

        <div id="resultBox" class="result-box">
            <div id="resultText"></div>
            <div class="btn-group" style="margin-top:15px; margin-bottom:0;">
                <button class="btn-secondary" onclick="copyResult()">📋 Копировать</button>
                <button class="btn-whatsapp" id="waBtn" onclick="shareWhatsApp()" style="display:block; margin:0; background:#25D366; width:100%;">💬 В WhatsApp</button>
            </div>
        </div>
    </div>
</div>

<div id="historyModal" class="modal-overlay" onclick="closeModal(event, 'historyModal')">
    <div class="modal">
        <div class="modal-header">
            <h2>📜 История партий</h2>
            <button class="close-btn" onclick="document.getElementById('historyModal').style.display='none'">&times;</button>
        </div>
        <div id="historyContent"></div>
        <button class="btn-danger" style="width:100%; margin-top:15px;" onclick="clearHistory()">Очистить историю</button>
    </div>
</div>

<div id="ratingModal" class="modal-overlay" onclick="closeModal(event, 'ratingModal')">
    <div class="modal">
        <div class="modal-header">
            <h2>🏆 Рейтинг игроков</h2>
            <button class="close-btn" onclick="document.getElementById('ratingModal').style.display='none'">&times;</button>
        </div>
        <div id="ratingContent"></div>
    </div>
</div>

<div id="statsModal" class="modal-overlay" onclick="closeModal(event, 'statsModal')">
    <div class="modal">
        <div class="modal-header">
            <h2>📊 Статистика клуба</h2>
            <button class="close-btn" onclick="document.getElementById('statsModal').style.display='none'">&times;</button>
        </div>
        <div id="statsContent" style="font-size: 16px; line-height: 1.8;"></div>
    </div>
</div>

<script>
    let playerCount = 4;
    let rawResultText = "";

    // Инициализация
    window.onload = () => {
        renderPlayers();
        updateDatalist();
    };

    function renderPlayers() {
        const container = document.getElementById('playersList');
        const mode = document.getElementById('mode').value;
        container.innerHTML = '';
        
        let displayCount = mode === 'teams' ? 4 : playerCount;
        document.getElementById('countControls').style.display = mode === 'teams' ? 'none' : 'flex';

        for (let i = 1; i <= displayCount; i++) {
            let teamClass = '';
            if (mode === 'teams') {
                teamClass = (i === 1 || i === 3) ? 'team-1' : 'team-2';
            }
            container.innerHTML += `
                <div class="player-row ${teamClass}">
                    <input id="n${i}" list="playerNames" placeholder="Игрок ${i}">
                    <input id="p${i}" type="number" placeholder="Очки">
                </div>
            `;
        }
    }

    function changePlayerCount(delta) {
        if (playerCount + delta >= 2 && playerCount + delta <= 6) {
            playerCount += delta;
            renderPlayers();
        }
    }

    function toggleMode() {
        renderPlayers();
        document.getElementById('resultBox').style.display = 'none';
    }

    function calculate() {
        const mode = document.getElementById('mode').value;
        const stake = Number(document.getElementById('stake').value) || 400;
        const count = mode === 'teams' ? 4 : playerCount;
        
        let players = [];
        let hasEmptyScores = false;

        for (let i = 1; i <= count; i++) {
            let name = document.getElementById(`n${i}`).value.trim() || `Игрок ${i}`;
            let scoreStr = document.getElementById(`p${i}`).value;
            if (scoreStr === "") hasEmptyScores = true;
            players.push({ name, score: Number(scoreStr) });
        }

        if (hasEmptyScores) {
            alert("Пожалуйста, введите очки для всех игроков.");
            return;
        }

        let resultHTML = "";
        let plainText = "";

        if (mode === 'teams') {
            let t1Score = players[0].score + players[2].score;
            let t2Score = players[1].score + players[3].score;
            let diff = t1Score - t2Score;
            
            resultHTML += `<div class="result-title">Команды (2 на 2)</div>`;
            resultHTML += `Команда 1 (${players[0].name}, ${players[2].name}): <b>${t1Score}</b><br>`;
            resultHTML += `Команда 2 (${players[1].name}, ${players[3].name}): <b>${t2Score}</b><br><br>`;

            plainText += `Команда 1 (${players[0].name}, ${players[2].name}): ${t1Score}\n`;
            plainText += `Команда 2 (${players[1].name}, ${players[3].name}): ${t2Score}\n\n`;

            let moneyData = {};
            players.forEach(p => moneyData[p.name] = 0);

            if (diff > 0) { // T1 wins
                let cash = diff * stake;
                resultHTML += `<b>ИТОГ:</b><br>${players[1].name} и ${players[3].name} платят победителям <b>${cash} тг</b>`;
                plainText += `ИТОГ:\n${players[1].name} и ${players[3].name} платят победителям ${cash} тг`;
                moneyData[players[0].name] = cash/2;
                moneyData[players[2].name] = cash/2;
                moneyData[players[1].name] = -cash/2;
                moneyData[players[3].name] = -cash/2;
            } else if (diff < 0) { // T2 wins
                let cash = Math.abs(diff) * stake;
                resultHTML += `<b>ИТОГ:</b><br>${players[0].name} и ${players[2].name} платят победителям <b>${cash} тг</b>`;
                plainText += `ИТОГ:\n${players[0].name} и ${players[2].name} платят победителям ${cash} тг`;
                moneyData[players[1].name] = cash/2;
                moneyData[players[3].name] = cash/2;
                moneyData[players[0].name] = -cash/2;
                moneyData[players[2].name] = -cash/2;
            } else {
                resultHTML += `<b>Ничья!</b> Никто никому не платит.`;
                plainText += `Ничья! Никто никому не платит.`;
            }

            saveToHistory(plainText, moneyData);

        } else {
            // КОЛХОЗ
            let diffsHTML = `<div class="result-title">Разница очков</div>`;
            let diffsText = `Разница очков\n\n`;
            
            let balances = []; // {name, bal}
            for(let i=0; i<count; i++) balances.push({idx: i, name: players[i].name, bal: 0});

            // Математика колхоза: разница по кругу
            for (let i = 0; i < count; i++) {
                let current = players[i];
                let next = players[(i + 1) % count];
                let diff = current.score - next.score;
                
                balances[i].bal = diff;
                
                diffsHTML += `<span class="text-muted">${current.name} ${current.score} - ${next.name} ${next.score} = </span><b>${diff > 0 ? '+'+diff : diff}</b><br>`;
                diffsText += `${current.name} ${current.score} - ${next.name} ${next.score} = ${diff}\n`;
            }

            // Распределение
            let winners = balances.filter(b => b.bal > 0).map(b => ({...b}));
            let losers = balances.filter(b => b.bal < 0).map(b => ({...b, bal: Math.abs(b.bal)}));
            
            let payments = [];
            let totalMoneyData = {}; // Для рейтинга

            losers.forEach(l => {
                winners.forEach(w => {
                    if (l.bal > 0 && w.bal > 0) {
                        let pay = Math.min(l.bal, w.bal);
                        payments.push({ from: l.name, to: w.name, pts: pay, cash: pay * stake });
                        l.bal -= pay;
                        w.bal -= pay;
                    }
                });
            });

            let payHTML = `<br><div class="result-title">Кто кому платит</div>`;
            let payText = `\nКто кому платит\n\n`;
            let razborHTML = `<br><div class="result-title">Разбор партии</div>`;
            let razborText = `\nРазбор партии\n\n`;

            payments.forEach(p => {
                payHTML += `<b>${p.from}</b> → <b>${p.to}</b> = ${p.pts} (<span class="money-minus">${p.cash} тг</span>)<br>`;
                payText += `${p.from} → ${p.to} = ${p.pts} (${p.cash} тг)\n`;
                razborHTML += `<span class="text-muted">${p.from} закрывает ${p.pts} очков игроку ${p.to}</span><br>`;
                razborText += `${p.from} закрывает ${p.pts} очков игроку ${p.to}\n`;

                totalMoneyData[p.from] = (totalMoneyData[p.from] || 0) - p.cash;
                totalMoneyData[p.to] = (totalMoneyData[p.to] || 0) + p.cash;
            });

            let itogHTML = `<br><div class="result-title">Итог по деньгам</div>`;
            let itogText = `\nИтог по деньгам\n\n`;
            
            players.forEach(p => {
                let amt = totalMoneyData[p.name] || 0;
                let cls = amt > 0 ? 'money-plus' : (amt < 0 ? 'money-minus' : '');
                let sign = amt > 0 ? '+' : '';
                itogHTML += `${p.name} <b class="${cls}">${sign}${amt} тг</b><br>`;
                itogText += `${p.name} ${sign}${amt} тг\n`;
            });

            resultHTML += diffsHTML + payHTML + itogHTML + razborHTML;
            plainText += diffsText + payText + itogText + razborText;

            saveToHistory(plainText, totalMoneyData);
            updateDatalist();
        }

        document.getElementById('resultText').innerHTML = resultHTML;
        document.getElementById('resultBox').style.display = 'block';
        rawResultText = plainText;
    }

    // --- Утилиты и Хранилище ---

    function saveToHistory(text, moneyData) {
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        let stats = JSON.parse(localStorage.getItem('sensei_stats') || '{}');
        
        // Сохраняем партию
        history.unshift({ date: new Date().toLocaleString('ru-RU'), text: text });
        if(history.length > 50) history.pop(); // Храним последние 50 игр
        localStorage.setItem('sensei_history', JSON.stringify(history));

        // Обновляем статистику игроков
        for (const [name, money] of Object.entries(moneyData)) {
            if(!stats[name]) stats[name] = { totalWon: 0, totalLost: 0, games: 0 };
            stats[name].games += 1;
            if (money > 0) stats[name].totalWon += money;
            if (money < 0) stats[name].totalLost += Math.abs(money);
        }
        localStorage.setItem('sensei_stats', JSON.stringify(stats));
    }

    function updateDatalist() {
        const stats = JSON.parse(localStorage.getItem('sensei_stats') || '{}');
        const dl = document.getElementById('playerNames');
        dl.innerHTML = '';
        Object.keys(stats).forEach(name => {
            dl.innerHTML += `<option value="${name}">`;
        });
    }

    // --- Модальные окна: История, Рейтинг, Стата ---

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
        if (id === 'historyModal') renderHistory();
        if (id === 'ratingModal') renderRating();
        if (id === 'statsModal') renderStats();
    }

    function closeModal(e, id) {
        if (e.target.id === id) document.getElementById(id).style.display = 'none';
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        let html = history.length ? '' : '<p>История пуста</p>';
        history.forEach(h => {
            html += `<div class="history-item">
                <div style="color:var(--gold); margin-bottom:5px;">📅 ${h.date}</div>
                <pre>${h.text}</pre>
            </div>`;
        });
        document.getElementById('historyContent').innerHTML = html;
    }

    function clearHistory() {
        if(confirm('Точно очистить всю историю и рейтинги клуба?')) {
            localStorage.removeItem('sensei_history');
            localStorage.removeItem('sensei_stats');
            renderHistory();
            updateDatalist();
            alert('История очищена!');
        }
    }

    function renderRating() {
        let stats = JSON.parse(localStorage.getItem('sensei_stats') || '{}');
        let players = Object.keys(stats).map(name => {
            let s = stats[name];
            return { name, profit: s.totalWon - s.totalLost };
        }).sort((a, b) => b.profit - a.profit);

        let html = '';
        if (players.length === 0) html = '<p>Нет данных для рейтинга</p>';
        
        players.forEach((p, index) => {
            let icon = index === 0 ? '👑' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : ''));
            let color = p.profit > 0 ? 'var(--green)' : (p.profit < 0 ? 'var(--red)' : 'white');
            let sign = p.profit > 0 ? '+' : '';
            html += `<div class="rating-item">
                <span>${icon} ${p.name}</span>
                <span style="color:${color}; font-weight:bold;">${sign}${p.profit} тг</span>
            </div>`;
        });
        document.getElementById('ratingContent').innerHTML = html;
    }

    function renderStats() {
        let history = JSON.parse(localStorage.getItem('sensei_history') || '[]');
        let stats = JSON.parse(localStorage.getItem('sensei_stats') || '{}');
        
        let totalGames = history.length;
        let totalMoneyInPlay = 0;
        Object.values(stats).forEach(s => totalMoneyInPlay += s.totalWon);

        document.getElementById('statsContent').innerHTML = `
            <p>🎱 <b>Всего сыграно партий:</b> ${totalGames}</p>
            <p>💰 <b>Оборот денег:</b> ${totalMoneyInPlay} тг</p>
            <p>👥 <b>Уникальных игроков:</b> ${Object.keys(stats).length}</p>
        `;
    }

    // --- Кнопки действий ---

    function copyResult() {
        if (!rawResultText) return;
        navigator.clipboard.writeText(rawResultText).then(() => {
            alert("✅ Результат скопирован в буфер обмена!");
        });
    }

    function shareWhatsApp() {
        if (!rawResultText) return;
        const text = encodeURIComponent("🎱 *SENSEI CLUB*\n\n" + rawResultText);
        window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
    }

    function clearScores() {
        document.querySelectorAll('input[type="number"]').forEach(input => {
            if (input.id !== 'stake') input.value = '';
        });
        document.getElementById('resultBox').style.display = 'none';
    }

    function resetAll() {
        document.querySelectorAll('input').forEach(input => {
            if (input.id !== 'stake') input.value = '';
        });
        document.getElementById('resultBox').style.display = 'none';
        playerCount = 4;
        document.getElementById('mode').value = 'kolhoz';
        toggleMode();
    }
</script>

</body>
</html>
