<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI V13 PRO CLUB SYSTEM</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#05261a,#0e3b2a);
color:white;
}

.container{
max-width:720px;
margin:auto;
padding:15px;
}

.header{
font-size:22px;
font-weight:bold;
text-align:center;
padding:10px;
color:#d4af37;
}

.card{
background:#123c2b;
padding:18px;
border-radius:14px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.player{flex:2;}
.score{flex:1;}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#08271c;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.calc{background:#d4af37;color:black;}
.copy{background:#75829c;}
.reset{background:#8a3434;}

.result{
background:#041c14;
margin-top:20px;
padding:15px;
border-radius:12px;
white-space:pre-line;
}

.menu{
display:flex;
gap:10px;
margin-bottom:10px;
}

.menu button{
font-size:14px;
padding:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор Колхоз
</div>

<div class="menu">
<button onclick="showHistory()">История</button>
<button onclick="showRating()">Рейтинг</button>
<button onclick="showStats()">Статистика</button>
</div>

<div class="card">

<div class="row">
<div class="player">Игрок</div>
<div class="score">Очки</div>
</div>

<div class="row">
<input id="n1" class="player" placeholder="Игрок 1">
<input id="p1" class="score" placeholder="Очки">
</div>

<div class="row">
<input id="n2" class="player" placeholder="Игрок 2">
<input id="p2" class="score" placeholder="Очки">
</div>

<div class="row">
<input id="n3" class="player" placeholder="Игрок 3">
<input id="p3" class="score" placeholder="Очки">
</div>

<div class="row">
<input id="n4" class="player" placeholder="Игрок 4">
<input id="p4" class="score" placeholder="Очки">
</div>

<div class="row">
<select id="mode">
<option value="solo">Колхоз</option>
<option value="reverse">Обратка</option>
<option value="team">2×2 (1+3 vs 2+4)</option>
</select>
</div>

<div class="row">
<input id="stake" value="400">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

function calc(){

let stake = Number(document.getElementById("stake").value)

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let scores=[
Number(p1.value),
Number(p2.value),
Number(p3.value),
Number(p4.value)
]

let mode=document.getElementById("mode").value

let text=""

if(mode==="team"){

let teamA=scores[0]+scores[2]
let teamB=scores[1]+scores[3]

let diff=teamA-teamB

text+="Команда 1: "+names[0]+" + "+names[2]+" = "+teamA+"\n"
text+="Команда 2: "+names[1]+" + "+names[3]+" = "+teamB+"\n\n"

if(diff>0){

let money=diff*stake

text+=names[1]+" и "+names[3]+" платят "+names[0]+" и "+names[2]+" "+money+" тг"

}else{

let money=Math.abs(diff)*stake

text+=names[0]+" и "+names[2]+" платят "+names[1]+" и "+names[3]+" "+money+" тг"

}

document.getElementById("result").innerText=text

saveGame(text)

return

}

let diff=[]

for(let i=0;i<4;i++){

let next=(i+1)%4

diff[i]=scores[i]-scores[next]

}

text+="РАЗНИЦА ОЧКОВ\n\n"

for(let i=0;i<4;i++){

let next=(i+1)%4

text+=names[i]+" "+scores[i]+" - "+names[next]+" "+scores[next]+" = "+diff[i]+"\n"

}

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0){
plus.push({name:names[i],value:diff[i],used:0})
}

if(diff[i]<0){
minus.push({name:names[i],value:Math.abs(diff[i])})
}

}

let payments=[]

minus.forEach(m=>{

let remain=m.value

for(let p of plus){

if(remain<=0) break

let available=p.value-p.used

if(available<=0) continue

let pay=Math.min(remain,available)

payments.push({
from:m.name,
to:p.name,
points:pay
})

p.used+=pay
remain-=pay

}

})

text+="\nКТО КОМУ ПЛАТИТ\n\n"

let money={}

payments.forEach(p=>{

let cash=p.points*stake

text+=p.from+" → "+p.to+" = "+p.points+" ("+cash+" тг)\n"

money[p.from]=(money[p.from]||0)-cash
money[p.to]=(money[p.to]||0)+cash

})

text+="\nИТОГ\n\n"

names.forEach(n=>{

let v=money[n]||0

text+=n+" "+v+" тг\n"

})

text+="\nРАЗБОР ПАРТИИ\n\n"

payments.forEach(p=>{
text+=p.from+" закрывает "+p.points+" очков игроку "+p.to+"\n"
})

document.getElementById("result").innerText=text

saveGame(text)

}

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").innerText
)

alert("Скопировано")

}

function saveGame(text){

let history=JSON.parse(localStorage.getItem("sensei_history")||"[]")

history.unshift({
date:new Date().toLocaleString(),
text:text
})

localStorage.setItem("sensei_history",JSON.stringify(history))

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("sensei_history")||"[]")

let text="ИСТОРИЯ ИГР\n\n"

history.forEach(h=>{
text+=h.date+"\n"+h.text+"\n\n"
})

document.getElementById("result").innerText=text

}

function showRating(){

let history=JSON.parse(localStorage.getItem("sensei_history")||"[]")

let rating={}

history.forEach(h=>{

let lines=h.text.split("\n")

lines.forEach(l=>{

if(l.includes("тг")){

let parts=l.split(" ")

let name=parts[0]
let val=parseInt(parts[1])

rating[name]=(rating[name]||0)+val

}

})

})

let text="РЕЙТИНГ ИГРОКОВ\n\n"

Object.keys(rating).sort((a,b)=>rating[b]-rating[a]).forEach(n=>{
text+=n+" "+rating[n]+" тг\n"
})

document.getElementById("result").innerText=text

}

function showStats(){

let history=JSON.parse(localStorage.getItem("sensei_history")||"[]")

document.getElementById("result").innerText="Всего сыграно партий: "+history.length

}

</script>

</body>
</html>
