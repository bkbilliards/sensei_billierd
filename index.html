<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI — Калькулятор игры Колхоз</title>

<style>

body{
font-family:Arial;
background:linear-gradient(#071b13,#0d2e1f);
color:white;
margin:0;
text-align:center;
}

/* HEADER */

.header{
width:100%;
background:#08140d;
}

.headerimg{
width:100%;
height:auto;
display:block;
}

/* CARD */

.card{
background:#123524;
max-width:850px;
margin:30px auto;
padding:25px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.row{
display:flex;
gap:10px;
margin-bottom:12px;
}

.name{flex:2}
.score{flex:1}

input,select{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
background:#0f261c;
color:white;
}

/* BUTTONS */

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

.calc{background:#d4af37;color:black}
.copy{background:#4d6781;color:white}
.reset{background:#7a1f1f;color:white}

.result{
background:#08140d;
padding:18px;
border-radius:10px;
margin-top:20px;
text-align:left;
}

.section{
margin-top:15px;
}

.green{color:#4cff7c}
.red{color:#ff6b6b}

/* RULES */

.rules{
background:#08140d;
padding:15px;
margin-top:25px;
border-radius:10px;
text-align:left;
font-size:14px;
}

.club{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

.map{
background:#d4af37;
color:black;
font-weight:bold;
}

footer{
margin:30px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<!-- ШАПКА -->

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg" class="headerimg">
</div>

<div class="card">

<div class="row">
<div style="flex:2">Режим игры</div>
<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="team">2 × 2</option>
</select>
</div>

<div class="row">
<div style="flex:2">Ставка за шар</div>
<input id="stake" type="number" value="300">
</div>

<div class="row">
<div class="name">Игрок</div>
<div class="score">П1</div>
<div class="score">П2</div>
</div>

<div id="players"></div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="resetAll()">СБРОС</button>

<div id="results"></div>

<div class="club">

<b>SENSEI BILLIARD CLUB</b><br><br>

📍 Каражанова 1А<br>
Каскелен

</div>

<button class="map" onclick="openMap()">ОТКРЫТЬ В КАРТЕ</button>

<div class="rules">

<b>Очки шаров</b><br><br>

⚪ Белый — 2 очка<br>
🔴 Красный — 4 очка (3 шара)<br>
🔵 Синий — 6 очков<br>
🟢 Зеленый — 8 очков<br>
⚫ Черный — 10 очков<br>

</div>

</div>

<footer>
SENSEI BILLIARD CLUB ©
</footer>

<script>

let container=document.getElementById("players")

for(let i=0;i<4;i++){

container.innerHTML+=`

<div class="row">
<input class="name" id="name${i}" placeholder="Игрок">
<input class="score" id="p1_${i}" type="number">
<input class="score" id="p2_${i}" type="number">
</div>

`

}

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let mode=document.getElementById("mode").value
let stake=parseInt(document.getElementById("stake").value)||0

let players=[]

for(let i=0;i<4;i++){

let name=document.getElementById("name"+i).value

if(name!=""){

let p1=parseInt(document.getElementById("p1_"+i).value)||0
let p2=parseInt(document.getElementById("p2_"+i).value)||0

players.push({
name:name,
score:p1+p2,
money:0
})

}

}

let html="<div class='result'>"

html+="<div class='section'><b>ШАРЫ</b><br>"

players.forEach(p=>{
html+=p.name+" — "+p.score+"<br>"
})

html+="</div>"

/* КОЛХОЗ */

if(mode==="kolhoz"){

let payments=[]
let differences=[]

for(let i=0;i<players.length;i++){

let next=(i+1)%players.length

let diff=players[i].score-players[next].score
let money=Math.abs(diff)*stake

differences.push(players[i].name+" → "+players[next].name+" = "+diff+" очков")

if(diff>0){

players[i].money+=money
players[next].money-=money

payments.push(players[next].name+" → "+players[i].name+" = "+formatMoney(money)+" тенге")

}

if(diff<0){

players[i].money-=money
players[next].money+=money

payments.push(players[i].name+" → "+players[next].name+" = "+formatMoney(money)+" тенге")

}

}

html+="<div class='section'><b>РАЗНИЦА</b><br>"

differences.forEach(d=>{
html+=d+"<br>"
})

html+="</div>"

html+="<div class='section'><b>КТО КОМУ ПЛАТИТ</b><br>"

payments.forEach(p=>{
html+=p+"<br>"
})

html+="</div>"

}

/* 2x2 */

if(mode==="team"){

let teamA=players[0].score+players[2].score
let teamB=players[1].score+players[3].score

let diff=Math.abs(teamA-teamB)
let money=diff*stake

html+="<div class='section'><b>КОМАНДЫ</b><br>"

html+=players[0].name+" + "+players[2].name+" = "+teamA+"<br>"
html+=players[1].name+" + "+players[3].name+" = "+teamB+"<br>"

html+="</div>"

html+="<div class='section'><b>РАЗНИЦА</b><br>"+diff+" очков</div>"

html+="<div class='section'><b>КТО КОМУ ПЛАТИТ</b><br>"

if(teamA>teamB){

html+=players[1].name+" и "+players[3].name+
" → "+players[0].name+" и "+players[2].name+
" = "+formatMoney(money)+" тенге"

}else{

html+=players[0].name+" и "+players[2].name+
" → "+players[1].name+" и "+players[3].name+
" = "+formatMoney(money)+" тенге"

}

html+="</div>"

}

html+="</div>"

document.getElementById("results").innerHTML=html

}

function copyResult(){

let text=document.getElementById("results").innerText
navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

function resetAll(){
location.reload()
}

function openMap(){
window.open("https://2gis.kz/almaty/firm/70000001101734090")
}

</script>

</body>
</html>
