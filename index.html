<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI CLUB - Калькулятор Колхоз</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #0a3622;
            --deep-green: #062115;
            --input-bg: #03140d;
            --text: #e0e0e0;
            --accent: #155236;
            --red: #ff5c5c;
            --green: #4ade80;
        }

        body {
            margin: 0; padding: 10px;
            background: var(--deep-green);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header-img {
            width: 100%; border-radius: 10px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card { 
            background: var(--dark-green); padding: 15px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 10px; margin-bottom: 5px; font-size: 12px; color: var(--gold); text-align: center; }

        .player-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        
        input {
            background: var(--input-bg); border: 1px solid var(--accent); color: white;
            padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; text-align: center;
        }

        .stake-box { margin-bottom: 20px; }
        .stake-box label { display: block; text-align: center; margin-bottom: 8px; font-size: 14px; color: var(--gold); }

        .btn { 
            width: 100%; font-weight: bold; padding: 15px; border-radius: 10px; border: none; 
            font-size: 16px; margin-bottom: 10px; cursor: pointer; text-transform: uppercase;
        }
        .btn-calc { background: var(--gold); color: black; }
        .btn-copy { background: #7a86b8; color: white; }
        .btn-reset { background: #963e3e; color: white; }

        .result-box { 
            margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; 
            display: none; border: 1px solid var(--accent);
        }
        .res-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid var(--accent); padding-bottom: 5px; }
        .res-line { margin-bottom: 5px; font-size: 14px; }
        .val-plus { color: var(--green); font-weight: bold; }
        .val-minus { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/bkilliards/bkilliards.github.io/main/header.png" class="header-img" alt="SENSEI Header">

    <div class="card">
        <div class="stake-box">
            <label>Ставка за шар</label>
            <input type="number" id="stake" value="400">
        </div>

        <div class="label-row">
            <div>Игрок</div>
            <div>П1</div>
            <div>П2</div>
        </div>

        <div id="players-list">
            <div class="player-row">
                <input type="text" id="n1" value="Джони">
                <input type="number" id="p1_1" placeholder="0">
                <input type="number" id="p1_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n2" value="Сека">
                <input type="number" id="p2_1" placeholder="0">
                <input type="number" id="p2_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n3" value="Даурен">
                <input type="number" id="p3_1" placeholder="0">
                <input type="number" id="p3_2" placeholder="0">
            </div>
            <div class="player-row">
                <input type="text" id="n4" value="Дако">
                <input type="number" id="p4_1" placeholder="0">
                <input type="number" id="p4_2" placeholder="0">
            </div>
        </div>

        <button class="btn btn-calc" onclick="calculate()">Подсчитать</button>
        <button class="btn btn-copy" onclick="copyResult()">Скопировать</button>
        <button class="btn btn-reset" onclick="resetForm()">Сброс</button>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
    function calculate() {
        const stake = parseInt(document.getElementById('stake').value) || 0;
        const players = [];
        
        for(let i=1; i<=4; i++) {
            const name = document.getElementById(`n${i}`).value;
            const p1 = parseInt(document.getElementById(`p${i}_1`).value) || 0;
            const p2 = parseInt(document.getElementById(`p${i}_2`).value) || 0;
            players.push({ name, total: p1 + p2 });
        }

        let diffs = [];
        let settlements = [];
        let totals = [0, 0, 0, 0];

        // Расчет разницы по кругу (1-2, 2-3, 3-4, 4-1)
        for(let i=0; i<4; i++) {
            let next = (i + 1) % 4;
            let diff = players[i].total - players[next].total;
            diffs.push(`${players[i].name} (${players[i].total}) - ${players[next].name} (${players[next].total}) = ${diff}`);
            
            let money = Math.abs(diff) * stake;
            if(diff > 0) {
                settlements.push(`${players[next].name} → ${players[i].name} = ${diff} (${money} тг)`);
                totals[i] += money;
                totals[next] -= money;
            } else if(diff < 0) {
                settlements.push(`${players[i].name} → ${players[next].name} = ${Math.abs(diff)} (${money} тг)`);
                totals[i] -= money;
                totals[next] += money;
            }
        }

        let html = `<div class="res-title">Разница очков (Сумма П1+П2)</div>`;
        diffs.forEach(d => html += `<div class="res-line">${d}</div>`);

        html += `<br><div class="res-title">Кто кому платит</div>`;
        settlements.forEach(s => html += `<div class="res-line">${s}</div>`);

        html += `<br><div class="res-title">Итог по деньгам</div>`;
        players.forEach((p, i) => {
            const val = totals[i];
            const style = val >= 0 ? 'val-plus' : 'val-minus';
            html += `<div class="res-line">${p.name}: <span class="${style}">${val > 0 ? '+' : ''}${val} тг</span></div>`;
        });

        const resBox = document.getElementById('result');
        resBox.innerHTML = html;
        resBox.style.display = 'block';
    }

    function resetForm() {
        for(let i=1; i<=4; i++) {
            document.getElementById(`p${i}_1`).value = '';
            document.getElementById(`p${i}_2`).value = '';
        }
        document.getElementById('result').style.display = 'none';
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        if(!text) return;
        navigator.clipboard.writeText("🎱 SENSEI CLUB\n" + text).then(() => alert("Результат скопирован!"));
    }
</script>

</body>
</html>
