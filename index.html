<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02140e,#0a3a27);
color:white;
}

.banner{
width:100%;
display:block;
}

.header{
text-align:center;
padding:20px;
font-size:24px;
color:#d4af37;
font-weight:bold;
}

.container{
max-width:850px;
margin:auto;
background:#123524;
padding:25px;
border-radius:18px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.label{
opacity:0.8;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#0b2419;
color:white;
font-size:16px;
box-sizing:border-box;
}

.top{
display:grid;
grid-template-columns:1fr 2fr;
gap:10px;
margin-bottom:20px;
align-items:center;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#5c6f8c;color:white;}
.reset{background:#8c2b2b;color:white;}
.map{background:#1f7a5c;color:white;}

.result{
background:#05160f;
padding:20px;
border-radius:14px;
margin-top:20px;
line-height:1.6;
}

.green{color:#4cff9a;}
.red{color:#ff6b6b;}

</style>

</head>

<body>

<img class="banner" src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">

<div class="header">
КАЛЬКУЛЯТОР ИГРЫ «КОЛХОЗ»
</div>

<div class="container">

<div class="top">
<div>Ставка за шар</div>
<input id="stake" value="400" type="number">
</div>

<div class="grid label">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="grid">
<input id="n1" placeholder="Игрок">
<input id="p1_1" type="number">
<input id="p2_1" type="number">
</div>

<div class="grid">
<input id="n2" placeholder="Игрок">
<input id="p1_2" type="number">
<input id="p2_2" type="number">
</div>

<div class="grid">
<input id="n3" placeholder="Игрок">
<input id="p1_3" type="number">
<input id="p2_3" type="number">
</div>

<div class="grid">
<input id="n4" placeholder="Игрок">
<input id="p1_4" type="number">
<input id="p2_4" type="number">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

<button class="map"
onclick="window.open('https://2gis.kz/almaty/geo/70000001101734090')">
ОТКРЫТЬ КАРТУ SENSEI
</button>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function kolhoz(names,scores){

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)

payments.push([names[1],names[0],pay])

debt-=pay

}

if(debt>0){

payments.push([names[1],names[2],debt])

}

}

if(d4<0){

payments.push([names[3],names[2],Math.abs(d4)])

}

return {
d1,d2,d3,d4,payments
}

}

function calc(){

let stake = Number(document.getElementById("stake").value)

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let p1=[
Number(p1_1.value||0),
Number(p1_2.value||0),
Number(p1_3.value||0),
Number(p1_4.value||0)
]

let result1 = kolhoz(names,p1)

let html="<div class='result'>"

html+="<b>РАЗНИЦА ОЧКОВ</b><br>"
html+=`${names[0]} - ${names[1]} = ${result1.d1}<br>`
html+=`${names[1]} - ${names[2]} = ${result1.d2}<br>`
html+=`${names[2]} - ${names[3]} = ${result1.d3}<br>`
html+=`${names[3]} - ${names[0]} = ${result1.d4}<br><br>`

html+="<b>КТО КОМУ ПЛАТИТ</b><br>"

let balance={}

names.forEach(n=>balance[n]=0)

result1.payments.forEach(p=>{

let sum=p[2]*stake

html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(sum)} тнг)<br>`

balance[p[0]]-=sum
balance[p[1]]+=sum

})

html+="<br><b>ИТОГ ПО ДЕНЬГАМ</b><br>"

for(let name in balance){

let val=balance[name]

if(val>0){
html+=`<div class="green">${name} +${money(val)} тнг</div>`
}else if(val<0){
html+=`<div class="red">${name} ${money(val)} тнг</div>`
}

}

html+="<br><b>ПОЧЕМУ ТАК ПОЛУЧИЛОСЬ</b><br>"
html+="Очки сравниваются по кругу игроков.<br>"
html+="Игрок платит только следующему игроку.<br>"
html+="Минус игрока распределяется между игроками с плюсом.<br>"
html+="Поэтому сумма выигрыша и проигрыша всегда сходится."

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){

let text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("Результат скопирован")

}

</script>

</body>
</html>
