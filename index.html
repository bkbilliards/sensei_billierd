<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#031c13,#0e3b28);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:170px;
object-fit:cover;
}

.panel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:15px;
max-width:700px;
margin:auto;
}

.panel button{
background:#0e2f21;
border:none;
border-radius:14px;
padding:16px;
color:white;
font-size:15px;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

.card{
background:#133d2a;
max-width:700px;
width:92%;
margin:20px auto;
padding:20px;
border-radius:16px;
box-shadow:0 10px 28px rgba(0,0,0,0.5);
}

.mode{
margin-bottom:15px;
}

.mode select{
padding:10px;
border-radius:10px;
border:none;
font-size:16px;
}

.stakeRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
align-items:center;
}

.stakeRow input{
padding:12px;
border-radius:10px;
border:none;
background:#0c251c;
color:white;
font-size:16px;
}

.table{
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:1.5fr 1fr 1fr;
gap:8px;
}

.row input{
padding:12px;
border-radius:10px;
border:none;
background:#0c251c;
color:white;
font-size:15px;
width:100%;
box-sizing:border-box;
}

button.calc{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#d4af37;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button.copy{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#6a7d97;
color:white;
font-size:18px;
}

button.reset{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#8d2e2e;
color:white;
font-size:18px;
}

button.save{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#e0e0e0;
color:#2d5fa3;
font-size:18px;
}

.result{
background:#041c14;
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.green{color:#55ff9b}
.red{color:#ff7a7a}

.mapBtn{
margin:20px;
background:#3c8e67;
border:none;
padding:14px 22px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<img src="header.jpg">
</div>

<div class="panel">

<button onclick="showHistory()">📜 История</button>
<button onclick="showRating()">🏆 Рейтинг</button>
<button onclick="showDay()">⭐ Игрок дня</button>

<button onclick="showStats()">📊 Статистика</button>
<button onclick="openMap()">🗺 Карта</button>
<button onclick="scrollCalc()">🎱 Калькулятор</button>

</div>

<div class="card" id="calc">

<div class="mode">

<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="teams">2 на 2</option>
</select>

</div>

<div class="stakeRow">
<div>Ставка за шар</div>
<input id="stake" type="number" value="400">
</div>

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" placeholder="Очки">
<input id="p2_1" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2">
<input id="p2_2">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3">
<input id="p2_3">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4">
<input id="p2_4">
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=Number(document.getElementById("stake").value)

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let scores=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let balance=[0,0,0,0]
let diffs=[]

for(let i=0;i<4;i++){

let next=(i+1)%4

let diff=scores[i]-scores[next]

diffs.push(names[i]+" "+scores[i]+" - "+names[next]+" "+scores[next]+" = "+diff)

if(diff>0){

balance[i]+=diff
balance[next]-=diff

}

}

let payments=[]

for(let i=0;i<4;i++){

if(balance[i]<0){

for(let j=0;j<4;j++){

if(balance[j]>0){

let pay=Math.min(-balance[i],balance[j])

payments.push(names[i]+" → "+names[j]+" = "+pay)

balance[i]+=pay
balance[j]-=pay

}

}

}

}

let html="<div class='result'>"

html+="<b>Разница очков</b><br>"

diffs.forEach(d=>html+=d+"<br>")

html+="<br><b>Кто кому платит</b><br>"

payments.forEach(p=>{

let pts=p.split("=")[1]

let money=pts*stake

html+=p+" очков ("+formatMoney(money)+" тг)<br>"

})

html+="<br><b>Итог по деньгам</b><br>"

for(let i=0;i<4;i++){

let money=balance[i]*stake

if(money>0){
html+="<div class='green'>"+names[i]+" +"+formatMoney(money)+"</div>"
}

if(money<0){
html+="<div class='red'>"+names[i]+" "+formatMoney(money)+"</div>"
}

}

html+="<br><b>Почему так получилось</b><br>"
html+="Игроки сравниваются по кругу: 1 → 2 → 3 → 4 → 1.<br>"
html+="Минус игрока распределяется между игроками с плюсом.<br>"
html+="Поэтому сумма выигрыша и проигрыша всегда совпадает."

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function saveGame(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({
date:new Date().toLocaleDateString(),
text:result.innerText
})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

let html="<div class='result'><b>История игр</b><br><br>"

history.forEach(g=>{
html+=g.date+"<br>"+g.text+"<br><br>"
})

html+="</div>"

result.innerHTML=html

}

function showRating(){
result.innerHTML="<div class='result'>Рейтинг появится после нескольких игр</div>"
}

function showDay(){
result.innerHTML="<div class='result'>Игрок дня определяется по максимальному выигрышу</div>"
}

function showStats(){
result.innerHTML="<div class='result'>Статистика появится после накопления игр</div>"
}

function openMap(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

function scrollCalc(){
document.getElementById("calc").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
