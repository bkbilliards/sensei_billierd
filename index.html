<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SENSEI BILLIARD CLUB</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

:root{
--gold:#c5a059;
--bg:#020d08;
--card:#0a2417;
}

body{
margin:0;
background:var(--bg);
color:#e0e0e0;
font-family:'Montserrat',sans-serif;
}

.header img{
width:100%;
display:block;
border-bottom:2px solid var(--gold);
}

.container{
padding:15px;
max-width:480px;
margin:0 auto;
}

.main-card{
background:var(--card);
border:1px solid rgba(197,160,89,0.2);
border-radius:12px;
padding:15px;
}

.player-row{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:8px;
margin-bottom:10px;
}

input{
background:rgba(0,0,0,0.3);
border:1px solid #1a523a;
color:#fff;
padding:12px;
border-radius:8px;
text-align:center;
}

.btn-main{
width:100%;
padding:18px;
border:none;
border-radius:10px;
background:linear-gradient(180deg,#f1d392 0%,#c5a059 100%);
color:#000;
font-weight:800;
cursor:pointer;
margin-top:10px;
}

.res-box{
margin-top:20px;
display:none;
}

.pay-item{
display:flex;
justify-content:space-between;
padding:12px;
background:rgba(255,255,255,0.04);
border-radius:8px;
margin-bottom:8px;
border-left:4px solid var(--gold);
}

.pay-item b{
color:#f1d392;
}

.log-box{
background:rgba(0,0,0,0.2);
padding:12px;
border-radius:8px;
font-size:12px;
margin-top:15px;
line-height:1.6;
}

.log-box b{
color:var(--gold);
}
</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">

<div class="main-card">

<div id="inputs"></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin:15px 0;">
<span style="font-size:11px;font-weight:800;color:var(--gold);">СТАВКА ЗА ШАР</span>
<input type="number" id="stake" value="400" style="width:80px">
</div>

<button class="btn-main" onclick="calculate()">Подсчитать результат</button>

<div id="results" class="res-box">
<div id="pay-list"></div>
<div id="log" class="log-box"></div>
</div>

</div>
</div>

<script>

function init(){

const names=['Дако','Даурен','Сека','Джони'];

document.getElementById('inputs').innerHTML=
names.map((n,i)=>`
<div class="player-row">
<input id="n${i}" value="${n}">
<input id="s${i}_1" placeholder="П1">
<input id="s${i}_2" placeholder="П2">
</div>
`).join('');

}

function calculate(){

const stake=parseInt(document.getElementById('stake').value)||0;

let players=[];

for(let i=0;i<4;i++){

players.push({
name:document.getElementById(`n${i}`).value,
score:(parseInt(document.getElementById(`s${i}_1`).value)||0)
+
(parseInt(document.getElementById(`s${i}_2`).value)||0)
});

}

let diff=[];

for(let i=0;i<4;i++){

let next=(i+1)%4;

diff[i]=players[i].score-players[next].score;

}

let payments=[];

for(let i=0;i<4;i++){

if(diff[i]<0){

let debt=Math.abs(diff[i]);

let j=(i+1)%4;

while(debt>0){

if(diff[j]>0){

let pay=Math.min(debt,diff[j]);

payments.push({
from:players[i].name,
to:players[j].name,
balls:pay
});

diff[j]-=pay;
debt-=pay;

}

j=(j+1)%4;

}

}

}

const list=document.getElementById('pay-list');

list.innerHTML=payments.map(p=>`
<div class="pay-item">
<span>${p.from} → ${p.to}</span>
<span><b>${p.balls*stake} тнг</b> (${p.balls} ш.)</span>
</div>
`).join('');

let log="<b>ЦЕПОЧКА РАЗНИЦЫ</b><br><br>";

for(let i=0;i<4;i++){

let next=(i+1)%4;

let d=players[i].score-players[next].score;

log+=`${players[i].name} ${players[i].score} - ${players[next].name} ${players[next].score} = ${players[i].name} ${d>0?`+${d}`:d}<br>`;

}

document.getElementById('log').innerHTML=log;

document.getElementById('results').style.display='block';

}

init();

</script>

</body>
</html>
