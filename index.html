<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02160f,#0c3a27);
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:24px;
color:#d4af37;
font-weight:bold;
}

.card{
max-width:850px;
margin:auto;
background:#123524;
padding:25px;
border-radius:18px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.head{
opacity:0.8;
}

input{
padding:14px;
border:none;
border-radius:10px;
background:#0c241a;
color:white;
font-size:16px;
}

.topRow{
display:grid;
grid-template-columns:1fr 2fr;
gap:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

.calc{background:#d4af37;color:black;}
.copy{background:#5b6f89;color:white;}
.reset{background:#8c2a2a;color:white;}

.result{
background:#05160f;
padding:18px;
border-radius:14px;
margin-top:20px;
}

.green{color:#52ff9a;}
.red{color:#ff6b6b;}

</style>

</head>

<body>

<div class="header">
КАЛЬКУЛЯТОР ИГРЫ «КОЛХОЗ»
</div>

<div class="card">

<div class="topRow">
<div>Ставка</div>
<input id="stake" type="number" value="300">
</div>

<div class="row head">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" type="number">
<input id="p2_1" type="number">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2" type="number">
<input id="p2_2" type="number">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3" type="number">
<input id="p2_3" type="number">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4" type="number">
<input id="p2_4" type="number">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function kolhoz(names,scores){

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)

payments.push([names[1],names[0],pay])

debt-=pay

}

if(debt>0){

payments.push([names[1],names[2],debt])

}

}

if(d4<0){

payments.push([names[3],names[2],Math.abs(d4)])

}

return payments

}

function calc(){

let stake=Number(stake.value)

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let p1=[
Number(p1_1.value||0),
Number(p1_2.value||0),
Number(p1_3.value||0),
Number(p1_4.value||0)
]

let p2=[
Number(p2_4.value||0),
Number(p2_3.value||0),
Number(p2_2.value||0),
Number(p2_1.value||0)
]

let game1=kolhoz(names,p1)

let reverseNames=[names[3],names[2],names[1],names[0]]

let game2=kolhoz(reverseNames,p2)

let html="<div class='result'>"

html+="<b>1 партия</b><br>"

game1.forEach(p=>{
html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(p[2]*stake)} тнг)<br>`
})

if(p2.some(x=>x>0)){

html+="<br><b>2 партия (обратка)</b><br>"

game2.forEach(p=>{
html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(p[2]*stake)} тнг)<br>`
})

}

html+="</div>"

result.innerHTML=html

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

alert("Результат скопирован")

}

</script>

</body>
</html>
