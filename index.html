<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SENSEI калькулятор</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(#04261a,#0c3b2a);
color:white;
}

.header img{
width:100%;
display:block;
}

.container{
max-width:650px;
margin:auto;
padding:15px;
}

.card{
background:#123c2b;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.label{
margin-top:10px;
margin-bottom:6px;
opacity:0.9;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#07271c;
color:white;
font-size:16px;
}

.table{
margin-top:15px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.col-player{
flex:2;
}

.col-score{
flex:1;
}

.headerRow{
opacity:0.7;
font-size:14px;
margin-bottom:6px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
margin-top:10px;
}

.calc{background:#d4af37;color:black;font-weight:bold;}
.copy{background:#74839d;color:white;}
.reset{background:#8c3333;color:white;}
.save{background:#e6e6e6;color:#2e5fa5;}

.result{
background:#041c14;
margin-top:20px;
padding:15px;
border-radius:12px;
}

.green{color:#6aff9d;}
.red{color:#ff7777;}

.mapBtn{
margin-top:20px;
background:#4c9b74;
color:white;
}

</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">

<div class="card">

<div class="label">Ставка за шар</div>
<input id="stake" value="400">

<div class="table">

<div class="row headerRow">
<div class="col-player">Игрок</div>
<div class="col-score">П1</div>
<div class="col-score">П2</div>
</div>

<div class="row">
<div class="col-player"><input id="n1" placeholder="Игрок"></div>
<div class="col-score"><input id="p1"></div>
<div class="col-score"><input></div>
</div>

<div class="row">
<div class="col-player"><input id="n2"></div>
<div class="col-score"><input id="p2"></div>
<div class="col-score"><input></div>
</div>

<div class="row">
<div class="col-player"><input id="n3"></div>
<div class="col-score"><input id="p3"></div>
<div class="col-score"><input></div>
</div>

<div class="row">
<div class="col-player"><input id="n4"></div>
<div class="col-score"><input id="p4"></div>
<div class="col-score"><input></div>
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

</div>

<script>

function calc(){

let stake = Number(document.getElementById("stake").value)

let names=[
document.getElementById("n1").value,
document.getElementById("n2").value,
document.getElementById("n3").value,
document.getElementById("n4").value
]

let scores=[
Number(document.getElementById("p1").value),
Number(document.getElementById("p2").value),
Number(document.getElementById("p3").value),
Number(document.getElementById("p4").value)
]

let diff=[]

for(let i=0;i<4;i++){
let next=(i+1)%4
diff[i]=scores[i]-scores[next]
}

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0){
plus.push({name:names[i],value:diff[i],index:i})
}

if(diff[i]<0){
minus.push({name:names[i],value:Math.abs(diff[i]),index:i})
}

}

let payments=[]

minus.forEach(m=>{

let debt=m.value
let j=(m.index+1)%4

while(debt>0){

let p=plus.find(x=>x.index===j)

if(p && p.value>0){

let pay=Math.min(debt,p.value)

payments.push({
from:m.name,
to:p.name,
points:pay
})

p.value-=pay
debt-=pay

}

j=(j+1)%4

}

})

let money={}
let html="<div class='result'>"

html+="<b>Кто кому платит</b><br><br>"

payments.forEach(p=>{

let cash=p.points*stake

html+=p.from+" → "+p.to+" = "+p.points+" ("+cash+" тг)<br>"

money[p.from]=(money[p.from]||0)-cash
money[p.to]=(money[p.to]||0)+cash

})

html+="<br><b>Итог</b><br><br>"

names.forEach(n=>{

let v=money[n]||0

if(v>0){
html+="<div class='green'>"+n+" +"+v+" тг</div>"
}

if(v<0){
html+="<div class='red'>"+n+" "+v+" тг</div>"
}

})

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function openMap(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

</script>

</body>
</html>
