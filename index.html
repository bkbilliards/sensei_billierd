<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI KOLHOZ ARBITRAGE PRO</title>
    <style>
        :root {
            --bg: #050f0a; --card: #102b1e; --gold: #d4af37; --win: #2ecc71; --loss: #e74c3c; --input: #1a422e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #1e4d35; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { color: var(--gold); text-align: center; font-size: 20px; text-transform: uppercase; margin: 10px 0; letter-spacing: 2px; }
        
        .setup-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 1px solid var(--gold); }
        input { background: var(--input); border: 1px solid #2a5a41; color: white; padding: 8px; border-radius: 6px; font-size: 16px; outline: none; }
        
        .table-header { display: flex; gap: 5px; margin-bottom: 5px; font-size: 11px; color: var(--gold); font-weight: bold; text-align: center; }
        .player-row { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 8px; }
        
        .name-cell { flex: 2; }
        .score-cell { flex: 1; text-align: center; }
        .name-input { width: 90%; font-weight: bold; font-size: 14px; }
        .score-input { width: 85%; border-color: #3e8e63; font-weight: bold; }

        .btn-group { display: flex; gap: 8px; margin: 15px 0; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-reset { background: #351212; color: #ff4d4d; border: 1px solid #ff4d4d; }
        
        .results-box { margin-top: 20px; border-top: 2px solid var(--gold); padding-top: 15px; }
        .total-item { display: flex; justify-content: space-between; padding: 12px; border-radius: 10px; margin-bottom: 8px; font-weight: bold; font-size: 18px; }
        .is-win { background: rgba(46, 204, 113, 0.2); color: var(--win); border: 1px solid var(--win); }
        .is-loss { background: rgba(231, 76, 60, 0.2); color: var(--loss); border: 1px solid var(--loss); }

        .arbitrage-box { background: #000; padding: 15px; border-radius: 12px; margin-top: 20px; border: 1px solid #2a5a41; }
        .arbitrage-box h3 { margin: 0 0 10px 0; color: var(--gold); font-size: 14px; text-align: center; border-bottom: 1px solid #2a5a41; padding-bottom: 5px; }
        .explain-line { font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ddd; line-height: 1.4; }
        .explain-line b { color: var(--gold); }
        .explain-line i { color: #fff; font-style: normal; font-weight: bold; }
        
        .footer-note { font-size: 10px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>SENSEI KOLHOZ</h1>
        
        <div class="setup-row">
            <span>СТАВКА ЗА ОЧКО:</span>
            <input type="number" id="stake" value="100" style="width: 70px;" oninput="calc()">
        </div>

        <div class="table-header">
            <div style="flex:2">ИМЯ ИГРОКА</div>
            <div style="flex:1">ПАРТИЯ 1</div>
            <div style="flex:1">ПАРТИЯ 2</div>
        </div>

        <div id="players-container">
            </div>

        <div class="btn-group">
            <button class="btn btn-reset" onclick="resetAll()">Сбросить всё</button>
        </div>

        <div class="results-box">
            <div id="totals"></div>
            
            <div class="arbitrage-box" id="arbitrage-box" style="display:none;">
                <h3>РАЗБОР И ОБЪЯСНЕНИЕ:</h3>
                <div id="explanation"></div>
            </div>
        </div>
        <div class="footer-note">Чтобы исключить игрока (если играют 2-3 чел.), просто оставьте его поля очков пустыми.</div>
    </div>
</div>

<script>
    // Состояние имен
    let playerNames = ["Игрок 1", "Игрок 2", "Игрок 3", "Игрок 4"];

    function init() {
        renderInputs();
        calc();
    }

    function renderInputs() {
        const container = document.getElementById('players-container');
        let html = "";
        for(let i=0; i<4; i++) {
            html += `
            <div class="player-row">
                <div class="name-cell">
                    <input type="text" class="name-input" id="n${i}" value="${playerNames[i]}" oninput="updateName(${i}, this.value)">
                </div>
                <div class="score-cell">
                    <input type="number" class="score-input" id="s${i}_1" placeholder="-" oninput="calc()">
                </div>
                <div class="score-cell">
                    <input type="number" class="score-input" id="s${i}_2" placeholder="-" oninput="calc()">
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function updateName(index, val) {
        playerNames[index] = val;
        calc();
    }

    function resetAll() {
        if(confirm("Очистить все очки и имена?")) {
            location.reload();
        }
    }

    function calc() {
        const stake = Number(document.getElementById('stake').value) || 0;
        let players = [];

        // Собираем данные (ТОЛЬКО АКТИВНЫЕ ИГРОКИ)
        for(let i=0; i<4; i++) {
            let str1 = document.getElementById(`s${i}_1`).value;
            let str2 = document.getElementById(`s${i}_2`).value;

            // Если оба поля очков абсолютно пустые - игрок не участвует, пропускаем его!
            if (str1 === "" && str2 === "") {
                continue; 
            }

            let s1 = Number(str1) || 0;
            let s2 = Number(str2) || 0;
            
            players.push({
                name: playerNames[i],
                totalScore: s1 + s2,
                money: 0
            });
        }

        let explainHTML = "";

        // Математика "каждый с каждым" ТОЛЬКО для участвующих
        for(let i=0; i<players.length; i++) {
            for(let j=i+1; j<players.length; j++) {
                let pA = players[i];
                let pB = players[j];
                let diff = pA.totalScore - pB.totalScore;
                let cash = Math.abs(diff) * stake;

                if(diff > 0) { 
                    pA.money += cash;
                    pB.money -= cash;
                    explainHTML += `<div class="explain-line"><i>${pA.name}</i> выиграл у <i>${pB.name}</i>: <b>${cash}</b> <small>(разница ${diff} очк.)</small></div>`;
                } else if(diff < 0) { 
                    pA.money -= cash;
                    pB.money += cash;
                    explainHTML += `<div class="explain-line"><i>${pB.name}</i> выиграл у <i>${pA.name}</i>: <b>${cash}</b> <small>(разница ${Math.abs(diff)} очк.)</small></div>`;
                }
            }
        }

        // Рендер итогов
        let totalsHTML = "";
        let sorted = [...players].sort((a,b) => b.money - a.money);

        sorted.forEach(p => {
            // Если баланс 0 и очков 0 (например, сыграли вничью), все равно показываем, т.к. игрок активен
            let cls = p.money >= 0 ? 'is-win' : 'is-loss';
            totalsHTML += `
                <div class="total-item ${cls}">
                    <span>${p.name}</span>
                    <span>${p.money > 0 ? '+' : ''}${p.money}</span>
                </div>`;
        });

        document.getElementById('totals').innerHTML = totalsHTML;
        
        const arbBox = document.getElementById('arbitrage-box');
        // Показываем блок объяснений, только если играют хотя бы 2 человека и есть разница в счете
        if(explainHTML !== "") {
            arbBox.style.display = "block";
            document.getElementById('explanation').innerHTML = explainHTML;
        } else {
            arbBox.style.display = "none";
        }
    }

    init();
</script>
</body>
</html>
