<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#031f15,#0e3c2b);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:180px;
object-fit:cover;
}

.panel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:15px;
max-width:700px;
margin:auto;
}

.panel button{
background:#0e2f21;
border:none;
border-radius:14px;
padding:14px;
color:white;
font-size:15px;
cursor:pointer;
}

.card{
background:#123e2b;
width:92%;
max-width:700px;
margin:auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input,select{
padding:12px;
border-radius:10px;
border:none;
background:#0a251c;
color:white;
font-size:16px;
width:100%;
box-sizing:border-box;
}

.table{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:1.6fr 1fr 1fr;
gap:8px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:18px;
}

.calc{background:#d4af37;color:black;font-weight:bold}
.copy{background:#6f7f98;color:white}
.reset{background:#8e2f2f;color:white}
.save{background:#e0e0e0;color:#2d5fa3}

.result{
background:#041c14;
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.green{color:#63ff9c}
.red{color:#ff7b7b}

.mapBtn{
margin:20px;
padding:14px 20px;
background:#3b8c65;
border:none;
border-radius:12px;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
<img src="header.jpg">
</div>

<div class="panel">

<button onclick="showHistory()">📜 История</button>
<button onclick="showRating()">🏆 Рейтинг</button>
<button onclick="showDay()">⭐ Игрок дня</button>

<button onclick="showStats()">📊 Статистика</button>
<button onclick="openMap()">🗺 Карта</button>
<button onclick="scrollCalc()">🎱 Калькулятор</button>

</div>

<div class="card" id="calc">

<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="teams">2 на 2</option>
</select>

<br><br>

<div>Ставка за шар</div>
<input id="stake" value="400">

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" placeholder="Очки">
<input id="p2_1">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2">
<input id="p2_2">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3">
<input id="p2_3">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4">
<input id="p2_4">
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=Number(stake.value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let diff=[]

for(let i=0;i<4;i++){
let next=(i+1)%4
diff[i]=scores[i]-scores[next]
}

let html="<div class='result'>"

html+="<b>Разница очков</b><br><br>"

html+=names[0]+" "+scores[0]+" − "+names[1]+" "+scores[1]+" = "+diff[0]+"<br>"
html+=names[1]+" "+scores[1]+" − "+names[2]+" "+scores[2]+" = "+diff[1]+"<br>"
html+=names[2]+" "+scores[2]+" − "+names[3]+" "+scores[3]+" = "+diff[2]+"<br>"
html+=names[3]+" "+scores[3]+" − "+names[0]+" "+scores[0]+" = "+diff[3]+"<br>"

let pay1=diff[0]
let pay2=Math.abs(diff[1])-diff[0]
let pay3=Math.abs(diff[3])

let res=[0,0,0,0]

html+="<br><b>Кто кому платит</b><br><br>"

let m1=pay1*stake
html+=names[1]+" → "+names[0]+" = "+pay1+" ("+formatMoney(m1)+" тг)<br>"
res[1]-=m1
res[0]+=m1

let m2=pay2*stake
html+=names[1]+" → "+names[2]+" = "+pay2+" ("+formatMoney(m2)+" тг)<br>"
res[1]-=m2
res[2]+=m2

let m3=pay3*stake
html+=names[3]+" → "+names[2]+" = "+pay3+" ("+formatMoney(m3)+" тг)<br>"
res[3]-=m3
res[2]+=m3

html+="<br><b>Итог по деньгам</b><br><br>"

for(let i=0;i<4;i++){

if(res[i]>0) html+="<div class='green'>"+names[i]+" +"+formatMoney(res[i])+" тг</div>"
if(res[i]<0) html+="<div class='red'>"+names[i]+" "+formatMoney(res[i])+" тг</div>"

}

html+="<br><b>Разбор партии</b><br><br>"

html+="Самый большой минус у "+names[1]+" ("+diff[1]+").<br>"
html+=names[1]+" сначала перекрывает плюс "+names[0]+" ("+diff[0]+").<br>"
html+="После этого у него остаётся долг "+pay2+" очков.<br>"
html+="Этот остаток получает "+names[2]+".<br>"
html+=names[3]+" имеет минус "+pay3+" и отдаёт их "+names[2]+"."

html+="</div>"

result.innerHTML=html

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function saveGame(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({
date:new Date().toLocaleDateString(),
text:result.innerText
})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function showHistory(){
result.innerHTML="<div class='result'>История появится после сохранённых игр</div>"
}

function showRating(){
result.innerHTML="<div class='result'>Рейтинг игроков появится после нескольких игр</div>"
}

function showDay(){
result.innerHTML="<div class='result'>Игрок дня определяется по максимальному выигрышу</div>"
}

function showStats(){
result.innerHTML="<div class='result'>Статистика клуба появится после накопления игр</div>"
}

function openMap(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

function scrollCalc(){
document.getElementById("calc").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
