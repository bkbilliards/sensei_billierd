<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;500;700;800&display=swap');

        :root {
            --gold: #d4af37;
            --gold-bright: #f9df9f;
            --bg-color: #030f09;
            --card-bg: #071c11;
            --border-color: rgba(212, 175, 55, 0.25);
            --input-bg: rgba(0, 0, 0, 0.4);
            --text-main: #e8e8e8;
            --win: #4ade80;
            --loss: #ff5c5c;
            --team1: rgba(64, 150, 255, 0.1);
            --team2: rgba(255, 100, 100, 0.1);
        }

        body {
            margin: 0; padding: 0; background: var(--bg-color);
            color: var(--text-main); font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .header { width: 100%; border-bottom: 2px solid var(--gold); background: #000; }
        .header img { width: 100%; display: block; filter: brightness(0.8); }

        .container { padding: 15px; max-width: 480px; margin: 0 auto; box-sizing: border-box; }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn-action {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; padding: 12px;
            border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase;
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn-wa { border-color: var(--win); color: var(--win); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; text-align: center; padding: 14px 5px; border: 1px solid var(--gold);
            border-radius: 8px; font-weight: 800; font-size: 11px; text-transform: uppercase;
            color: var(--gold); cursor: pointer; transition: 0.3s;
        }
        .tab.active { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 15px; }
        .grid-header { display: grid; grid-template-columns: 2.5fr 1fr 1fr; gap: 8px; margin-bottom: 10px; padding: 0 5px; }
        .grid-header span { font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase; text-align: center; }

        .player-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr; gap: 8px; margin-bottom: 8px; padding: 5px; border-radius: 10px; }
        .mode-team .team-a { background: var(--team1); border: 1px solid rgba(64, 150, 255, 0.2); }
        .mode-team .team-b { background: var(--team2); border: 1px solid rgba(255, 100, 100, 0.2); }

        input {
            background: var(--input-bg); border: 1px solid rgba(26, 82, 58, 0.8);
            color: #fff; padding: 12px 8px; border-radius: 8px; font-size: 14px;
            outline: none; text-align: center; width: 100%; box-sizing: border-box;
        }
        input[type="text"] { text-align: left; }
        input:focus { border-color: var(--gold); }

        .stake-box {
            display: flex; justify-content: space-between; align-items: center;
            margin: 20px 0 10px; padding: 12px 15px; background: rgba(0,0,0,0.3);
            border-radius: 10px; border: 1px solid var(--border-color);
        }
        .stake-label { font-size: 11px; color: var(--gold); font-weight: 800; text-transform: uppercase; }

        .btn-calc {
            width: 100%; padding: 18px; border: none; border-radius: 10px;
            background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
            color: #000; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer;
        }

        #results { display: none; margin-top: 25px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title {
            font-family: 'Cinzel', serif; color: var(--gold); text-align: center;
            font-size: 14px; margin: 25px 0 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .pay-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 10px;
            margin-bottom: 8px; border-left: 4px solid var(--gold);
        }
        .amt-cash { color: var(--gold-bright); font-weight: 800; font-size: 16px; }

        .comment-box {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            padding: 20px 15px; border-radius: 12px; margin-top: 25px; font-size: 13px; line-height: 1.7;
        }
        .summary-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin-top: 15px; }
        .win-line { color: var(--win); font-weight: 700; margin-bottom: 5px;}
        .loss-line { color: var(--loss); font-weight: 700; margin-bottom: 5px;}

        .btn-group { display: flex; gap: 10px; margin: 25px 0 50px; }
        .btn-side {
            flex: 1; background: transparent; border: 1px solid var(--border-color);
            color: var(--gold); padding: 14px; border-radius: 8px; font-size: 11px; text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body class="mode-solo">

<div class="header">
    <img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg" alt="SENSEI">
</div>

<div class="container">
    <div class="action-buttons">
        <a href="https://chat.whatsapp.com/BTxdaHoTfWnFmXJRlsDFK6" target="_blank" class="btn-action btn-wa">
            💬 Чат игроков (WhatsApp)
        </a>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-solo" onclick="setMode('solo')">Колхоз</div>
        <div class="tab" id="tab-team" onclick="setMode('team')">2 на 2</div>
    </div>

    <div class="card">
        <div class="grid-header">
            <span>Игрок</span>
            <span>П1</span>
            <span>П2</span>
        </div>
        
        <div id="inputs-area"></div>

        <div class="stake-box">
            <span class="stake-label">Ставка (шар):</span>
            <input type="number" id="stake" value="400" style="width: 80px;">
        </div>

        <button class="btn-calc" onclick="calculate()">Подсчитать итог</button>
    </div>

    <div id="results">
        <div class="section-title">ВЗАИМОРАСЧЕТ</div>
        <div id="payments-list"></div>
        <div id="explanation-container"></div>

        <div class="btn-group">
            <button class="btn-side" onclick="copyResults()">Копировать</button>
            <button class="btn-side" style="color:var(--loss);" onclick="location.reload()">Сбросить</button>
        </div>
    </div>
</div>

<script>
let currentMode = 'solo';

function setMode(mode) {
    currentMode = mode;
    document.body.className = mode === 'solo' ? 'mode-solo' : 'mode-team';
    document.getElementById('tab-solo').classList.toggle('active', mode === 'solo');
    document.getElementById('tab-team').classList.toggle('active', mode === 'team');
    
    const rows = document.querySelectorAll('.player-row');
    rows.forEach((row, index) => {
        if (mode === 'team') {
            if (index === 0 || index === 2) row.classList.add('team-a');
            else row.classList.add('team-b');
        } else {
            row.classList.remove('team-a', 'team-b');
        }
    });
}

function initInputs() {
    let html = '';
    for(let i=0; i<4; i++) {
        html += `
            <div class="player-row">
                <input type="text" id="name${i}" placeholder="Имя">
                <input type="number" id="p${i}_1" placeholder="0">
                <input type="number" id="p${i}_2" placeholder="0">
            </div>`;
    }
    document.getElementById('inputs-area').innerHTML = html;
}

function formatMoney(n) { return new Intl.NumberFormat('ru-RU').format(n); }

function calculate() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    const players = [];
    for(let i=0; i<4; i++) {
        players.push({
            name: document.getElementById(`name${i}`).value || `Игрок ${i+1}`,
            score: (parseInt(document.getElementById(`p${i}_1`).value) || 0) + (parseInt(document.getElementById(`p${i}_2`).value) || 0),
            diff: 0, origDiff: 0
        });
    }

    let pList = "", exp = `<div class="comment-box"><h3 style="color:var(--gold); font-size:14px; text-align:center; margin-top:0;">Разбор партии</h3>`;

    if (currentMode === 'solo') {
        for(let i=0; i<4; i++) {
            let next = (i + 1) % 4;
            players[i].diff = players[i].score - players[next].score;
            players[i].origDiff = players[i].diff;
        }

        let winners = [...players].filter(p => p.diff > 0).sort((a,b) => b.diff - a.diff);
        let losers = [...players].filter(p => p.diff < 0).sort((a,b) => a.diff - b.diff);

        if (losers.length > 0) {
            exp += `У <b>${losers[0].name}</b> самый большой минус: −${Math.abs(losers[0].diff)} очков.<br>`;
            exp += `По правилам колхоза он первым покрывает плюсы игроков.<br><br>`;
        }

        let step = 1;
        losers.forEach(l => {
            let debt = Math.abs(l.diff);
            winners.forEach(w => {
                if (debt > 0 && w.diff > 0) {
                    let move = Math.min(debt, w.diff);
                    pList += `<div class="pay-card"><div>${l.name} &rarr; ${w.name}</div><div class="amt-cash">${formatMoney(move*stake)}</div></div>`;
                    
                    exp += `${step}️⃣ <b>${w.name}</b> имеет +${w.origDiff}, поэтому <b>${l.name}</b> сначала покрывает его плюс.<br>`;
                    exp += `<b>${l.name}</b> платит <b>${w.name}</b> ${move} очков.<br>`;
                    
                    debt -= move;
                    w.diff -= move;
                    
                    if (debt > 0) {
                        exp += `Оставшийся долг <b>${l.name}</b>: ${debt} очков.<br><br>`;
                    } else {
                        exp += `Долг <b>${l.name}</b> полностью закрыт.<br><br>`;
                    }
                    step++;
                }
            });
        });

        exp += `<div style="text-align:center; margin:10px 0;">⸻</div>`;
        exp += `<h3 style="color:var(--gold); font-size:14px; text-align:center;">Итог партии</h3><div class="summary-box">`;
        players.forEach(p => {
            let style = p.origDiff >= 0 ? 'win-line' : 'loss-line';
            let verb = p.origDiff >= 0 ? 'получает' : 'платит';
            exp += `<div class="${style}">${p.name} ${verb}: ${Math.abs(p.origDiff)} очков</div>`;
        });
        exp += `</div>`;
    } else {
        // Логика 2 на 2
        let tA = players[0].score + players[2].score;
        let tB = players[1].score + players[3].score;
        let diff = Math.abs(tA - tB);
        exp += `Команда A: ${tA} очков<br>Команда B: ${tB} очков<br>Разница: ${diff} шаров.`;
        if(tA != tB) {
            let winT = tA > tB ? [players[0], players[2]] : [players[1], players[3]];
            let losT = tA < tB ? [players[0], players[2]] : [players[1], players[3]];
            pList = `<div class="pay-card"><div>${losT[0].name} и ${losT[1].name} <br>&rarr; ${winT[0].name} и ${winT[1].name}</div><div class="amt-cash">${formatMoney(diff*stake)}</div></div>`;
        } else { pList = "Ничья"; }
    }

    document.getElementById('payments-list').innerHTML = pList;
    document.getElementById('explanation-container').innerHTML = exp + `</div>`;
    document.getElementById('results').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function copyResults() {
    let text = "SENSEI CLUB\n" + document.getElementById('explanation-container').innerText.replace(/<[^>]*>/g, '');
    navigator.clipboard.writeText(text);
    alert("Итог скопирован!");
}

initInputs();
</script>
</body>
</html>
