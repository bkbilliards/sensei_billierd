<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#041f15,#0f3d2b);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:170px;
object-fit:cover;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.card{
background:#123e2b;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0a251c;
color:white;
font-size:16px;
}

.table{
display:flex;
flex-direction:column;
gap:10px;
margin-top:15px;
}

.row{
display:grid;
grid-template-columns:1.6fr 1fr 1fr;
gap:8px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:18px;
}

.calc{background:#d4af37;color:black;font-weight:bold}
.copy{background:#74839d;color:white}
.reset{background:#8b3232;color:white}
.save{background:#e0e0e0;color:#2b5da0}

.result{
background:#051b14;
padding:18px;
border-radius:12px;
margin-top:20px;
text-align:left;
}

.green{color:#65ff9d}
.red{color:#ff7b7b}

.map{
margin-top:20px;
background:#4c9b74;
color:white;
}

</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">

<div class="card">

<div>Ставка за шар</div>
<input id="stake" value="400">

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1">
<input>
</div>

<div class="row">
<input id="n2">
<input id="p2">
<input>
</div>

<div class="row">
<input id="n3">
<input id="p3">
<input>
</div>

<div class="row">
<input id="n4">
<input id="p4">
<input>
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copy()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="map" onclick="map()">ОТКРЫТЬ КАРТУ SENSEI</button>

</div>

<script>

function calc(){

let stake = Number(document.getElementById("stake").value)

let names=[
document.getElementById("n1").value,
document.getElementById("n2").value,
document.getElementById("n3").value,
document.getElementById("n4").value
]

let scores=[
Number(document.getElementById("p1").value),
Number(document.getElementById("p2").value),
Number(document.getElementById("p3").value),
Number(document.getElementById("p4").value)
]

let diff=[]

for(let i=0;i<4;i++){

let next=(i+1)%4
diff[i]=scores[i]-scores[next]

}

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0){
plus.push({name:names[i],value:diff[i],index:i})
}

if(diff[i]<0){
minus.push({name:names[i],value:Math.abs(diff[i]),index:i})
}

}

let payments=[]

minus.forEach(m=>{

let debt=m.value
let j=(m.index+1)%4

while(debt>0){

let p=plus.find(x=>x.index===j)

if(p && p.value>0){

let pay=Math.min(debt,p.value)

payments.push({
from:m.name,
to:p.name,
points:pay
})

p.value-=pay
debt-=pay

}

j=(j+1)%4

}

})

let money={}

let html="<div class='result'>"

html+="<b>Разница очков</b><br><br>"

html+=names[0]+" "+scores[0]+" − "+names[1]+" "+scores[1]+" = "+diff[0]+"<br>"
html+=names[1]+" "+scores[1]+" − "+names[2]+" "+scores[2]+" = "+diff[1]+"<br>"
html+=names[2]+" "+scores[2]+" − "+names[3]+" "+scores[3]+" = "+diff[2]+"<br>"
html+=names[3]+" "+scores[3]+" − "+names[0]+" "+scores[0]+" = "+diff[3]+"<br>"

html+="<br><b>Кто кому платит</b><br><br>"

payments.forEach(p=>{

let cash=p.points*stake

html+=p.from+" → "+p.to+" = "+p.points+" ("+cash+" тг)<br>"

money[p.from]=(money[p.from]||0)-cash
money[p.to]=(money[p.to]||0)+cash

})

html+="<br><b>Итог по деньгам</b><br><br>"

names.forEach(n=>{

let v=money[n]||0

if(v>0){
html+="<div class='green'>"+n+" +"+v+" тг</div>"
}

if(v<0){
html+="<div class='red'>"+n+" "+v+" тг</div>"
}

})

html+="<br><b>Разбор партии</b><br><br>"

payments.forEach(p=>{
html+=p.from+" закрывает "+p.points+" очков игроку "+p.to+"<br>"
})

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copy(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function map(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

</script>

</body>
</html>
