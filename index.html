<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#03170f,#0c3a27);
color:white;
text-align:center;
}

.header{
background:#04140e;
padding:22px;
font-size:22px;
font-weight:bold;
color:#d4af37;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card{
max-width:750px;
margin:30px auto;
background:#103524;
padding:25px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.sectionTitle{
margin:20px 0 10px 0;
font-size:18px;
opacity:0.9;
}

.row{
display:flex;
gap:10px;
margin-bottom:12px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
background:#0b251b;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.calc{
background:#d4af37;
color:black;
}

.copy{
background:#556e8b;
color:white;
}

.reset{
background:#8c2b2b;
color:white;
}

.result{
background:#05160f;
padding:18px;
border-radius:14px;
margin-top:20px;
text-align:left;
}

.green{color:#52ff9a;}
.red{color:#ff6b6b;}

</style>

</head>

<body>

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор Колхоз
</div>

<div class="card">

<div class="row">
<input id="stake" type="number" value="400" placeholder="Ставка">
</div>

<div class="sectionTitle">1 партия</div>

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="s1" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="s2" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="s3" type="number" placeholder="Очки">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="s4" type="number" placeholder="Очки">
</div>

<div class="sectionTitle">2 партия (обратка)</div>

<div class="row">
<input id="r1" type="number" placeholder="Игрок4 очки">
</div>

<div class="row">
<input id="r2" type="number" placeholder="Игрок3 очки">
</div>

<div class="row">
<input id="r3" type="number" placeholder="Игрок2 очки">
</div>

<div class="row">
<input id="r4" type="number" placeholder="Игрок1 очки">
</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ РЕЗУЛЬТАТ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>

<div id="result"></div>

</div>

<script>

function money(x){
return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function kolhoz(names,scores){

let d1=scores[0]-scores[1]
let d2=scores[1]-scores[2]
let d3=scores[2]-scores[3]
let d4=scores[3]-scores[0]

let payments=[]

if(d2<0){

let debt=Math.abs(d2)

if(d1>0){

let pay=Math.min(d1,debt)

payments.push([names[1],names[0],pay])

debt-=pay

}

if(debt>0){

payments.push([names[1],names[2],debt])

}

}

if(d4<0){

payments.push([names[3],names[2],Math.abs(d4)])

}

return payments

}

function calc(){

let stake=Number(stake.value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(s1.value||0),
Number(s2.value||0),
Number(s3.value||0),
Number(s4.value||0)
]

let game1=kolhoz(names,scores)

let reverseNames=[names[3],names[2],names[1],names[0]]

let reverseScores=[
Number(r1.value||0),
Number(r2.value||0),
Number(r3.value||0),
Number(r4.value||0)
]

let game2=kolhoz(reverseNames,reverseScores)

let html="<div class='result'>"

html+="<b>1 партия</b><br>"

game1.forEach(p=>{
html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(p[2]*stake)} тнг)<br>`
})

if(reverseScores.some(x=>x>0)){

html+="<br><b>2 партия (обратка)</b><br>"

game2.forEach(p=>{
html+=`${p[0]} → ${p[1]} = ${p[2]} очков (${money(p[2]*stake)} тнг)<br>`
})

}

html+="<br><b>Почему такой результат</b><br>"
html+="Очки сравниваются только со следующим игроком по кругу.<br>"
html+="Минус игрока распределяется между игроками с плюсом.<br>"
html+="Во второй партии порядок игроков меняется наоборот."

html+="</div>"

result.innerHTML=html

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

alert("Результат скопирован")

}

</script>

</body>
</html>
