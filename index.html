<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SENSEI Billiard Club</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:linear-gradient(#05261a,#0e3b2a);
color:white;
}

.header img{
width:100%;
display:block;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:15px;
}

.menu button{
padding:12px;
border-radius:10px;
border:none;
background:#103c2a;
color:white;
font-size:14px;
}

.card{
background:#123c2b;
padding:18px;
border-radius:14px;
}

.label{
margin-top:10px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#08271c;
color:white;
font-size:16px;
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

.player{flex:2;}
.score{flex:1;}

button.action{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.calc{background:#d4af37;color:black;}
.copy{background:#75829c;}
.reset{background:#8a3434;}
.save{background:#e4e4e4;color:#2b5da0;}

.result{
background:#041c14;
margin-top:20px;
padding:15px;
border-radius:12px;
}

.green{color:#66ffa0;}
.red{color:#ff7777;}

.mapBtn{
margin-top:20px;
background:#4c9b74;
}

</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">

<div class="menu">
<button onclick="showHistory()">История</button>
<button onclick="showRating()">Рейтинг</button>
<button onclick="showStats()">Статистика</button>
<button onclick="scrollCalc()">Калькулятор</button>
<button onclick="openMap()">Карта</button>
<button onclick="location.reload()">Обновить</button>
</div>

<div class="card" id="calc">

<div class="label">Режим игры</div>

<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="reverse">Обратка</option>
<option value="teams">2 на 2</option>
</select>

<div class="label">Ставка за шар</div>
<input id="stake" value="400">

<div class="row">
<div class="player">Игрок</div>
<div class="score">П1</div>
<div class="score">П2</div>
</div>

<div class="row">
<input id="n1" class="player">
<input id="p1" class="score">
<input class="score">
</div>

<div class="row">
<input id="n2" class="player">
<input id="p2" class="score">
<input class="score">
</div>

<div class="row">
<input id="n3" class="player">
<input id="p3" class="score">
<input class="score">
</div>

<div class="row">
<input id="n4" class="player">
<input id="p4" class="score">
<input class="score">
</div>

<button class="action calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="action copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="action reset" onclick="location.reload()">СБРОС</button>
<button class="action save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="action mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

</div>

<script>

function calc(){

let stake = Number(document.getElementById("stake").value)

let names=[
n1.value,n2.value,n3.value,n4.value
]

let scores=[
Number(p1.value),Number(p2.value),Number(p3.value),Number(p4.value)
]

let diff=[]

for(let i=0;i<4;i++){
let next=(i+1)%4
diff[i]=scores[i]-scores[next]
}

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0){
plus.push({name:names[i],value:diff[i],index:i})
}

if(diff[i]<0){
minus.push({name:names[i],value:Math.abs(diff[i]),index:i})
}

}

let payments=[]

minus.forEach(m=>{

let debt=m.value
let j=(m.index+1)%4

while(debt>0){

let p=plus.find(x=>x.index===j)

if(p && p.value>0){

let pay=Math.min(debt,p.value)

payments.push({
from:m.name,
to:p.name,
points:pay
})

p.value-=pay
debt-=pay

}

j=(j+1)%4

}

})

let money={}
let html="<div class='result'>"

html+="<b>Кто кому платит</b><br><br>"

payments.forEach(p=>{

let cash=p.points*stake

html+=p.from+" → "+p.to+" = "+p.points+" ("+cash+" тг)<br>"

money[p.from]=(money[p.from]||0)-cash
money[p.to]=(money[p.to]||0)+cash

})

html+="<br><b>Итог</b><br><br>"

names.forEach(n=>{

let v=money[n]||0

if(v>0){
html+="<div class='green'>"+n+" +"+v+" тг</div>"
}

if(v<0){
html+="<div class='red'>"+n+" "+v+" тг</div>"
}

})

html+="</div>"

result.innerHTML=html

}

function saveGame(){

let text=result.innerText

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({
date:new Date().toLocaleString(),
text:text
})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

let html="<div class='result'><b>История игр</b><br><br>"

history.forEach(g=>{
html+=g.date+"<br>"+g.text+"<br><br>"
})

html+="</div>"

result.innerHTML=html

}

function showRating(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

let rating={}

history.forEach(g=>{

let lines=g.text.split("\n")

lines.forEach(l=>{

if(l.includes("+")){

let p=l.split(" ")

let name=p[0]
let val=parseInt(p[1])

rating[name]=(rating[name]||0)+val

}

})

})

let html="<div class='result'><b>Рейтинг игроков</b><br><br>"

Object.keys(rating).sort((a,b)=>rating[b]-rating[a]).forEach(n=>{
html+=n+" : "+rating[n]+" тг<br>"
})

html+="</div>"

result.innerHTML=html

}

function showStats(){
result.innerHTML="<div class='result'>Статистика формируется по истории игр</div>"
}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Скопировано")
}

function openMap(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

function scrollCalc(){
document.getElementById("calc").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
