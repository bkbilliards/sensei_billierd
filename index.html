<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#04291c,#0c3a29);
color:white;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

.header{
text-align:center;
font-size:22px;
font-weight:bold;
color:#d4af37;
margin-bottom:15px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.menu button{
padding:10px;
border-radius:10px;
border:none;
font-size:15px;
background:#1c4d3a;
color:white;
}

.card{
background:#143c2c;
padding:18px;
border-radius:14px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#08261b;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
border-radius:10px;
border:none;
font-size:18px;
margin-top:10px;
}

.calc{
background:#d4af37;
color:black;
}

.copy{
background:#7a859f;
}

.reset{
background:#8a3535;
}

.result{
margin-top:15px;
background:#021a12;
padding:15px;
border-radius:12px;
white-space:pre-line;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
SENSEI BILLIARD CLUB — Калькулятор Колхоз
</div>

<div class="menu">
<button onclick="showHistory()">История</button>
<button onclick="showRating()">Рейтинг</button>
<button onclick="showStats()">Статистика</button>
</div>

<div class="card">

<div class="row">
<input id="n1" placeholder="Игрок 1">
<input id="p1" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок 2">
<input id="p2" placeholder="Очки">
</div>

<div class="row">
<input id="n3" placeholder="Игрок 3">
<input id="p3" placeholder="Очки">
</div>

<div class="row">
<input id="n4" placeholder="Игрок 4">
<input id="p4" placeholder="Очки">
</div>

<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="reverse">Обратка</option>
<option value="teams">2 на 2 (1+3 vs 2+4)</option>
</select>

<input id="stake" value="400">

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="reset()">СБРОС</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

function calc(){

let stake=Number(stakeInput())

let names=[
n1.value,
n2.value,
n3.value,
n4.value
]

let scores=[
Number(p1.value),
Number(p2.value),
Number(p3.value),
Number(p4.value)
]

let mode=document.getElementById("mode").value

if(mode==="teams"){

let t1=scores[0]+scores[2]
let t2=scores[1]+scores[3]

let diff=t1-t2

let txt="Команда 1: "+names[0]+" + "+names[2]+" = "+t1+"\n"
txt+="Команда 2: "+names[1]+" + "+names[3]+" = "+t2+"\n\n"

if(diff>0){

txt+=names[1]+" и "+names[3]+" платят "+(diff*stake)+" тг"

}else{

txt+=names[0]+" и "+names[2]+" платят "+(Math.abs(diff)*stake)+" тг"

}

show(txt)

return

}

let diff=[]

for(let i=0;i<4;i++){

let next=(i+1)%4
diff[i]=scores[i]-scores[next]

}

let text="РАЗНИЦА ОЧКОВ\n\n"

for(let i=0;i<4;i++){

let next=(i+1)%4

text+=names[i]+" "+scores[i]+" - "+names[next]+" "+scores[next]+" = "+diff[i]+"\n"

}

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0){

plus.push({
name:names[i],
value:diff[i]
})

}

if(diff[i]<0){

minus.push({
name:names[i],
value:Math.abs(diff[i])
})

}

}

let payments=[]

for(let m of minus){

let remain=m.value

for(let p of plus){

if(remain<=0) break

if(p.value<=0) continue

let pay=Math.min(remain,p.value)

payments.push({
from:m.name,
to:p.name,
points:pay
})

p.value-=pay
remain-=pay

}

}

text+="\nКТО КОМУ ПЛАТИТ\n\n"

let money={}

payments.forEach(p=>{

let cash=p.points*stake

text+=p.from+" → "+p.to+" = "+p.points+" ("+cash+" тг)\n"

money[p.from]=(money[p.from]||0)-cash
money[p.to]=(money[p.to]||0)+cash

})

text+="\nИТОГ\n\n"

names.forEach(n=>{

let v=money[n]||0

text+=n+" "+v+" тг\n"

})

text+="\nРАЗБОР ПАРТИИ\n\n"

payments.forEach(p=>{

text+=p.from+" закрывает "+p.points+" очков игроку "+p.to+"\n"

})

show(text)

save(text)

}

function stakeInput(){

return document.getElementById("stake").value

}

function show(txt){

document.getElementById("result").innerText=txt

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

}

function reset(){

location.reload()

}

function save(text){

let h=JSON.parse(localStorage.getItem("sensei_history")||"[]")

h.unshift({
date:new Date().toLocaleString(),
text:text
})

localStorage.setItem("sensei_history",JSON.stringify(h))

}

function showHistory(){

let h=JSON.parse(localStorage.getItem("sensei_history")||"[]")

let t="ИСТОРИЯ\n\n"

h.forEach(x=>{

t+=x.date+"\n"+x.text+"\n\n"

})

show(t)

}

function showRating(){

let h=JSON.parse(localStorage.getItem("sensei_history")||"[]")

let r={}

h.forEach(g=>{

g.text.split("\n").forEach(l=>{

if(l.includes("тг")){

let p=l.split(" ")

let name=p[0]

let val=parseInt(p[1])

r[name]=(r[name]||0)+val

}

})

})

let t="РЕЙТИНГ\n\n"

Object.keys(r).sort((a,b)=>r[b]-r[a]).forEach(n=>{

t+=n+" "+r[n]+" тг\n"

})

show(t)

}

function showStats(){

let h=JSON.parse(localStorage.getItem("sensei_history")||"[]")

show("Всего игр: "+h.length)

}

</script>

</body>
</html>
