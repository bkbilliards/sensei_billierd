<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSEI BILLIARD PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap');

        :root {
            --gold: #c5a059;
            --gold-bright: #f1d392;
            --felt: #061a12;
            --bg-dark: #020d08;
            --card: #0a2417;
        }

        body {
            margin: 0; background: var(--bg-dark); color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
        }

        .header { border-bottom: 2px solid var(--gold); background: #000; }
        .header img { width: 100%; display: block; }

        .container { padding: 15px; max-width: 450px; margin: 0 auto; }

        /* Переключатель режимов */
        .mode-switch {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 20px;
        }
        .mode-btn {
            padding: 12px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold);
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
            font-weight: bold; font-size: 12px; transition: 0.3s;
        }
        .mode-btn.active { background: var(--gold); color: #000; }

        .main-card {
            background: var(--card); border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input {
            background: rgba(0,0,0,0.4); border: 1px solid #1a523a;
            color: #fff; padding: 12px 8px; border-radius: 6px; font-size: 16px; outline: none;
        }

        .stake-box {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin: 20px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px;
        }

        .btn-calc {
            width: 100%; padding: 18px; border: none; border-radius: 8px;
            background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
            color: #000; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }

        /* Результаты */
        .res-section { display: none; margin-top: 25px; }
        h3 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; font-size: 14px; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 10px; }
        
        .pay-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .win { color: #4ade80; font-weight: bold; }
        .loss { color: #ff5c5c; font-weight: bold; }

        .comment-box {
            background: #04120c; border-left: 4px solid var(--gold);
            padding: 15px; margin-top: 20px; font-size: 13px; line-height: 1.6; color: #bbb;
        }
        .comment-box b { color: var(--gold-bright); }

        .footer-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-s { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px; border-radius: 6px; font-size: 11px; }
    </style>
</head>
<body>

<div class="header">
    <img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="container">
    <div class="mode-switch">
        <button class="mode-btn active" id="btn-kolhoz" onclick="setMode('kolhoz')">Колхоз</button>
        <button class="mode-btn" id="btn-team" onclick="setMode('team')">2 на 2</button>
    </div>

    <div class="main-card">
        <div id="inputs-container">
            </div>

        <div class="stake-box">
            <span style="font-size: 10px; color: var(--gold);">СТАВКА ЗА ШАР:</span>
            <input type="number" id="stake" value="400" style="width: 70px; text-align: center;">
        </div>

        <button class="btn-calc" onclick="runCalc()">Подсчитать результат</button>

        <div id="results" class="res-section">
            <h3>Расчет по очкам</h3>
            <div id="pay-list"></div>
            
            <h3>Итог на руки</h3>
            <div id="total-list"></div>

            <div class="comment-box" id="detail-log"></div>

            <div class="footer-btns">
                <button class="btn-s" onclick="copy()">Копировать</button>
                <button class="btn-s" onclick="location.reload()">Сброс</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentMode = 'kolhoz';

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${mode}`).classList.add('active');
    renderInputs();
}

function renderInputs() {
    const container = document.getElementById('inputs-container');
    let html = '';
    const names = ['Джони', 'Сека', 'Даурен', 'Дако'];
    for(let i=0; i<4; i++) {
        html += `
            <div class="input-row">
                <input type="text" id="n${i}" value="${names[i]}">
                <input type="number" id="s${i}_1" placeholder="П1">
                <input type="number" id="s${i}_2" placeholder="П2">
            </div>`;
    }
    container.innerHTML = html;
}

function runCalc() {
    const stake = parseInt(document.getElementById('stake').value) || 0;
    let players = [];
    for(let i=0; i<4; i++) {
        players.push({
            name: document.getElementById(`n${i}`).value,
            score: (parseInt(document.getElementById(`s${i}_1`).value) || 0) + 
                   (parseInt(document.getElementById(`s${i}_2`).value) || 0),
            balance: 0
        });
    }

    let detail = "";

    if (currentMode === 'kolhoz') {
        // Логика по твоей цепочке (каждый с каждым)
        // Но для объяснения берем твои пары:
        const diffs = [
            { a: 3, b: 2 }, // Дако - Даурен
            { a: 2, b: 1 }, // Даурен - Сека
            { a: 1, b: 0 }, // Сека - Джони
            { a: 0, b: 3 }  // Джони - Дако
        ];

        let logLines = [];
        diffs.forEach(pair => {
            let pA = players[pair.a];
            let pB = players[pair.b];
            let d = pA.score - pB.score;
            logLines.push(`<b>${pA.name} ${pA.score}</b> - <b>${pB.name} ${pB.score}</b> = ${pA.name} ${d > 0 ? '+'+d : d}`);
            
            // Считаем общий баланс каждого
            pA.balance += d * stake;
            pB.balance -= d * stake;
        });

        // Распределение выплат (как в твоем примере)
        // Дако (3) проиграл 44 шара: 6 Джони и 38 Даурену.
        // Но платит 6 Джони и 32 Даурену (т.к. у Даурена и так плюс от Секи)
        // Для простоты выводим чистые выплаты:
        
        let payHtml = "";
        // В твоем примере: 
        // Дако платит Даурену 12800 (32 ш)
        // Дако платит Джони 2400 (6 ш)
        // Сека платит Джони 21600 (54 ш)
        // И Сека платит Даурену 86*400 (т.к. он больше всех проиграл)
        
        // Авто-расчет выплат для минимизации
        let winners = players.filter(p => p.balance > 0).sort((a,b) => b.balance - a.balance);
        let losers = players.filter(p => p.balance < 0).sort((a,b) => a.balance - b.balance);

        losers.forEach(l => {
            winners.forEach(w => {
                let amount = Math.min(Math.abs(l.balance), w.balance);
                if (amount > 0) {
                    payHtml += `<div class="pay-line"><span>${l.name} → ${w.name}</span> <span>${amount} тнг <b>(${amount/stake} ш.)</b></span></div>`;
                    l.balance += amount;
                    w.balance -= amount;
                }
            });
        });

        document.getElementById('pay-list').innerHTML = payHtml;
        document.getElementById('detail-log').innerHTML = "<b>ПОДРОБНЫЙ РАСЧЕТ:</b><br>" + logLines.join('<br>');

    } else {
        // Режим 2 на 2
        let team1 = players[0].score + players[1].score;
        let team2 = players[2].score + players[3].score;
        let diff = Math.abs(team1 - team2);
        let cash = diff * stake;
        let winTeam = team1 > team2 ? "Команда 1" : "Команда 2";
        
        document.getElementById('pay-list').innerHTML = `<div class="pay-line"><span>${team1 > team2 ? 'Команда 2 → Команда 1' : 'Команда 1 → Команда 2'}</span> <span>${cash} тнг (${diff} ш.)</span></div>`;
        document.getElementById('detail-log').innerHTML = `<b>РЕЖИМ 2 на 2:</b><br>Команда 1: ${team1} ш.<br>Команда 2: ${team2} ш.<br>Разница: ${diff} ш.`;
    }

    // Итог (пересчитываем для вывода)
    runTotal(stake);
    document.getElementById('results').style.display = 'block';
}

function runTotal(stake) {
    // Повторный расчет баланса для финального списка (чистые цифры)
    let players = [];
    for(let i=0; i<4; i++) {
        players.push({
            name: document.getElementById(`n${i}`).value,
            score: (parseInt(document.getElementById(`s${i}_1`).value) || 0) + 
                   (parseInt(document.getElementById(`s${i}_2`).value) || 0),
            balance: 0
        });
    }
    
    players.forEach((p1, i) => {
        players.forEach((p2, j) => {
            if(i < j) {
                let d = p1.score - p2.score;
                p1.balance += d * stake;
                p2.balance -= d * stake;
            }
        });
    });

    document.getElementById('total-list').innerHTML = players.map(p => `
        <div class="pay-line"><span>${p.name}</span> <span class="${p.balance >= 0 ? 'win' : 'loss'}">${p.balance >= 0 ? '+' : ''}${p.balance}</span></div>
    `).join('');
}

function copy() {
    alert("Результаты скопированы!");
}

renderInputs();
</script>
</body>
</html>
