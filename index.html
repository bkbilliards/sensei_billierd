<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#021e15,#0c3c2a);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:180px;
object-fit:cover;
}

.card{
background:#123e2b;
width:92%;
max-width:700px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input,select{
padding:12px;
border-radius:10px;
border:none;
background:#0a251c;
color:white;
font-size:16px;
width:100%;
box-sizing:border-box;
}

.table{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:1.6fr 1fr 1fr;
gap:8px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:18px;
}

.calc{background:#d4af37;color:black;font-weight:bold}
.copy{background:#6f7f98;color:white}
.reset{background:#8e2f2f;color:white}
.save{background:#e0e0e0;color:#2d5fa3}

.result{
background:#041c14;
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.green{color:#63ff9c}
.red{color:#ff7b7b}

.mapBtn{
margin:20px;
padding:14px 20px;
background:#3b8c65;
border:none;
border-radius:12px;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="card">

<div>Ставка за шар</div>
<input id="stake" value="400">

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" placeholder="Очки">
<input id="p2_1">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2">
<input id="p2_2">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3">
<input id="p2_3">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4">
<input id="p2_4">
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=Number(document.getElementById("stake").value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let diff=[]

for(let i=0;i<4;i++){

let next=(i+1)%4
diff[i]=scores[i]-scores[next]

}

let html="<div class='result'>"

html+="<b>1. Разница очков</b><br><br>"

html+=names[0]+" "+scores[0]+" − "+names[1]+" "+scores[1]+" = "+diff[0]+"<br>"
html+=names[1]+" "+scores[1]+" − "+names[2]+" "+scores[2]+" = "+diff[1]+"<br>"
html+=names[2]+" "+scores[2]+" − "+names[3]+" "+scores[3]+" = "+diff[2]+"<br>"
html+=names[3]+" "+scores[3]+" − "+names[0]+" "+scores[0]+" = "+diff[3]+"<br>"

let payments=[]
let res=[0,0,0,0]

let p1=diff[0]
let p2=diff[1]
let p3=diff[2]
let p4=diff[3]

payments.push([names[1],names[0],p1])
payments.push([names[1],names[2],Math.abs(p2)-p1])
payments.push([names[3],names[2],Math.abs(p4)])

html+="<br><b>2. Кто кому платит</b><br><br>"

payments.forEach(p=>{

let money=p[2]*stake

html+=p[0]+" → "+p[1]+" = "+p[2]+" очков ("+formatMoney(money)+" тг)<br>"

let from=names.indexOf(p[0])
let to=names.indexOf(p[1])

res[from]-=money
res[to]+=money

})

html+="<br><b>3. Итог по деньгам</b><br><br>"

for(let i=0;i<4;i++){

if(res[i]>0){
html+="<div class='green'>"+names[i]+" +"+formatMoney(res[i])+" тг</div>"
}

if(res[i]<0){
html+="<div class='red'>"+names[i]+" "+formatMoney(res[i])+" тг</div>"
}

}

html+="<br><b>4. Разбор партии</b><br><br>"

html+="Самый большой минус у "+names[1]+" ("+diff[1]+").<br><br>"

html+=names[1]+" сначала перекрывает плюс "+names[0]+" ("+diff[0]+").<br><br>"

html+="После этого у него остаётся долг "+(Math.abs(diff[1])-diff[0])+" очка.<br><br>"

html+="Этот остаток получает "+names[2]+".<br><br>"

html+=names[3]+" имеет минус "+Math.abs(diff[3])+" очков и отдаёт их "+names[2]+".<br><br>"

html+="Поэтому итог партии выглядит именно так."

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){
navigator.clipboard.writeText(result.innerText)
alert("Результат скопирован")
}

function saveGame(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({
date:new Date().toLocaleDateString(),
text:result.innerText
})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function openMap(){
window.open("https://2gis.kz/almaty/geo/70000001101734090")
}

</script>

</body>
</html>
