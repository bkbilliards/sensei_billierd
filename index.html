<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз PRO+</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#031c13,#0d3a27);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:180px;
object-fit:cover;
}

/* панель */

.panel{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:15px;
max-width:720px;
margin:auto;
}

.panel button{
background:#0e2f21;
border:none;
border-radius:14px;
padding:18px;
color:white;
font-size:15px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* карточка */

.card{
background:#133d2a;
max-width:720px;
margin:20px auto;
padding:25px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

/* ставка */

.stakeRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
align-items:center;
margin-bottom:15px;
}

.stakeRow input{
padding:14px;
border-radius:10px;
border:none;
background:#0b251b;
color:white;
font-size:16px;
}

/* таблица игроков */

.table{
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:1.4fr 1fr 1fr;
gap:10px;
}

.row input{
padding:14px;
border-radius:10px;
border:none;
background:#0b251b;
color:white;
font-size:16px;
}

/* кнопки */

button.calc{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#d4af37;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button.copy{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#667a94;
color:white;
font-size:18px;
}

button.reset{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#8d2e2e;
color:white;
font-size:18px;
}

button.save{
width:100%;
padding:16px;
margin-top:10px;
border:none;
border-radius:12px;
background:#e0e0e0;
color:#2a4fa1;
font-size:18px;
}

/* результат */

.result{
background:#041c14;
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.green{color:#4cff9a}
.red{color:#ff7a7a}

.mapBtn{
margin:20px;
background:#3d8e67;
border:none;
padding:14px 22px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<img src="83ACCD74-935E-4FF9-B89E-77E959838536.jpeg">
</div>

<div class="panel">

<button onclick="showHistory()">📜 История</button>
<button onclick="showRating()">🏆 Рейтинг</button>
<button onclick="showDay()">⭐ Игрок дня</button>

<button onclick="showStats()">📊 Статистика</button>
<button onclick="openMap()">🗺 Карта</button>
<button onclick="scrollCalc()">🎱 Калькулятор</button>

</div>

<div class="card" id="calc">

<div class="stakeRow">
<div>Ставка за шар</div>
<input id="stake" type="number" value="400">
</div>

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" placeholder="Очки">
<input id="p2_1" placeholder="Очки">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2">
<input id="p2_2">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3">
<input id="p2_3">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4">
<input id="p2_4">
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=Number(stake.value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let balance=[0,0,0,0]

let diffs=[]

for(let i=0;i<4;i++){

let next=(i+1)%4

let diff=scores[i]-scores[next]

diffs.push(names[i]+" - "+names[next]+" = "+diff)

if(diff>0){

balance[i]+=diff
balance[next]-=diff

}

}

let payments=[]

if(balance[1]<0 && balance[0]>0){

let v=Math.min(-balance[1],balance[0])

payments.push(names[1]+" → "+names[0]+" = "+v)

balance[1]+=v
balance[0]-=v

}

if(balance[1]<0 && balance[2]>0){

let v=Math.min(-balance[1],balance[2])

payments.push(names[1]+" → "+names[2]+" = "+v)

balance[1]+=v
balance[2]-=v

}

if(balance[3]<0 && balance[2]>0){

let v=Math.min(-balance[3],balance[2])

payments.push(names[3]+" → "+names[2]+" = "+v)

balance[3]+=v
balance[2]-=v

}

let html="<div class='result'>"

html+="<b>Разница очков</b><br>"

diffs.forEach(d=>html+=d+"<br>")

html+="<br><b>Кто кому платит</b><br>"

payments.forEach(p=>{

let pts=p.split("=")[1]

let money=pts*stake

html+=p+" очков ("+formatMoney(money)+" тг)<br>"

})

html+="<br><b>Итог</b><br>"

for(let i=0;i<4;i++){

let money=balance[i]*stake

if(money>0){

html+="<div class='green'>"+names[i]+" +"+formatMoney(money)+"</div>"

}

if(money<0){

html+="<div class='red'>"+names[i]+" "+formatMoney(money)+"</div>"

}

}

html+="</div>"

result.innerHTML=html

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)

alert("Скопировано")

}

function saveGame(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({

date:new Date().toLocaleDateString(),
text:result.innerText

})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

let html="<div class='result'><b>История игр</b><br><br>"

history.forEach(g=>{

html+=g.date+"<br>"+g.text+"<br><br>"

})

html+="</div>"

result.innerHTML=html

}

function showRating(){

result.innerHTML="<div class='result'>Рейтинг появится после нескольких игр</div>"

}

function showDay(){

result.innerHTML="<div class='result'>Игрок дня определяется по максимальному выигрышу</div>"

}

function showStats(){

result.innerHTML="<div class='result'>Статистика появится после накопления игр</div>"

}

function openMap(){

window.open("https://2gis.kz/almaty/geo/70000001101734090")

}

function scrollCalc(){

document.getElementById("calc").scrollIntoView()

}

</script>

</body>
</html>
