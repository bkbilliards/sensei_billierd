<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI BILLIARD CLUB — Калькулятор Колхоз</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#021e15,#0c3c2a);
color:white;
text-align:center;
}

.header img{
width:100%;
max-height:180px;
object-fit:cover;
}

.card{
background:#123e2b;
width:92%;
max-width:700px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

select,input{
padding:12px;
border-radius:10px;
border:none;
background:#0a251c;
color:white;
font-size:16px;
}

.table{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:grid;
grid-template-columns:1.6fr 1fr 1fr;
gap:8px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:18px;
}

.calc{
background:#d4af37;
color:black;
font-weight:bold;
}

.copy{background:#6f7f98;color:white}

.reset{background:#8e2f2f;color:white}

.save{background:#e0e0e0;color:#2d5fa3}

.result{
background:#041c14;
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:left;
}

.green{color:#63ff9c}

.red{color:#ff7b7b}

.mapBtn{
margin:20px;
padding:14px 20px;
background:#3b8c65;
border:none;
border-radius:12px;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
<img src="header.jpg">
</div>

<div class="card">

<select id="mode">
<option value="kolhoz">Колхоз</option>
<option value="teams">2 на 2</option>
</select>

<br><br>

<div>Ставка за шар</div>
<input id="stake" value="400">

<div class="table">

<div class="row">
<div>Игрок</div>
<div>П1</div>
<div>П2</div>
</div>

<div class="row">
<input id="n1" placeholder="Игрок">
<input id="p1_1" placeholder="Очки">
<input id="p2_1">
</div>

<div class="row">
<input id="n2" placeholder="Игрок">
<input id="p1_2">
<input id="p2_2">
</div>

<div class="row">
<input id="n3" placeholder="Игрок">
<input id="p1_3">
<input id="p2_3">
</div>

<div class="row">
<input id="n4" placeholder="Игрок">
<input id="p1_4">
<input id="p2_4">
</div>

</div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
<button class="reset" onclick="location.reload()">СБРОС</button>
<button class="save" onclick="saveGame()">СОХРАНИТЬ В ИСТОРИЮ</button>

<div id="result"></div>

</div>

<button class="mapBtn" onclick="openMap()">ОТКРЫТЬ КАРТУ SENSEI</button>

<script>

function formatMoney(num){
return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")
}

function calc(){

let stake=Number(document.getElementById("stake").value)

let names=[n1.value,n2.value,n3.value,n4.value]

let scores=[
Number(p1_1.value),
Number(p1_2.value),
Number(p1_3.value),
Number(p1_4.value)
]

let diff=[]

for(let i=0;i<4;i++){

let next=(i+1)%4
diff[i]=scores[i]-scores[next]

}

let html="<div class='result'>"

html+="<b>1. Разница очков (по кругу игроков)</b><br><br>"

html+=names[0]+" "+scores[0]+" − "+names[1]+" "+scores[1]+" = "+diff[0]+"<br>"
html+=names[1]+" "+scores[1]+" − "+names[2]+" "+scores[2]+" = "+diff[1]+"<br>"
html+=names[2]+" "+scores[2]+" − "+names[3]+" "+scores[3]+" = "+diff[2]+"<br>"
html+=names[3]+" "+scores[3]+" − "+names[0]+" "+scores[0]+" = "+diff[3]+"<br>"

let plus=[]
let minus=[]

for(let i=0;i<4;i++){

if(diff[i]>0) plus.push({i,val:diff[i]})
if(diff[i]<0) minus.push({i,val:Math.abs(diff[i])})

}

html+="<br><b>2. Распределение долгов</b><br><br>"

let payments=[]
let result=[0,0,0,0]

minus.forEach(m=>{

plus.forEach(p=>{

if(m.val>0 && p.val>0){

let pay=Math.min(m.val,p.val)

payments.push([names[m.i],names[p.i],pay])

m.val-=pay
p.val-=pay

}

})

})

html+="<b>3. Кто кому платит</b><br><br>"

payments.forEach(p=>{

let money=p[2]*stake

html+=p[0]+" → "+p[1]+" = "+p[2]+" очков ("+formatMoney(money)+" тг)<br>"

let from=names.indexOf(p[0])
let to=names.indexOf(p[1])

result[from]-=money
result[to]+=money

})

html+="<br><b>4. Итог по деньгам</b><br><br>"

for(let i=0;i<4;i++){

if(result[i]>0){
html+="<div class='green'>"+names[i]+" +"+formatMoney(result[i])+" тг</div>"
}

if(result[i]<0){
html+="<div class='red'>"+names[i]+" "+formatMoney(result[i])+" тг</div>"
}

}

html+="<br><b>5. Подробное объяснение</b><br><br>"

html+="В игре «Колхоз» игроки сравниваются по кругу:<br>"
html+="1 → 2 → 3 → 4 → 1.<br><br>"

html+="После этого определяется разница очков между соседними игроками.<br><br>"

html+="Если разница положительная — игрок выигрывает очки.<br>"
html+="Если отрицательная — игрок проигрывает очки.<br><br>"

html+="Игроки с минусом оплачивают разницу игрокам с плюсом.<br><br>"

html+="Система автоматически распределяет долги так, чтобы сумма выигрыша и проигрыша совпадала."

html+="</div>"

document.getElementById("result").innerHTML=html

}

function copyResult(){

navigator.clipboard.writeText(result.innerText)
alert("Результат скопирован")

}

function saveGame(){

let history=JSON.parse(localStorage.getItem("games")||"[]")

history.unshift({
date:new Date().toLocaleDateString(),
text:result.innerText
})

localStorage.setItem("games",JSON.stringify(history))

alert("Игра сохранена")

}

function openMap(){

window.open("https://2gis.kz/almaty/geo/70000001101734090")

}

</script>

</body>
</html>
